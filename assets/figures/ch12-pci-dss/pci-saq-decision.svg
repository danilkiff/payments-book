<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 580" width="560" height="580">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  </defs>
  <!-- Q1 diamond -->
  <polygon points="220,10 300,45 220,80 140,45" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="220" y="40" text-anchor="middle" font-size="9" fill="#1e1e1e">Есть ли электронное</text>
  <text x="220" y="53" text-anchor="middle" font-size="9" fill="#1e1e1e">хранение CHD?</text>

  <!-- Q1 → SAQ D (left, Да) -->
  <line x1="140" y1="45" x2="80" y2="105" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="98" y="72" font-size="9" fill="#888">Да</text>
  <!-- SAQ D (left) -->
  <rect x="30" y="107" width="100" height="36" rx="5" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5"/>
  <text x="80" y="129" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ D</text>

  <!-- Q1 → Q2 (right, Нет) -->
  <line x1="300" y1="45" x2="360" y2="100" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="345" y="72" font-size="9" fill="#888">Нет</text>
  <!-- Q2 diamond -->
  <polygon points="360,100 445,137 360,174 275,137" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="131" text-anchor="middle" font-size="9" fill="#1e1e1e">Есть ли собственный</text>
  <text x="360" y="144" text-anchor="middle" font-size="9" fill="#1e1e1e">код на стр. оплаты?</text>

  <!-- Q2 → SAQ A-EP (left, Да) -->
  <line x1="275" y1="137" x2="185" y2="185" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="215" y="160" font-size="9" fill="#888">Да</text>
  <!-- SAQ A-EP -->
  <rect x="130" y="187" width="110" height="36" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="185" y="209" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ A-EP</text>

  <!-- Q2 → Q3 (right, Нет) -->
  <line x1="445" y1="137" x2="460" y2="190" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="460" y="165" font-size="9" fill="#888">Нет</text>
  <!-- Q3 diamond -->
  <polygon points="460,192 528,226 460,260 392,226" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="460" y="221" text-anchor="middle" font-size="9" fill="#1e1e1e">Только redirect</text>
  <text x="460" y="234" text-anchor="middle" font-size="9" fill="#1e1e1e">на PSP?</text>

  <!-- Q3 → SAQ A (left, Да) -->
  <line x1="392" y1="226" x2="320" y2="268" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="345" y="248" font-size="9" fill="#888">Да</text>
  <!-- SAQ A -->
  <rect x="264" y="270" width="110" height="36" rx="5" fill="#d3f9d8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="319" y="292" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ A</text>

  <!-- Q3 → Q4 (right, Нет) -->
  <line x1="528" y1="226" x2="520" y2="280" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="528" y="255" font-size="9" fill="#888">Нет</text>
  <!-- Q4 diamond -->
  <polygon points="510,282 543,312 510,342 477,312" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="510" y="306" text-anchor="middle" font-size="9" fill="#1e1e1e">Виртуальный</text>
  <text x="510" y="319" text-anchor="middle" font-size="9" fill="#1e1e1e">терминал PSP?</text>

  <!-- Q4 → SAQ C-VT (left, Да) -->
  <line x1="477" y1="312" x2="415" y2="352" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="437" y="334" font-size="9" fill="#888">Да</text>
  <!-- SAQ C-VT -->
  <rect x="354" y="354" width="120" height="36" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="414" y="376" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ C-VT</text>

  <!-- Q4 → Q5 (right, Нет) -->
  <line x1="543" y1="312" x2="530" y2="360" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="538" y="338" font-size="9" fill="#888">Нет</text>
  <!-- Q5 diamond -->
  <polygon points="520,362 543,390 520,418 497,390" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="520" y="384" text-anchor="middle" font-size="9" fill="#1e1e1e">IP-терминал</text>
  <text x="520" y="397" text-anchor="middle" font-size="9" fill="#1e1e1e">без CHD?</text>

  <!-- Q5 → SAQ B-IP (left, Да) -->
  <line x1="497" y1="390" x2="420" y2="430" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="449" y="413" font-size="9" fill="#888">Да</text>
  <!-- SAQ B-IP / SAQ C -->
  <rect x="340" y="432" width="150" height="36" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="415" y="454" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ B-IP / SAQ C</text>

  <!-- Q5 → SAQ D2 (right, Нет) -->
  <line x1="543" y1="390" x2="530" y2="432" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="540" y="415" font-size="9" fill="#888">Нет</text>
  <!-- SAQ D2 -->
  <rect x="495" y="432" width="80" height="36" rx="5" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5"/>
  <text x="535" y="454" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ D</text>

  <!-- Side notes (simplified) -->
  <text x="155" y="155" font-size="8" fill="#888">полная оценка</text>
  <text x="250" y="225" font-size="8" fill="#888">страница мерчанта</text>
  <text x="366" y="295" font-size="8" fill="#888">redirect / iframe</text>
  <text x="490" y="380" font-size="8" fill="#888">аппаратный канал</text>
</svg>
