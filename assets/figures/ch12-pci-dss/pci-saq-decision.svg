</defs>

<!-- =================== Q1: CHD на серверах ТСП? центр (280,90) =================== -->
<polygon points="280,40 360,90 280,140 200,90" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
