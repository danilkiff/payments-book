<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 170" width="500" height="170">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Заголовок -->
<text x="250.0" y="18.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">SAQ D-Merchant: снижение scope внутри одной формы</text>

<!-- Ось -->
<line x1="20.0" y1="40.0" x2="480.0" y2="40.0" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="250.0" y="35.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">→ меньше периметр у ТСП</text>

<rect x="20.0" y="50.0" width="140" height="62" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="1.5"/>
