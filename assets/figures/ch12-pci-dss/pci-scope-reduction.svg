<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#adb5bd"/></marker>
  </defs>

  <!-- Scope reduction arrow -->
  <line x1="20" y1="30" x2="695" y2="30" stroke="#adb5bd" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="bold" fill="#adb5bd">Scope reduction →</text>

  <!-- Tick marks -->
  <line x1="74" y1="25" x2="74" y2="40" stroke="#adb5bd" stroke-width="1"/>
  <line x1="190" y1="25" x2="190" y2="40" stroke="#adb5bd" stroke-width="1"/>
  <line x1="306" y1="25" x2="306" y2="40" stroke="#adb5bd" stroke-width="1"/>
  <line x1="422" y1="25" x2="422" y2="40" stroke="#adb5bd" stroke-width="1"/>
  <line x1="538" y1="25" x2="538" y2="40" stroke="#adb5bd" stroke-width="1"/>
  <line x1="654" y1="25" x2="654" y2="40" stroke="#adb5bd" stroke-width="1"/>

  <!-- SAQ D -->
  <rect x="30" y="48" width="88" height="52" rx="5" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5"/>
  <text x="74" y="68" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ D</text>
  <text x="74" y="83" text-anchor="middle" font-size="9" fill="#555">Всё в периметре</text>

  <!-- SAQ D + сегментация -->
  <rect x="146" y="48" width="88" height="52" rx="5" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="190" y="64" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ D</text>
  <text x="190" y="78" text-anchor="middle" font-size="9" fill="#555">+ сегментация</text>

  <!-- SAQ C-VT -->
  <rect x="262" y="48" width="88" height="52" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="306" y="68" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ C-VT</text>
  <text x="306" y="83" text-anchor="middle" font-size="9" fill="#555">Virtual terminal</text>

  <!-- SAQ B-IP -->
  <rect x="378" y="48" width="88" height="52" rx="5" fill="#d9fce5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="422" y="68" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ B-IP</text>
  <text x="422" y="83" text-anchor="middle" font-size="9" fill="#555">IP-терминал</text>

  <!-- SAQ A-EP -->
  <rect x="494" y="48" width="88" height="52" rx="5" fill="#d3f9d8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="538" y="68" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ A-EP</text>
  <text x="538" y="83" text-anchor="middle" font-size="9" fill="#555">JS / page code</text>

  <!-- SAQ A -->
  <rect x="610" y="48" width="88" height="52" rx="5" fill="#d3f9d8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="654" y="68" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e1e1e">SAQ A</text>
  <text x="654" y="83" text-anchor="middle" font-size="9" fill="#555">redirect / iFrame</text>

  <!-- Notes below -->
  <text x="74" y="118" text-anchor="middle" font-size="8" fill="#888">Максимальный scope</text>
  <text x="190" y="118" text-anchor="middle" font-size="8" fill="#888">Сужение через</text>
  <text x="190" y="128" text-anchor="middle" font-size="8" fill="#888">сегментацию</text>
  <text x="306" y="118" text-anchor="middle" font-size="8" fill="#888">PSP даёт виртуальный</text>
  <text x="306" y="128" text-anchor="middle" font-size="8" fill="#888">терминал</text>
  <text x="422" y="118" text-anchor="middle" font-size="8" fill="#888">P2PE / платёжный</text>
  <text x="422" y="128" text-anchor="middle" font-size="8" fill="#888">терминал</text>
  <text x="538" y="118" text-anchor="middle" font-size="8" fill="#888">Собственный код</text>
  <text x="538" y="128" text-anchor="middle" font-size="8" fill="#888">влияет на страницу</text>
  <text x="654" y="118" text-anchor="middle" font-size="8" fill="#888">Минимальный scope</text>
  <text x="654" y="128" text-anchor="middle" font-size="8" fill="#888">у мерчанта</text>
</svg>
