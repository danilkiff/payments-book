<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360">
<!-- Внешнее кольцо: общий ИТ-периметр (out-of-scope) -->
<ellipse cx="340.0" cy="200.0" rx="180.0" ry="170.0" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>

<!-- Среднее кольцо: единая зона in-scope-but-not-CDE (connected-to + security-impacting как перекрывающиеся подкатегории) -->
<ellipse cx="340.0" cy="200.0" rx="120.0" ry="115.0" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1" stroke-dasharray="6,3"/>
<!-- Полупрозрачная «бежевая» подсветка подкатегории connected-to, перекрывающаяся со security-impacting -->
<ellipse cx="340.0" cy="200.0" rx="120.0" ry="115.0" fill="#B8821C" fill-opacity="0.18" stroke="none"/>

<!-- CDE -->
<ellipse cx="340.0" cy="200.0" rx="68.0" ry="58.0" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2" stroke-dasharray="6,3"/>

<!-- Подписи зон -->
<text x="340.0" y="50.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Вне области</text>
<text x="340.0" y="100.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">В области, не CDE: влияющие на безопасность</text>
<text x="340.0" y="300.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">В области, не CDE: связанные</text>
<text x="340.0" y="195.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">CDE</text>

<!-- Пометка про запрет хранения SAD внутри CDE -->
<rect x="285.0" y="215.0" width="110" height="20" rx="5" fill="#ffffff" stroke="#C15462" stroke-width="1" stroke-dasharray="6,3"/>
<text x="340.0" y="228.5" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">SAD не хранить</text>

</svg>
