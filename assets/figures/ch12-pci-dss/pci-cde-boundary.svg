<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 330" width="480" height="330">
<defs />
<!-- Внешнее кольцо: общий ИТ-периметр, зона вне области оценки -->
<ellipse cx="240" cy="162" rx="232" ry="160" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<!-- Среднее кольцо: единая зона in-scope-but-not-CDE (connected-to и security-impacting; строгого разделения нет, см. прозу) -->
<ellipse cx="240" cy="162" rx="158" ry="108" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1" stroke-dasharray="6,3"/>
<!-- Внутреннее кольцо: CDE -->
<ellipse cx="240" cy="162" rx="88" ry="60" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2" stroke-dasharray="6,3"/>
<!-- Подписи зон -->
<text x="240" y="30" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">вне области оценки</text>
<text x="240" y="80" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">влияющие на безопасность</text>
<text x="240" y="93" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">(security-impacting)</text>
<text x="240" y="240" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">связанные</text>
<text x="240" y="253" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">(connected-to)</text>
<text x="240" y="155" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="bold" fill="#1A2030">CDE</text>
<!-- Пометка про запрет хранения SAD внутри CDE -->
<rect x="198" y="168" width="84" height="30" rx="3" fill="#ffffff" stroke="#C15462" stroke-width="1" stroke-dasharray="6,3"/>
<text x="240" y="181" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">SAD</text>
<text x="240" y="193" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">не хранить</text>
</svg>
