<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" width="680" height="440">
<!-- Внешнее кольцо: общий ИТ-периметр (out-of-scope) -->
<ellipse cx="340.0" cy="200.0" rx="180.0" ry="170.0" fill="#2F8B67" fill-opacity="0.15" stroke="#5C647A" stroke-opacity="0.50" stroke-width="1"/>

<!-- Среднее кольцо: единая зона in-scope-but-not-CDE (connected-to + security-impacting как перекрывающиеся подкатегории) -->
<ellipse cx="340.0" cy="200.0" rx="120.0" ry="115.0" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-opacity="0.55" stroke-width="1" stroke-dasharray="6,3"/>
<!-- Полупрозрачная «бежевая» подсветка подкатегории connected-to, перекрывающаяся со security-impacting -->
<ellipse cx="340.0" cy="200.0" rx="120.0" ry="115.0" fill="#B8821C" fill-opacity="0.10" stroke="none"/>

<!-- CDE -->
<ellipse cx="340.0" cy="200.0" rx="68.0" ry="58.0" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2" stroke-dasharray="6,3"/>

<!-- Подписи зон -->
<text x="340.0" y="50.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#5C647A">out-of-scope</text>
<text x="340.0" y="100.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#7759D6">in-scope, not CDE</text>
<text x="340.0" y="155.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#C15462">CDE</text>

<!-- CDE-блоки -->
<rect x="285.0" y="170.0" width="110" height="22" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="340.0" y="184.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">Платёжный сервер</text>
<rect x="278.0" y="197.0" width="58" height="22" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="307.0" y="211.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">БД с PAN</text>
<rect x="344.0" y="197.0" width="60" height="22" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="374.0" y="211.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">Терминалы</text>

<!-- Пометка про запрет хранения SAD внутри CDE -->
<rect x="285.0" y="224.0" width="110" height="20" rx="5" fill="#ffffff" stroke="#C15462" stroke-width="1" stroke-dasharray="6,3"/>
<text x="340.0" y="237.5" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="bold" fill="#C15462">SAD не хранить</text>


<!-- Блоки в среднем кольце: connected-to (DNS, общая инфра) и security-impacting (Мониторинг, NTP, Антивирус, AD/IdP) -->
<rect x="190.0" y="130.0" width="60" height="24" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="220.0" y="145.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">DNS</text>
<rect x="430.0" y="130.0" width="100" height="24" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="480.0" y="145.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">общая инфра</text>

<rect x="200.0" y="240.0" width="92" height="24" rx="6" fill="#ffffff" stroke="#7759D6" stroke-width="1.5"/>
<text x="246.0" y="255.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">Мониторинг</text>
<rect x="310.0" y="255.0" width="60" height="24" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="340.0" y="270.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">NTP</text>
<rect x="388.0" y="240.0" width="80" height="24" rx="6" fill="#ffffff" stroke="#7759D6" stroke-width="1.5"/>
<text x="428.0" y="255.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">Антивирус</text>

<!-- AD / IdP — серверы аутентификации (security-impacting) -->
<rect x="245.0" y="130.0" width="78" height="24" rx="6" fill="#ffffff" stroke="#7759D6" stroke-width="1.5"/>
<text x="284.0" y="145.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">AD / IdP</text>
<rect x="360.0" y="130.0" width="62" height="24" rx="6" fill="#ffffff" stroke="#7759D6" stroke-width="1.5"/>
<text x="391.0" y="145.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">SIEM</text>

<!-- Внешние блоки out-of-scope -->
<rect x="30.0" y="115.0" width="100" height="26" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="80.0" y="131.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">CRM</text>
<rect x="30.0" y="185.0" width="100" height="26" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="80.0" y="201.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">Маркетинг</text>
<rect x="30.0" y="255.0" width="100" height="26" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="80.0" y="271.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">HR-системы</text>
<rect x="550.0" y="185.0" width="100" height="26" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="600.0" y="201.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">прочие сервисы</text>

<!-- Легенда: подкатегории in-scope-but-not-CDE по PCI SSC Scoping & Segmentation guidance -->
<text x="340.0" y="395.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">in-scope-but-not-CDE: две перекрывающиеся подкатегории</text>

<rect x="100.0" y="410.0" width="22" height="14" rx="3" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="130.0" y="421.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030"><tspan font-weight="bold">connected-to</tspan> — соединяется с CDE (DNS, NTP, общая инфра)</text>

<rect x="100.0" y="427.0" width="22" height="14" rx="3" fill="#ffffff" stroke="#7759D6" stroke-width="1.5"/>
<text x="130.0" y="438.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030"><tspan font-weight="bold">security-impacting</tspan> — влияет на безопасность CDE (AD/IdP, SIEM, мониторинг, антивирус)</text>

</svg>
