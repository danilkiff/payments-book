<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <!-- Outer circle: outside scope (green) -->
  <circle cx="240" cy="230" r="190" fill="#d3f9d8" fill-opacity="0.5" stroke="#adb5bd" stroke-width="1.5"/>
  <!-- Middle circle: connected-to (amber) -->
  <circle cx="240" cy="230" r="135" fill="#fff3bf" fill-opacity="0.6" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Inner circle: CDE (red) -->
  <circle cx="240" cy="230" r="80" fill="#ffc9c9" fill-opacity="0.7" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- CDE components -->
  <rect x="190" y="196" width="100" height="28" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="240" y="214" text-anchor="middle" font-size="9" fill="#1e1e1e">Платёжный сервер</text>
  <rect x="162" y="234" width="72" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="198" y="250" text-anchor="middle" font-size="9" fill="#1e1e1e">БД с PAN</text>
  <rect x="246" y="234" width="66" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="279" y="250" text-anchor="middle" font-size="9" fill="#1e1e1e">Терминалы</text>

  <!-- Connected-to components -->
  <rect x="100" y="136" width="60" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="130" y="152" text-anchor="middle" font-size="9" fill="#1e1e1e">DNS</text>
  <rect x="314" y="136" width="60" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="344" y="152" text-anchor="middle" font-size="9" fill="#1e1e1e">NTP</text>
  <rect x="80" y="300" width="80" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="120" y="316" text-anchor="middle" font-size="9" fill="#1e1e1e">Мониторинг</text>
  <rect x="320" y="300" width="70" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="355" y="316" text-anchor="middle" font-size="9" fill="#1e1e1e">Файрвол</text>

  <!-- Outside scope components -->
  <rect x="40" y="68" width="68" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="74" y="84" text-anchor="middle" font-size="9" fill="#1e1e1e">CRM</text>
  <rect x="370" y="68" width="78" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="409" y="84" text-anchor="middle" font-size="9" fill="#1e1e1e">Маркетинг</text>
  <rect x="186" y="390" width="108" height="24" rx="4" fill="white" stroke="#555" stroke-width="1"/>
  <text x="240" y="406" text-anchor="middle" font-size="9" fill="#1e1e1e">HR-системы</text>

  <!-- Zone labels -->
  <text x="240" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#ef4444">CDE</text>
  <text x="240" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#b45309">connected-to / security-impacting</text>
  <text x="240" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#22c55e">вне периметра</text>

  <!-- Note -->
  <rect x="10" y="432" width="460" height="42" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="240" y="449" text-anchor="middle" font-size="9" fill="#555">Без сегментации соседние инфраструктурные сервисы и бизнес-системы</text>
  <text x="240" y="463" text-anchor="middle" font-size="9" fill="#555">тоже попадают в периметр PCI DSS.</text>
</svg>
