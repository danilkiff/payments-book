<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 680 360"
   width="680"
   height="360"
   version="1.1"
   id="svg8"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <defs
     id="defs8" />
  <!-- Внешнее кольцо: общий ИТ-периметр (out-of-scope) -->
  <ellipse
     cx="350.78986"
     cy="182.14091"
     rx="180"
     ry="170"
     fill="#e8ecf7"
     stroke="#5c647a"
     stroke-width="1"
     id="ellipse1" />
  <!-- Среднее кольцо: единая зона in-scope-but-not-CDE (connected-to + security-impacting как перекрывающиеся подкатегории) -->
  <ellipse
     cx="350.78986"
     cy="182.14091"
     rx="120"
     ry="115"
     fill="#7759d6"
     fill-opacity="0.15"
     stroke="#7759d6"
     stroke-width="1"
     stroke-dasharray="6, 3"
     id="ellipse2" />
  <!-- Полупрозрачная «бежевая» подсветка подкатегории connected-to, перекрывающаяся со security-impacting -->
  <ellipse
     cx="350.78986"
     cy="182.14091"
     rx="120"
     ry="115"
     fill="#b8821c"
     fill-opacity="0.18"
     stroke="none"
     id="ellipse3"
     style="stroke-width:2;stroke-dasharray:none" />
  <!-- CDE -->
  <ellipse
     cx="350.78986"
     cy="182.14091"
     rx="68"
     ry="58"
     fill="#c15462"
     fill-opacity="0.15"
     stroke="#c15462"
     stroke-width="2"
     stroke-dasharray="6, 3"
     id="ellipse4"
     style="stroke-dasharray:2,2;stroke-dashoffset:0" />
  <!-- Подписи зон -->
  <text
     x="352.65018"
     y="44.791103"
     text-anchor="middle"
     font-family="Inter, '-apple-system', BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11px"
     font-weight="bold"
     fill="#1a2030"
     id="text4">Вне области</text>
  <text
     x="349.20898"
     y="327.16479"
     text-anchor="middle"
     font-family="Inter, '-apple-system', BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11px"
     font-weight="bold"
     fill="#1a2030"
     id="text4-1">Вне области</text>
  <text
     x="355.62668"
     y="105.20891"
     text-anchor="middle"
     font-family="Inter, '-apple-system', BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11px"
     font-weight="bold"
     fill="#1a2030"
     id="text5"
     dx="0.37206423"><tspan
       id="tspan10"
       x="355.62668"
       y="105.20891">влияющие на безопасность</tspan><tspan
       id="tspan11"
       x="355.62668"
       y="118.95891">(security-impacting)</tspan></text>
  <text
     x="353.88077"
     y="260.50458"
     text-anchor="middle"
     font-family="Inter, '-apple-system', BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11px"
     font-weight="bold"
     fill="#1a2030"
     id="text6"><tspan
       id="tspan8"
       x="353.88077"
       y="260.50458">связанные</tspan><tspan
       id="tspan9"
       x="353.88077"
       y="274.25458">(connected-to)</tspan></text>
  <text
     x="417.03613"
     y="156.34227"
     text-anchor="middle"
     font-family="Inter, '-apple-system', BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="34.7937px"
     font-weight="bold"
     fill="#1a2030"
     id="text7"
     transform="scale(0.83598621,1.196192)"
     style="stroke-width:3.16306">CDE</text>
  <!-- Пометка про запрет хранения SAD внутри CDE -->
  <rect
     x="318.38278"
     y="199.718"
     width="63.628803"
     height="27.223038"
     rx="2.8922184"
     fill="#ffffff"
     stroke="#c15462"
     stroke-width="0.887327"
     stroke-dasharray="6, 3"
     id="rect7"
     style="stroke-width:1;stroke-dasharray:1,1;stroke-dashoffset:0" />
  <text
     x="350.78986"
     y="210.64091"
     text-anchor="middle"
     font-family="Inter, '-apple-system', BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="9px"
     font-weight="bold"
     fill="#1a2030"
     id="text8"><tspan
       id="tspan12"
       x="350.78986"
       y="210.64091">SAD</tspan><tspan
       id="tspan13"
       x="350.78986"
       y="221.89091">не хранить</tspan></text>
</svg>
