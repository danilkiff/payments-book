<text x="20.0" y="183.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Шкала не сопоставима напрямую с card-present-осью: смена формы SAQ здесь — про канал ввода PAN, а не про</text>
