<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 520" width="320" height="520">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="arr-bad" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ef4444"/></marker>
    <marker id="arr-warn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker>
  </defs>

  <!-- Group background -->
  <rect x="50" y="5" width="150" height="360" rx="8" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Main flow nodes (left column) -->
  <rect x="60" y="15" width="130" height="34" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="125" y="36" text-anchor="middle" font-size="10" fill="#1e1e1e">Входящая транзакция</text>

  <rect x="60" y="65" width="130" height="34" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="125" y="86" text-anchor="middle" font-size="10" fill="#1e1e1e">Pre-screen rules</text>

  <!-- Decision diamond -->
  <polygon points="125,115 168,142 125,169 82,142" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="125" y="138" text-anchor="middle" font-size="9" fill="#1e1e1e">Явный</text>
  <text x="125" y="151" text-anchor="middle" font-size="9" fill="#1e1e1e">фрод?</text>

  <rect x="60" y="185" width="130" height="34" rx="4" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="125" y="206" text-anchor="middle" font-size="10" fill="#1e1e1e">ML scoring</text>

  <rect x="60" y="235" width="130" height="34" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="125" y="256" text-anchor="middle" font-size="10" fill="#1e1e1e">Score 0–1000</text>

  <rect x="60" y="285" width="130" height="34" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="125" y="306" text-anchor="middle" font-size="10" fill="#1e1e1e">Post-score rules</text>

  <!-- Main flow arrows -->
  <line x1="125" y1="49" x2="125" y2="63" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <line x1="125" y1="99" x2="125" y2="113" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <!-- Да → Блок (right) -->
  <line x1="168" y1="142" x2="208" y2="142" stroke="#ef4444" stroke-width="1.2" marker-end="url(#arr-bad)"/>
  <text x="183" y="139" font-size="8" fill="#ef4444">Да</text>
  <!-- Нет → ML -->
  <line x1="125" y1="169" x2="125" y2="183" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="113" y="179" font-size="8" fill="#4a9eed">Нет</text>
  <line x1="125" y1="219" x2="125" y2="233" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <line x1="125" y1="269" x2="125" y2="283" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>

  <!-- Sidecar: Блок (obvious fraud) -->
  <rect x="210" y="128" width="80" height="28" rx="4" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="146" text-anchor="middle" font-size="10" fill="#1e1e1e">Блок</text>

  <!-- Sidecar: features feeding ML -->
  <rect x="210" y="175" width="80" height="52" rx="4" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="250" y="192" text-anchor="middle" font-size="8" fill="#555">velocity</text>
  <text x="250" y="204" text-anchor="middle" font-size="8" fill="#555">device</text>
  <text x="250" y="216" text-anchor="middle" font-size="8" fill="#555">geo · history</text>
  <line x1="210" y1="201" x2="192" y2="201" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr-warn)"/>

  <!-- Post-score outcomes (right) -->
  <line x1="190" y1="302" x2="208" y2="278" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="190" y1="302" x2="208" y2="302" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="190" y1="302" x2="208" y2="326" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="210" y="264" width="80" height="28" rx="4" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.2"/>
  <text x="250" y="276" text-anchor="middle" font-size="8" fill="#1e1e1e">&gt;800 Блок</text>
  <rect x="210" y="288" width="80" height="28" rx="4" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="250" y="306" text-anchor="middle" font-size="8" fill="#1e1e1e">500–800 3DS</text>
  <rect x="210" y="312" width="80" height="28" rx="4" fill="#d3f9d8" stroke="#22c55e" stroke-width="1.2"/>
  <text x="250" y="330" text-anchor="middle" font-size="8" fill="#1e1e1e">&lt;500 OK</text>

  <!-- Feedback loop (dashed) -->
  <path d="M210,326 Q245,380 200,302 Q195,250 192,201" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="230" y="365" text-anchor="middle" font-size="8" fill="#888">feedback to ML</text>
</svg>
