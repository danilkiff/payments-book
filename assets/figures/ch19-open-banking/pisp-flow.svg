<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 400" width="240" height="400">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  </defs>

  <!-- Клиент -->
  <rect x="55" y="10" width="130" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="32" text-anchor="middle" font-size="11" fill="#1e1e1e">Клиент</text>

  <!-- Мерчант / PISP -->
  <rect x="45" y="66" width="150" height="42" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="82" text-anchor="middle" font-size="11" fill="#1e1e1e">Мерчант / PISP</text>
  <text x="120" y="98" text-anchor="middle" font-size="10" fill="#555">выбор оплаты</text>

  <!-- Банк клиента -->
  <rect x="55" y="130" width="130" height="42" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="147" text-anchor="middle" font-size="11" fill="#1e1e1e">Банк клиента</text>
  <text x="120" y="162" text-anchor="middle" font-size="10" fill="#555">consent + SCA</text>

  <!-- PISP API-платёж -->
  <rect x="45" y="194" width="150" height="42" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="210" text-anchor="middle" font-size="11" fill="#1e1e1e">PISP API-платёж</text>
  <text x="120" y="226" text-anchor="middle" font-size="10" fill="#555">токен + статус</text>

  <!-- Подтверждение заказа -->
  <rect x="55" y="258" width="130" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="275" text-anchor="middle" font-size="11" fill="#1e1e1e">Подтверждение</text>
  <text x="120" y="289" text-anchor="middle" font-size="11" fill="#1e1e1e">заказа</text>

  <!-- Arrows -->
  <line x1="120" y1="46" x2="120" y2="64" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="120" y1="108" x2="120" y2="128" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="120" y1="172" x2="120" y2="192" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="120" y1="236" x2="120" y2="256" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>

  <!-- Note -->
  <rect x="10" y="308" width="220" height="56" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="120" y="325" text-anchor="middle" font-size="9" fill="#555">Клиент возвращается из банка,</text>
  <text x="120" y="338" text-anchor="middle" font-size="9" fill="#555">а дальнейший платёж и статусы</text>
  <text x="120" y="351" text-anchor="middle" font-size="9" fill="#555">идут по API между PISP и банком.</text>
</svg>
