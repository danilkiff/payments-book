<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" width="760" height="380">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
</defs>

<!-- swim-lane labels (left column) -->
<text x="10.0" y="58.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">Клиент</text>
<text x="10.0" y="138.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#7759D6">TPP / СПУ</text>
<text x="10.0" y="151.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">(клиентское ПО)</text>
<text x="10.0" y="228.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#4E63D9">ASPSP / ПУ</text>
<text x="10.0" y="241.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">(банк счёта)</text>
<text x="10.0" y="315.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#2F8B67">ОПКЦ СБП</text>

<!-- swim-lane horizontal guide lines -->
<line x1="105.0" y1="55.0" x2="755.0" y2="55.0" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="105.0" y1="140.0" x2="755.0" y2="140.0" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="105.0" y1="225.0" x2="755.0" y2="225.0" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="105.0" y1="310.0" x2="755.0" y2="310.0" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Step 1: Клиент - Запуск оплаты -->
<rect x="115.0" y="30.0" width="100" height="44" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="165.0" y="48.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">1</text>
<text x="165.0" y="62.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Запуск оплаты</text>

<!-- Step 2: TPP - PAR pair (TPP инициирует PAR в ASPSP, получает request_uri) -->
<rect x="230.0" y="115.0" width="115" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="287.5" y="133.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">2</text>
<text x="287.5" y="146.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">PAR pair: signed JWT</text>
<text x="287.5" y="159.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">→ request_uri</text>

<!-- Step 3: Клиент - редирект на ASPSP -->
<rect x="360.0" y="30.0" width="110" height="44" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="415.0" y="48.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">3</text>
<text x="415.0" y="62.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Редирект клиента</text>

<!-- Step 4: ASPSP - SCA + authorization_code -->
<rect x="360.0" y="200.0" width="115" height="50" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="417.5" y="218.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">4</text>
<text x="417.5" y="231.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">SCA + выдача</text>
<text x="417.5" y="244.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">authorization_code</text>

<!-- Step 5: TPP - token endpoint обмен -->
<rect x="495.0" y="115.0" width="130" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="560.0" y="133.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">5</text>
<text x="560.0" y="146.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">token endpoint:</text>
<text x="560.0" y="159.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">access_token (mTLS/DPoP)</text>

<!-- Step 6: ASPSP - API инициации платежа + расчёт через СБП -->
<rect x="495.0" y="200.0" width="130" height="50" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="560.0" y="218.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">6</text>
<text x="560.0" y="231.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">API инициации</text>
<text x="560.0" y="244.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">платежа</text>

<rect x="495.0" y="285.0" width="130" height="50" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="560.0" y="305.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Расчёт между</text>
<text x="560.0" y="318.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">банками через</text>
<text x="560.0" y="331.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">СБП</text>

<!-- Step 7: финальный статус клиенту -->
<rect x="640.0" y="30.0" width="110" height="44" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="695.0" y="48.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">7</text>
<text x="695.0" y="62.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Финальный статус</text>

<!-- Arrows -->
<!-- 1 → 2 : клиент кликнул → TPP начинает PAR -->
<line x1="200.0" y1="74.0" x2="265.0" y2="115.0" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<!-- 2 → 3 : TPP формирует редирект для клиента -->
<line x1="310.0" y1="115.0" x2="395.0" y2="74.0" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<!-- 3 → 4 : клиент уходит на экран SCA в ASPSP -->
<line x1="435.0" y1="74.0" x2="435.0" y2="200.0" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<!-- 4 → 5 : ASPSP вернул code в TPP (callback) -->
<line x1="475.0" y1="215.0" x2="525.0" y2="165.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<!-- 5 → 6 : TPP с access_token зовёт API инициации в ASPSP -->
<line x1="560.0" y1="165.0" x2="560.0" y2="200.0" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<!-- 6 → Расчёт СБП -->
<line x1="560.0" y1="250.0" x2="560.0" y2="285.0" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<!-- Расчёт → ASPSP подтверждение (пунктир, callback) -->
<line x1="495.0" y1="300.0" x2="475.0" y2="250.0" stroke="#2F8B67" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Good)"/>
<!-- 6 → 7 финальный статус: ASPSP → TPP → Клиент (одна составная зелёная стрелка) -->
<line x1="625.0" y1="215.0" x2="660.0" y2="74.0" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>

<!-- footnote -->
<rect x="115.0" y="345.0" width="610" height="28" rx="8" fill="#F5F7FD" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<text x="420.0" y="363.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">На каждом шаге подпись и шифрование выполняются по ГОСТ через сертифицированное СКЗИ; транспорт — ГОСТ TLS.</text>
</svg>
