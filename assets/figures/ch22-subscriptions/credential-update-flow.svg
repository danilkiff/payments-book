<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-AccentB-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Warn-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Good-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
</defs>

<text x="360.0" y="22.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Обновление реквизитов карты</text>

<!-- ===== Верхний ряд: Account Updater (VAU / ABU) ===== -->
<text x="20.0" y="50.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">A. Account Updater</text>

<!-- Эмитент (перевыпуск) -->
<rect x="20.0" y="70.0" width="120" height="50" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="80.0" y="92.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Эмитент</text>
<text x="80.0" y="106.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">(перевыпуск)</text>

<!-- Стрелка к VAU -->
<line x1="140.0" y1="83.0" x2="260.0" y2="83.0" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="200.0" y="76.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">push</text>
<!-- Стрелка от ТСП назад в VAU/ABU (inquiry) -->
<line x1="260.0" y1="107.0" x2="140.0" y2="107.0" stroke="#7759D6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-AccentB-s)"/>
<text x="200.0" y="120.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">inquiry от продавца</text>

<!-- VAU (Visa) -->
<rect x="265.0" y="70.0" width="110" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="320.0" y="92.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">VAU</text>
<text x="320.0" y="106.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">Visa Account Updater</text>
<text x="320.0" y="135.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#7759D6">batch + Real-Time VAU</text>

<!-- ABU (Mastercard) -->
<rect x="385.0" y="70.0" width="110" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="440.0" y="92.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">ABU</text>
<text x="440.0" y="106.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">MC Auto Billing Updater</text>
<text x="440.0" y="135.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#7759D6">batch + Real-Time ABU API</text>

<!-- Стрелка к ТСП -->
<line x1="495.0" y1="83.0" x2="600.0" y2="83.0" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="547.0" y="76.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">новый PAN / expiry</text>

<!-- ТСП (верхний) -->
<rect x="605.0" y="70.0" width="100" height="50" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="655.0" y="98.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">ТСП</text>

<!-- Сноска про покрытие -->
<text x="20.0" y="160.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Покрытие: участвуют не все эмитенты и не все типы карт (предоплаченные, продукты малых эмитентов часто вне).</text>

<!-- MAC 01 как декларативный сигнал входа -->
<rect x="20.0" y="175.0" width="240" height="36" rx="6" fill="#5C647A" fill-opacity="0.15" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<text x="140.0" y="191.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">MAC 01 «new account info available»</text>
<text x="140.0" y="203.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">декларативный вход в этот ряд</text>
<line x1="260.0" y1="193.0" x2="320.0" y2="125.0" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>

<!-- Разделитель: альтернатива -->
<text x="360.0" y="252.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#B8821C">Альтернатива: сетевой токен</text>

<!-- ===== Нижний ряд: сетевой токен ===== -->
<text x="20.0" y="285.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">B. Сетевая токенизация</text>

<!-- Эмитент обновляет PAN -->
<rect x="20.0" y="300.0" width="120" height="50" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="80.0" y="322.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Эмитент</text>
<text x="80.0" y="336.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">обновляет PAN</text>

<line x1="140.0" y1="325.0" x2="200.0" y2="325.0" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>

<!-- TSP: VTS / MDES (token ↔ PAN маппинг) -->
<rect x="205.0" y="300.0" width="280" height="80" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="345.0" y="318.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">TSP (Token Service Provider)</text>
<text x="345.0" y="332.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">VTS (Visa) · MDES (Mastercard)</text>
<text x="345.0" y="354.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">маппинг token ↔ PAN + криптограмма + lifecycle</text>
<text x="345.0" y="368.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">обновление underlying PAN без участия ТСП</text>

<line x1="485.0" y1="325.0" x2="600.0" y2="325.0" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>
<text x="542.0" y="318.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">токен прежний</text>

<!-- ТСП (нижний) -->
<rect x="605.0" y="300.0" width="100" height="50" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="655.0" y="320.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">ТСП</text>
<text x="655.0" y="334.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">(токен тот же)</text>

<!-- Сноска про покрытие B -->
<text x="20.0" y="400.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Покрытие: зависит от участия эмитента в программе токенизации (VTS / MDES).</text>

<!-- Легенда -->
<text x="20.0" y="430.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Сплошная стрелка — push от сети · пунктирная — inquiry от продавца / PSP.</text>
<text x="20.0" y="444.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Batch — файл/расписание (часы); Real-Time — внутри ответа на авторизацию.</text>
</svg>
