<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 446" width="500" height="446">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
</defs>
<rect x="20" y="20" width="460" height="380" rx="8" fill="#F5F7FD" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3"/>

<!-- CPU center -->
<rect x="200" y="175" width="100" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="250" y="206" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">CPU</text>

<!-- ROM (left-top) -->
<rect x="55" y="85" width="100" height="60" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="105" y="108" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">ROM</text>
<text x="105" y="128" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">ОС, EMV-аплет</text>

<!-- RAM (top) -->
<rect x="200" y="55" width="100" height="60" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="250" y="78" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">RAM</text>
<text x="250" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">рабочая</text>

<!-- EEPROM/Flash (left-bottom) -->
<rect x="55" y="255" width="100" height="60" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="105" y="278" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">EEPROM/Flash</text>
<text x="105" y="298" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">ключи, счётчики</text>

<!-- Crypto (right) -->
<rect x="345" y="170" width="100" height="60" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="395" y="193" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Крипто</text>
<text x="395" y="213" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">копроцессор</text>

<!-- I/O (bottom) -->
<rect x="200" y="285" width="100" height="60" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="250" y="308" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">I/O</text>
<text x="250" y="328" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">ISO 7816</text>

<!-- Bus lines: CPU <-> peripherals -->
<line x1="200" y1="190" x2="155" y2="125" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)" marker-start="url(#arr-Muted-s)"/>
<line x1="250" y1="175" x2="250" y2="115" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)" marker-start="url(#arr-Muted-s)"/>
<line x1="200" y1="210" x2="155" y2="255" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)" marker-start="url(#arr-Muted-s)"/>
<line x1="300" y1="200" x2="345" y2="200" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)" marker-start="url(#arr-Muted-s)"/>
<line x1="250" y1="225" x2="250" y2="285" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)" marker-start="url(#arr-Muted-s)"/>

<!-- I/O -> pad -->
<line x1="250" y1="345" x2="250" y2="395" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="250" y="423" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">Контактная площадка ISO 7816</text>
</svg>
