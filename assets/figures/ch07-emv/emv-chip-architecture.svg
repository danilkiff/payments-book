<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1e1e1e"/></marker>
</defs>
<!-- Group background -->
<rect x="40" y="30" width="220" height="460" rx="10" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="6,3"/>
<!-- ROM -->
<rect x="70" y="50" width="160" height="52" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="150" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">ROM</text>
<text x="150" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">ОС</text>
<!-- CPU -->
<rect x="70" y="142" width="160" height="52" rx="8" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
<text x="150" y="173" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1e1e1e">CPU</text>
<!-- RAM -->
<rect x="70" y="234" width="160" height="52" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="150" y="256" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">RAM</text>
<text x="150" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">рабочая</text>
<!-- EEPROM -->
<rect x="70" y="326" width="160" height="52" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="150" y="348" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">EEPROM / Flash</text>
<text x="150" y="364" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">ключи, счётчики</text>
<!-- I/O -->
<rect x="70" y="418" width="160" height="52" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="150" y="449" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">I/O interface</text>
<!-- Crypto coprocessor -->
<rect x="290" y="152" width="110" height="52" rx="6" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
<text x="345" y="172" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">Crypto</text>
<text x="345" y="188" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">coproc.</text>
<!-- Arrows down the stack -->
<line x1="150" y1="102" x2="150" y2="142" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="150" y1="194" x2="150" y2="234" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="150" y1="286" x2="150" y2="326" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="150" y1="378" x2="150" y2="418" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<!-- CPU → Crypto -->
<line x1="230" y1="168" x2="290" y2="178" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<!-- Arrow under I/O -->
<line x1="150" y1="470" x2="150" y2="510" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="160" y="530" font-family="sans-serif" font-size="12" fill="#555">Контактная площадка ISO 7816</text>
</svg>
