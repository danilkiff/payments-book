<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">

<!-- Column headers -->
<rect x="10" y="10" width="270" height="36" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="145" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Маска TVR ∩ TAC/IAC</text>

<rect x="285" y="10" width="120" height="36" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="345" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Криптограмма</text>

<rect x="410" y="10" width="300" height="36" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="560" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Поведение терминала</text>

<!-- Row 1: Denial != 0 -> AAC (Bad) -->
<rect x="10" y="52" width="270" height="48" rx="6" fill="#F5F7FD" stroke="#C15462" stroke-width="1"/>
<text x="145" y="74" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Denial ≠ 0</text>
<text x="145" y="90" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">любой бит маски Denial выставлен</text>

<rect x="285" y="52" width="120" height="48" rx="6" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="1.5"/>
<text x="345" y="80" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A2030">AAC</text>

<rect x="410" y="52" width="300" height="48" rx="6" fill="#F5F7FD" stroke="#C15462" stroke-width="1"/>
<text x="560" y="74" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">отказ; дальнейшая обработка</text>
<text x="560" y="90" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">прекращается</text>

<!-- Row 2: Online != 0 -> ARQC (AccentA) -->
<rect x="10" y="104" width="270" height="48" rx="6" fill="#F5F7FD" stroke="#4E63D9" stroke-width="1"/>
<text x="145" y="126" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Denial = 0, Online ≠ 0</text>
<text x="145" y="142" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">офлайн-отказ исключён, нужен онлайн</text>

<rect x="285" y="104" width="120" height="48" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="345" y="132" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A2030">ARQC</text>

<rect x="410" y="104" width="300" height="48" rx="6" fill="#F5F7FD" stroke="#4E63D9" stroke-width="1"/>
<text x="560" y="126" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">уход в онлайн</text>
<text x="560" y="142" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">для авторизации эмитентом</text>

<!-- Row 3: обе = 0 -> TC (Good) -->
<rect x="10" y="156" width="270" height="48" rx="6" fill="#F5F7FD" stroke="#2F8B67" stroke-width="1"/>
<text x="145" y="178" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Denial = 0, Online = 0</text>
<text x="145" y="194" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">обе маски пусты</text>

<rect x="285" y="156" width="120" height="48" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="345" y="184" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A2030">TC</text>

<rect x="410" y="156" width="300" height="48" rx="6" fill="#F5F7FD" stroke="#2F8B67" stroke-width="1"/>
<text x="560" y="178" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">офлайн-одобрение картой</text>
<text x="560" y="194" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">без обращения к эмитенту</text>

</svg>
