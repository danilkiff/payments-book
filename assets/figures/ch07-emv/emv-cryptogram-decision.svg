<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1e1e1e"/></marker>
  <marker id="ar-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/></marker>
</defs>
<!-- TVR -->
<rect x="190" y="20" width="140" height="46" rx="8" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
<text x="260" y="40" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">TVR</text>
<text x="260" y="56" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">результаты</text>
<!-- Arrow TVR → Denial -->
<line x1="260" y1="66" x2="260" y2="102" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<!-- Denial decision diamond -->
<polygon points="260,102 340,142 260,182 180,142" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
<text x="260" y="138" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">Denial</text>
<text x="260" y="154" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">≠ 0?</text>
<!-- Да → AAC (left) -->
<line x1="180" y1="142" x2="100" y2="200" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ar-r)"/>
<text x="130" y="168" font-family="sans-serif" font-size="12" fill="#ef4444">Да</text>
<rect x="50" y="200" width="100" height="44" rx="6" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5"/>
<text x="100" y="228" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">AAC</text>
<!-- Нет → Online diamond -->
<line x1="260" y1="182" x2="260" y2="230" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="268" y="212" font-family="sans-serif" font-size="12" fill="#555">Нет</text>
<!-- Online decision diamond -->
<polygon points="260,230 340,270 260,310 180,270" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
<text x="260" y="266" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">Online</text>
<text x="260" y="282" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">≠ 0?</text>
<!-- Да → ARQC (lower-left) -->
<line x1="210" y1="292" x2="140" y2="350" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="158" y="326" font-family="sans-serif" font-size="12" fill="#4a9eed">Да</text>
<rect x="90" y="350" width="100" height="44" rx="6" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="140" y="378" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">ARQC</text>
<!-- Нет → TC (lower-right) -->
<line x1="310" y1="292" x2="380" y2="350" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="360" y="326" font-family="sans-serif" font-size="12" fill="#22c55e">Нет</text>
<rect x="330" y="350" width="100" height="44" rx="6" fill="#d3f9d8" stroke="#22c55e" stroke-width="1.5"/>
<text x="380" y="378" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">TC</text>
<!-- Note -->
<rect x="10" y="418" width="500" height="32" rx="6" fill="#fff9db" stroke="#f59e0b" stroke-width="1"/>
<text x="260" y="439" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">AAC = отказ, ARQC = онлайн, TC = офлайн.</text>
</svg>
