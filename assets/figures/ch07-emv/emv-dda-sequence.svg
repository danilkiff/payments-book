<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 580">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1e1e1e"/></marker>
  <marker id="ar-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4a9eed"/></marker>
  <marker id="ar-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8b5cf6"/></marker>
  <marker id="ar-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
</defs>
<!-- Group background -->
<rect x="30" y="20" width="460" height="540" rx="10" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="6,3"/>
<!-- Step boxes -->
<rect x="80" y="40" width="200" height="46" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="180" y="68" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">Генерация UN</text>
<rect x="80" y="130" width="200" height="46" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="180" y="151" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">INTERNAL AUTH.</text>
<text x="180" y="167" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">+ UN</text>
<rect x="80" y="220" width="200" height="46" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="180" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">Подпись UN</text>
<rect x="80" y="310" width="200" height="46" rx="8" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
<text x="180" y="338" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">SDAD</text>
<rect x="80" y="400" width="200" height="46" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="180" y="420" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e1e1e">Извлечь ICC PK</text>
<text x="180" y="436" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e1e1e">и проверить SDAD</text>
<rect x="80" y="490" width="200" height="46" rx="8" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
<text x="180" y="518" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">Результат DDA</text>
<!-- Actor labels left -->
<text x="74" y="68" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">Терм.</text>
<text x="74" y="158" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">Терм.</text>
<text x="74" y="248" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">Карта</text>
<text x="74" y="338" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">ICC</text>
<text x="74" y="428" text-anchor="end" font-family="sans-serif" font-size="11" fill="#888">Терм.</text>
<!-- Arrows between steps -->
<line x1="180" y1="86" x2="180" y2="130" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar-b)"/>
<line x1="180" y1="176" x2="180" y2="220" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar-b)"/>
<line x1="180" y1="266" x2="180" y2="310" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ar-p)"/>
<line x1="180" y1="356" x2="180" y2="400" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="180" y1="446" x2="180" y2="490" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ar)"/>
<!-- Trust chain -->
<rect x="360" y="390" width="110" height="100" rx="6" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
<text x="415" y="412" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e1e1e">CA PK</text>
<text x="415" y="432" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#adb5bd">↓</text>
<text x="415" y="450" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e1e1e">Issuer PK</text>
<text x="415" y="468" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#adb5bd">↓</text>
<text x="415" y="482" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1e1e1e">ICC PK</text>
<!-- Lookup arrow from Verify to Trust -->
<line x1="280" y1="423" x2="360" y2="423" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ar-a)"/>
</svg>
