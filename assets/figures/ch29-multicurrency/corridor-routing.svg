<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400">
<defs>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Centre: routing decision -->
<rect x="180.0" y="155.0" width="200" height="60" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="280.0" y="180.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Маршрутизация</text>
<text x="280.0" y="198.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">по коридору</text>

<!-- Top-left: cost -->
<rect x="20.0" y="20.0" width="170" height="56" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="105.0" y="40.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Стоимость</text>
<text x="105.0" y="55.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">авторизации/расчёта</text>
<text x="105.0" y="69.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">interchange + scheme fee</text>

<!-- Top-right: payout currency -->
<rect x="370.0" y="20.0" width="170" height="56" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="455.0" y="40.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Валюта выплаты</text>
<text x="455.0" y="55.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">продавцу</text>
<text x="455.0" y="69.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">график выплат, T+N</text>

<!-- Bottom-left: approval rate (+ latency note) -->
<rect x="20.0" y="290.0" width="170" height="56" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="105.0" y="310.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Доля одобрений</text>
<text x="105.0" y="325.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">approval rate</text>
<text x="105.0" y="339.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">включая латентность</text>

<!-- Bottom-right: FX risk -->
<rect x="370.0" y="290.0" width="170" height="56" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="455.0" y="310.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Сторона FX-риска</text>
<text x="455.0" y="325.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">эмитент / DCC / казначейство</text>
<text x="455.0" y="339.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">TTL курса</text>

<!-- Left side: DCC / источник курса (новая плашка) -->
<rect x="20.0" y="156.0" width="140" height="58" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="90.0" y="176.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">DCC / источник</text>
<text x="90.0" y="190.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">курса</text>
<text x="90.0" y="206.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">по BIN / стране / MCC</text>

<!-- Right side: latency / approval -->
<rect x="400.0" y="156.0" width="140" height="58" rx="8" fill="#5C647A" fill-opacity="0.15" stroke="#5C647A" stroke-width="1.5"/>
<text x="470.0" y="176.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Латентность</text>
<text x="470.0" y="192.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">встроена</text>
<text x="470.0" y="205.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">в Approval Rate</text>

<!-- Arrows -->
<line x1="155.0" y1="76.0" x2="225.0" y2="155.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="425.0" y1="76.0" x2="335.0" y2="155.0" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<line x1="155.0" y1="290.0" x2="225.0" y2="215.0" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<line x1="425.0" y1="290.0" x2="335.0" y2="215.0" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>
<line x1="160.0" y1="185.0" x2="180.0" y2="185.0" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<line x1="400.0" y1="185.0" x2="380.0" y2="185.0" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)" stroke-dasharray="6,3"/>
</svg>
