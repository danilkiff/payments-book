<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 280" width="620" height="280">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Timeline axis. Spacing approximates real durations:
     auth → capture: minutes-hours (short)
     capture → clearing: hours (short)
     clearing → settlement: T+1..T+N (medium)
     settlement → payout: days-weeks (long)
-->
<line x1="40.0" y1="140.0" x2="600.0" y2="140.0" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="600.0" y="158.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">время</text>

<!-- Stage markers on axis: auth, capture, clearing, settlement, payout -->
<ellipse cx="70.0"  cy="140.0" rx="7" ry="7" fill="#4E63D9" stroke="#4E63D9" stroke-width="2"/>
<ellipse cx="120.0" cy="140.0" rx="6" ry="6" fill="#ffffff" stroke="#4E63D9" stroke-width="2"/>
<ellipse cx="180.0" cy="140.0" rx="6" ry="6" fill="#ffffff" stroke="#7759D6" stroke-width="2"/>
<ellipse cx="320.0" cy="140.0" rx="7" ry="7" fill="#2F8B67" stroke="#2F8B67" stroke-width="2"/>
<ellipse cx="540.0" cy="140.0" rx="7" ry="7" fill="#B8821C" stroke="#B8821C" stroke-width="2"/>

<!-- Stage labels (under axis) -->
<text x="70.0"  y="172.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">auth</text>
<text x="70.0"  y="185.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">T0</text>
<text x="120.0" y="172.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">capture</text>
<text x="120.0" y="185.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">мин-часы</text>
<text x="180.0" y="172.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">clearing</text>
<text x="180.0" y="185.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">часы</text>
<text x="320.0" y="172.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">settlement</text>
<text x="320.0" y="185.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">T+1..T+N</text>
<text x="540.0" y="172.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">payout</text>
<text x="540.0" y="185.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">дни-недели</text>

<!-- Currency tracks (above axis): transaction, billing, settlement, payout -->
<!-- Each block aligned to its stage marker on axis -->
<!-- Покупка (transaction currency) → auth (x=70) -->
<rect x="15.0" y="14.0" width="110" height="60" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="70.0" y="32.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Покупка</text>
<text x="70.0" y="48.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">transaction</text>
<text x="70.0" y="65.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">EUR</text>

<!-- Расчёт (settlement currency) → settlement (x=320) -->
<rect x="265.0" y="14.0" width="110" height="60" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="320.0" y="32.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Расчёт</text>
<text x="320.0" y="48.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">settlement</text>
<text x="320.0" y="65.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">USD</text>

<!-- Выплата (payout, валюта ТСП) → payout (x=540) -->
<rect x="485.0" y="14.0" width="110" height="60" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="540.0" y="32.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Выплата</text>
<text x="540.0" y="48.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">payout / ТСП</text>
<text x="540.0" y="65.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">GBP</text>

<!-- Billing note (billing currency = EUR / DCC option) tucked above clearing stage -->
<text x="180.0" y="32.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#7759D6">Списание (billing)</text>
<text x="180.0" y="48.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">EUR (или DCC)</text>
<text x="180.0" y="62.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">фиксация — clearing</text>

<!-- Dashed verticals from blocks down to their representative stage on axis (no crossings) -->
<line x1="70.0"  y1="74.0" x2="70.0"  y2="133.0" stroke="#4E63D9" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="180.0" y1="70.0" x2="180.0" y2="133.0" stroke="#7759D6" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="320.0" y1="74.0" x2="320.0" y2="133.0" stroke="#2F8B67" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="540.0" y1="74.0" x2="540.0" y2="133.0" stroke="#B8821C" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Conversion arrows with source/moment labels -->
<line x1="200.0" y1="100.0" x2="260.0" y2="100.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="232.0" y="95.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">EUR → USD</text>
<text x="232.0" y="118.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">правила схемы, clearing</text>

<line x1="380.0" y1="100.0" x2="480.0" y2="100.0" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>
<text x="430.0" y="95.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">USD → GBP</text>
<text x="430.0" y="118.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">FX-провайдер, payout</text>

<!-- Disclaimer + duration legend -->
<text x="40.0" y="218.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Окна на оси — пропорционально реальной длительности (схема, не масштаб):</text>
<text x="40.0" y="232.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">auth→capture — минуты-часы; capture→clearing — часы; clearing→settlement — T+1..T+N; settlement→payout — дни-недели.</text>
<text x="40.0" y="252.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Валюта списания (billing) = домашняя валюта держателя; для DCC меняется на валюту терминала.</text>
<text x="40.0" y="266.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Тройка transaction / settlement / payout на оси не равна тройке определений transaction / billing / settlement из sec:mc-settlement.</text>
</svg>
