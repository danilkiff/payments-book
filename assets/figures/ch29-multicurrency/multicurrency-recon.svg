<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 470" width="540" height="470">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Root: Транзакция #1042 (centered vertically on the whole stack) -->
<rect x="20.0" y="195.0" width="150" height="60" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="2"/>
<text x="95.0" y="220.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Транзакция #1042</text>
<text x="95.0" y="238.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">учебный пример</text>

<!-- Muted arrow to spine -->
<line x1="170.0" y1="225.0" x2="220.0" y2="225.0" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- Dashed vertical spine spanning all stages -->
<line x1="220.0" y1="28.0" x2="220.0" y2="422.0" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- 1. Страница оплаты: 100 EUR (transaction currency) -->
<rect x="230.0" y="20.0" width="290" height="36" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="375.0" y="39.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Страница оплаты: 100 EUR (transaction)</text>

<!-- 2. Авторизация: 100 EUR -->
<rect x="230.0" y="64.0" width="290" height="36" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="375.0" y="83.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Авторизация: 100 EUR</text>

<!-- 3. Billing currency (NEW): валюта списания держателя -->
<rect x="230.0" y="108.0" width="290" height="36" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="375.0" y="127.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Списание держателю: 100 EUR (billing)</text>

<!-- 4. Расчёт: 108 USD (settlement) -->
<rect x="230.0" y="152.0" width="290" height="36" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="375.0" y="171.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Расчёт: 108 USD (settlement, EUR→USD @ 1,08)</text>

<!-- Источник/момент фиксации (мелкая Muted-пометка под Расчёт) -->
<text x="230.0" y="202.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Источник курса EUR→USD: правила схемы; фиксация: момент клиринга</text>

<!-- 5. Раздельные удержания (NEW) — промежуточная плашка -->
<rect x="230.0" y="210.0" width="290" height="120" rx="8" fill="#F5F7FD" stroke="#5C647A" stroke-width="1.5"/>
<text x="375.0" y="227.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Удержания: комиссии не сворачиваются в одну дельту</text>
<line x1="244.0" y1="234.0" x2="506.0" y2="234.0" stroke="#5C647A" stroke-width="1"/>
<text x="244.0" y="251.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">interchange (1,5%)</text>
<text x="506.0" y="251.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">−1,62 USD</text>
<text x="244.0" y="266.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">assessment / scheme fee</text>
<text x="506.0" y="266.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">входит в эквайера*</text>
<text x="244.0" y="281.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">эквайер (2,5%)</text>
<text x="506.0" y="281.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">−2,70 USD</text>
<text x="244.0" y="296.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">комиссия платформы (3%)</text>
<text x="506.0" y="296.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">−3,24 USD</text>
<line x1="244.0" y1="304.0" x2="506.0" y2="304.0" stroke="#5C647A" stroke-width="1"/>
<text x="244.0" y="320.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">итого удержаний</text>
<text x="506.0" y="320.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">−7,56 USD</text>

<!-- 6. Нетто-выплата: 100,44 USD -->
<rect x="230.0" y="338.0" width="290" height="36" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="375.0" y="357.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Нетто-выплата: 100,44 USD</text>

<!-- 7. Счёт продавца: 79,35 GBP -->
<rect x="230.0" y="382.0" width="290" height="36" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="375.0" y="401.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Счёт продавца: 79,35 GBP (USD→GBP @ 0,79)</text>

<text x="230.0" y="432.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Источник курса USD→GBP: FX-провайдер выплаты; фиксация: момент выплаты</text>

<!-- Footer -->
<text x="375.0" y="455.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">* assessment учтён внутри ставки эквайера; держать как отдельный тип в реестре</text>
</svg>
