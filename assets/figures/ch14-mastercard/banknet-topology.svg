<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 350" width="820" height="350">
<defs>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Banknet container -->
<rect x="10" y="10" width="800" height="330" rx="10" fill="#F5F7FD" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="30" y="32" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">Banknet</text>

<!-- ============ Layer 1: Authorization (real-time) ============ -->
<rect x="20" y="50" width="780" height="120" rx="6" fill="#ffffff" stroke="#7759D6" stroke-width="1"/>
<text x="30" y="68" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Авторизация (real-time)</text>

<!-- Эквайер (left) -->
<rect x="40" y="90" width="120" height="50" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="100" y="113" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Эквайер</text>
<text x="100" y="128" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">acquirer</text>

<!-- MIP (left) -->
<rect x="180" y="98" width="70" height="34" rx="6" fill="#5C647A" fill-opacity="0.15" stroke="#5C647A" stroke-width="1.5"/>
<text x="215" y="119" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">MIP</text>

<!-- Authorization Platform (center) -->
<rect x="270" y="78" width="280" height="74" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="410" y="100" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Authorization Platform</text>
<text x="410" y="118" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">коммутатор онлайн-авторизации</text>
<text x="410" y="135" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">stand-in при недоступности эмитента</text>

<!-- MIP (right) -->
<rect x="570" y="98" width="70" height="34" rx="6" fill="#5C647A" fill-opacity="0.15" stroke="#5C647A" stroke-width="1.5"/>
<text x="605" y="119" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">MIP</text>

