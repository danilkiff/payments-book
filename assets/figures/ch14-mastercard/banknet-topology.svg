<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#888"/></marker>
  </defs>

  <!-- Ring/oval -->
  <ellipse cx="260" cy="100" rx="220" ry="85" fill="none" stroke="#555" stroke-width="1.5"/>

  <!-- Authorization Platform (center top) -->
  <rect x="185" y="20" width="150" height="44" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="39" text-anchor="middle" font-size="11" fill="#1e1e1e">Authorization</text>
  <text x="260" y="53" text-anchor="middle" font-size="11" fill="#1e1e1e">Platform</text>

  <!-- Банк-эквайер (left) -->
  <rect x="20" y="75" width="110" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="75" y="97" text-anchor="middle" font-size="11" fill="#1e1e1e">Банк-эквайер</text>

  <!-- Банк-эмитент (right) -->
  <rect x="390" y="75" width="110" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="445" y="97" text-anchor="middle" font-size="11" fill="#1e1e1e">Банк-эмитент</text>

  <!-- Arrows on ring -->
  <path d="M130,84 Q185,50 183,42" fill="none" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <path d="M337,42 Q335,50 388,84" fill="none" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>
  <path d="M390,100 Q330,145 130,100" fill="none" stroke="#555" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Clearing branch below -->
  <text x="260" y="165" text-anchor="middle" font-size="9" fill="#888">внутренняя клиринговая ветка</text>

  <!-- IPM, GCMS, Settlement -->
  <rect x="60" y="178" width="100" height="30" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="197" text-anchor="middle" font-size="11" fill="#1e1e1e">IPM</text>
  <rect x="210" y="178" width="100" height="30" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="260" y="197" text-anchor="middle" font-size="11" fill="#1e1e1e">GCMS</text>
  <rect x="360" y="178" width="100" height="30" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="410" y="197" text-anchor="middle" font-size="11" fill="#1e1e1e">Settlement</text>

  <!-- Clearing arrows -->
  <line x1="160" y1="193" x2="208" y2="193" stroke="#888" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>
  <line x1="310" y1="193" x2="358" y2="193" stroke="#888" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-gray)"/>

  <!-- Note -->
  <rect x="10" y="226" width="500" height="30" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="260" y="245" text-anchor="middle" font-size="10" fill="#555">Одна сеть, разные внутренние подсистемы.</text>
</svg>
