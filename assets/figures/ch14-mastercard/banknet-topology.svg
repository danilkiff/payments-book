<rect x="20" y="180" width="780" height="150" rx="6" fill="#ffffff" stroke="#B8821C" stroke-width="1"/>
<text x="30" y="198" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Клиринг и расчёт (batch, файлы IPM)</text>

<!-- Эквайер (left, layer 2) -->
<rect x="40" y="216" width="120" height="50" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="100" y="239" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Эквайер</text>
<text x="100" y="254" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">acquirer</text>

<!-- MIP (left, layer 2) -->
<rect x="180" y="224" width="70" height="34" rx="6" fill="#5C647A" fill-opacity="0.15" stroke="#5C647A" stroke-width="1.5"/>
<text x="215" y="245" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">MIP</text>

<!-- GCMS (center, layer 2) -->
<rect x="270" y="204" width="280" height="74" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="410" y="226" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">GCMS</text>
<text x="410" y="244" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Global Clearing Management System</text>
<text x="410" y="261" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">IPM-сообщения, пакетная обработка</text>

<!-- MIP (right, layer 2) -->
<rect x="570" y="224" width="70" height="34" rx="6" fill="#5C647A" fill-opacity="0.15" stroke="#5C647A" stroke-width="1.5"/>
<text x="605" y="245" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">MIP</text>

<!-- Эмитент (right, layer 2) -->
<rect x="660" y="216" width="120" height="50" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="720" y="239" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Эмитент</text>
<text x="720" y="254" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">issuer</text>

<!-- Arrows in Clearing layer -->
<line x1="162" y1="241" x2="178" y2="241" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>
<line x1="252" y1="241" x2="268" y2="241" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>
<line x1="552" y1="241" x2="568" y2="241" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>
<line x1="642" y1="241" x2="658" y2="241" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>

<!-- SAM below GCMS -->
<rect x="320" y="290" width="180" height="32" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="410" y="311" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">SAM · расчёт нетто-позиций</text>

<!-- GCMS → SAM vertical arrow -->
<line x1="410" y1="278" x2="410" y2="288" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>

</svg>
