<text x="720" y="128" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">issuer</text>

<!-- Arrows in Authorization layer -->
<line x1="162" y1="115" x2="178" y2="115" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<line x1="252" y1="115" x2="268" y2="115" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<line x1="552" y1="115" x2="568" y2="115" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<line x1="642" y1="115" x2="658" y2="115" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>

