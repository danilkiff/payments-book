<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 365" width="620" height="365">
<defs>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Good-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Warn-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#B8821C"/></marker>
</defs>
<text x="310.0" y="26.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">ABU: жизненный цикл обновления реквизитов</text>

<!-- Issuer multi-step pipeline: регистрация → валидация → daily cadence -->
<text x="20.0" y="58.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">Эмитент: подключение к программе ABU</text>
<rect x="20.0" y="65.0" width="110" height="50" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="75.0" y="86.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">регистрация</text>
<text x="75.0" y="101.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">в программе</text>
<line x1="132.0" y1="90.0" x2="158.0" y2="90.0" stroke="#4E63D9" stroke-width="1.5" marker-end="url(#arr-AccentA)"/>
<rect x="160.0" y="65.0" width="110" height="50" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="215.0" y="86.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">валидация</text>
<text x="215.0" y="101.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">участия / BIN</text>
<line x1="272.0" y1="90.0" x2="298.0" y2="90.0" stroke="#4E63D9" stroke-width="1.5" marker-end="url(#arr-AccentA)"/>
<rect x="300.0" y="65.0" width="120" height="50" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="360.0" y="86.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">ежедневный режим</text>
<text x="360.0" y="101.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">подача обновлений</text>

<!-- Arrow from issuer pipeline to ABU hub -->
<line x1="422.0" y1="90.0" x2="448.0" y2="90.0" stroke="#4E63D9" stroke-width="1.5" marker-end="url(#arr-AccentA)"/>

<!-- Mastercard ABU hub -->
<rect x="450.0" y="60.0" width="150" height="60" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="525.0" y="83.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Mastercard ABU</text>
<text x="525.0" y="98.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">нормализация и</text>
<text x="525.0" y="111.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">распространение</text>

<!-- MDES alternative side panel -->
<rect x="20.0" y="135.0" width="290" height="60" rx="8" fill="#F5F7FD" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<text x="30.0" y="153.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">Альтернатива: сетевые токены (MDES)</text>
<text x="30.0" y="169.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">токен стабилен, PAN под ним меняется в TSP —</text>
<text x="30.0" y="183.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">ABU частично избыточен для токенизированного PAN.</text>

<!-- Distribution from ABU to two destination types: ASI vs ABU API -->
<text x="325.0" y="153.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">Распространение участникам:</text>

<!-- Two arrows from ABU hub down: ASI (inline) and ABU API/Bulk (batch) -->
<line x1="490.0" y1="122.0" x2="430.0" y2="218.0" stroke="#2F8B67" stroke-width="1.5" marker-end="url(#arr-Good)"/>
<text x="325.0" y="172.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Account Status Inquiry</text>
<text x="325.0" y="185.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">встроенная проверка перед повтором</text>

<line x1="560.0" y1="122.0" x2="560.0" y2="218.0" stroke="#B8821C" stroke-width="1.5" marker-end="url(#arr-Warn)"/>
<text x="470.0" y="172.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">ABU API / Bulk File</text>
<text x="470.0" y="185.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">пакетное обновление сохранённых данных</text>

<!-- Destination: acquirer / PSP stored accounts -->
<rect x="370.0" y="220.0" width="230" height="55" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="485.0" y="244.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Эквайер / PSP</text>
<text x="485.0" y="260.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">сохранённые карты (COF)</text>

<!-- Delivery axis: cadence vs real-time -->
<line x1="40.0" y1="305.0" x2="600.0" y2="305.0" stroke="#5C647A" stroke-width="2"/>
<text x="20.0" y="298.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">Доставка к участнику:</text>
<rect x="40.0" y="318.0" width="240" height="36" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="160.0" y="332.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">ABU Bulk File через MFE</text>
<text x="160.0" y="346.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">по графику участника (пакет)</text>
<rect x="320.0" y="318.0" width="280" height="36" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="460.0" y="332.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Онлайн API / ASI (встроенно)</text>
<text x="460.0" y="346.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">перед повторной транзакцией</text>
<ellipse cx="160.0" cy="305.0" rx="5.0" ry="5.0" fill="#B8821C" stroke="#B8821C" stroke-width="1"/>
<ellipse cx="460.0" cy="305.0" rx="5.0" ry="5.0" fill="#2F8B67" stroke="#2F8B67" stroke-width="1"/>
</svg>
