<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 360" width="220" height="360">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  </defs>

  <!-- IPM файл (core) -->
  <rect x="45" y="10" width="130" height="36" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="110" y="32" text-anchor="middle" font-size="11" fill="#1e1e1e">IPM-файл</text>

  <!-- Клиринговая запись (block) -->
  <rect x="45" y="66" width="130" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="110" y="88" text-anchor="middle" font-size="11" fill="#1e1e1e">Клиринговая запись</text>

  <!-- Group border around inner elements -->
  <rect x="38" y="118" width="144" height="138" rx="5" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Message header (block) -->
  <rect x="52" y="124" width="116" height="34" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="110" y="145" text-anchor="middle" font-size="11" fill="#1e1e1e">Message header</text>

  <!-- ISO 8583 data elements (core) -->
  <rect x="52" y="170" width="116" height="36" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="110" y="186" text-anchor="middle" font-size="10" fill="#1e1e1e">ISO 8583</text>
  <text x="110" y="200" text-anchor="middle" font-size="10" fill="#1e1e1e">data elements</text>

  <!-- Fees / adjustments (block) -->
  <rect x="52" y="218" width="116" height="34" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="110" y="234" text-anchor="middle" font-size="10" fill="#1e1e1e">Fees /</text>
  <text x="110" y="247" text-anchor="middle" font-size="10" fill="#1e1e1e">adjustments</text>

  <!-- Arrows -->
  <line x1="110" y1="46" x2="110" y2="64" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="110" y1="102" x2="110" y2="122" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="110" y1="158" x2="110" y2="168" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="110" y1="206" x2="110" y2="216" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- Note -->
  <rect x="10" y="270" width="200" height="56" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="110" y="288" text-anchor="middle" font-size="9" fill="#555">Схема показывает состав</text>
  <text x="110" y="301" text-anchor="middle" font-size="9" fill="#555">записи на уровне крупных</text>
  <text x="110" y="314" text-anchor="middle" font-size="9" fill="#555">блоков, без subelements.</text>
</svg>
