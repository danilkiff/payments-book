<!-- Middle layer: M/Chip, MDES, MCBP -->
<rect x="40" y="76" width="180" height="36" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="130" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">M/Chip</text>

