<text x="520" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">MCBP</text>

<!-- Semantic links between top and middle -->
<line x1="340" y1="74" x2="340" y2="42" stroke="#7759D6" stroke-width="1.5" marker-start="url(#arr-AccentB-s)"/>
<text x="350" y="60" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">криптограмма через MDES</text>

