<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 520 240" width="520" height="240">
<!-- Чистый стек блоков без связей: маркеры стрелок не нужны. -->


<!-- Верхний уровень: два цифровых профиля рядом на общем основании MDES -->
<!-- MCBP (HCE) -->
<rect x="30" y="52" width="170" height="52" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="115" y="76" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A2030">MCBP</text>
<text x="115" y="94" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5C647A">(HCE)</text>

<!-- DSRP (remote) -->
<rect x="200" y="52" width="170" height="52" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="285" y="76" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A2030">DSRP</text>
<text x="285" y="94" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5C647A">(CNP)</text>

<!-- MDES: токенизация -->
<rect x="30" y="104" width="340" height="52" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="200" y="134" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A2030">MDES</text>

<!-- M/Chip: чип -->
<rect x="30" y="156" width="340" height="52" fill="#F5F7FD" stroke="#5C647A" stroke-width="1.5"/>
<text x="200" y="186" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A2030">M/Chip</text>

<!-- EMV base: фундамент -->
<rect x="30" y="208" width="340" height="58" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="200" y="241" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A2030">EMV base</text>

<!-- Роль каждого уровня справа (Muted) -->
<text x="384" y="78" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5C647A">цифровые</text>
<text x="384" y="95" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5C647A">профили</text>
<text x="384" y="135" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5C647A">токенизация</text>
<text x="384" y="187" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5C647A">чип</text>
<text x="384" y="241" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5C647A">фундамент</text>

</svg>
