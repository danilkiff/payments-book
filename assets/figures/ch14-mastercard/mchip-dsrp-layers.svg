<text x="320.0" y="26.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">M/Chip, MDES, DSRP и смежные оси Mastercard</text>

