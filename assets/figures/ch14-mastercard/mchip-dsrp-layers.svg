<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 320" width="510" height="320">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
</defs>
<text x="255.0" y="31.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#1A2030">M/Chip и DSRP: слои</text>

<!-- Bottom: EMV base -->
<rect x="20.0" y="240.0" width="470" height="60" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="255.0" y="266.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="normal" fill="#1A2030">EMV base</text>
<text x="255.0" y="282.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#5C647A">общая EMV-криптография (Book 1–4)</text>

<!-- Left branch: M/Chip (card application) -->
<rect x="20.0" y="140.0" width="220" height="80" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="130.0" y="165.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="normal" fill="#1A2030">M/Chip</text>
<text x="130.0" y="183.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">card application</text>
<text x="130.0" y="199.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">(contact / contactless)</text>

<!-- Right branch: MDES (Token Service Provider) -->
<rect x="270.0" y="140.0" width="220" height="80" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="380.0" y="165.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="normal" fill="#1A2030">MDES</text>
<text x="380.0" y="183.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">Token Service Provider</text>
<text x="380.0" y="199.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">(network token вместо PAN)</text>

<!-- Top right: DSRP (remote) over MDES -->
<rect x="270.0" y="60.0" width="220" height="60" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="380.0" y="85.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="normal" fill="#1A2030">DSRP</text>
<text x="380.0" y="103.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">remote payments (CNP, in-app)</text>

<!-- Arrows: M/Chip → EMV base, MDES → EMV base, DSRP → MDES -->
<line x1="130.0" y1="238.0" x2="130.0" y2="222.0" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)"/>
<line x1="380.0" y1="238.0" x2="380.0" y2="222.0" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)"/>
<line x1="380.0" y1="138.0" x2="380.0" y2="122.0" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)"/>

