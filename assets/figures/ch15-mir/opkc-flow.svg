<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr-a-s" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto-start-reverse"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
    <marker id="arr-warn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker>
  </defs>

  <!-- Phase zones -->
  <rect x="5" y="5" width="220" height="120" rx="5" fill="#dbe4ff" fill-opacity="0.3"/>
  <text x="115" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a9eed">Авторизация</text>

  <rect x="230" y="5" width="260" height="120" rx="5" fill="#fff3bf" fill-opacity="0.4"/>
  <text x="360" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#b45309">Клиринг</text>

  <rect x="495" y="5" width="220" height="120" rx="5" fill="#d3f9d8" fill-opacity="0.4"/>
  <text x="605" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#22c55e">Расчёт</text>

  <!-- Auth zone nodes -->
  <rect x="18" y="28" width="78" height="36" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="57" y="50" text-anchor="middle" font-size="10" fill="#1e1e1e">Терминал</text>

  <rect x="115" y="28" width="95" height="36" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="162" y="44" text-anchor="middle" font-size="10" fill="#1e1e1e">Банк-</text>
  <text x="162" y="57" text-anchor="middle" font-size="10" fill="#1e1e1e">эквайер</text>

  <!-- Clearing zone nodes -->
  <rect x="248" y="28" width="110" height="36" rx="4" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="303" y":"44" text-anchor="middle" font-size="10" fill="#1e1e1e">ОПКЦ</text>
  <text x="303" y="57" text-anchor="middle" font-size="10" fill="#1e1e1e">(НСПК)</text>

  <rect x="375" y="28" width="95" height="36" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="422" y="44" text-anchor="middle" font-size="10" fill="#1e1e1e">Банк-</text>
  <text x="422" y="57" text-anchor="middle" font-size="10" fill="#1e1e1e">эмитент</text>

  <!-- Netto positions -->
  <rect x="268" y="90" width="90" height="28" rx="4" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="313" y="108" text-anchor="middle" font-size="9" fill="#1e1e1e">нетто-позиции</text>

  <!-- Settlement zone nodes -->
  <rect x="508" y="28" width="110" height="36" rx="4" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="563" y="44" text-anchor="middle" font-size="10" fill="#1e1e1e">Банк России</text>
  <text x="563" y="57" text-anchor="middle" font-size="10" fill="#1e1e1e">(расчёт)</text>

  <rect x="630" y="28" width":"80" height="36" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="670" y="44" text-anchor="middle" font-size="9" fill="#1e1e1e">корсчета</text>
  <text x="670" y="57" text-anchor="middle" font-size="9" fill="#1e1e1e">банков</text>

  <!-- Auth zone arrows -->
  <line x1="96" y1="46" x2="113" y2="46" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <line x1="210" y1="46" x2="246" y2="46" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <!-- Return arrow from issuer to terminal -->
  <line x1="422" y1="72" x2="57" y2="72" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>

  <!-- Clearing arrows (dashed) -->
  <line x1="303" y1="64" x2="303" y2="88" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-warn)"/>
  <text x="320" y="82" font-size="8" fill="#888">T+0/T+1</text>

  <!-- Settlement arrows -->
  <line x1="358" y1="104" x2="506" y2="46" stroke="#8b5cf6" stroke-width="1.3" marker-end="url(#arr-b)"/>
  <line x1="618" y1="46" x2="628" y2="46" stroke="#8b5cf6" stroke-width="1.3" marker-end="url(#arr-b)"/>
  <text x="598" y="76" font-size="8" fill="#888">перевод средств</text>

  <!-- OPKC → Issuer auth -->
  <line x1="358" y1="46" x2="373" y2="46" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
</svg>
