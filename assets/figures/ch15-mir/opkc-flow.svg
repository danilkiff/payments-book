<text x="375.0" y="198.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">С марта 2022 г. через ОПКЦ маршрутизируется и внутрироссийский трафик Visa/Mastercard российских банков.</text>
