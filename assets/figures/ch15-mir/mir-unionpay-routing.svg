<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C15462"/></marker>
</defs>

<!-- TITLE -->
<text x="410" y="20" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Кобейдж Мир–UnionPay: реальные AID, выбор приложения и три исхода</text>

<!-- CARD: 2 applications -->
<rect x="20" y="35" width="380" height="135" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="210" y="55" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Кобейджинговая карта</text>
<text x="210" y="69" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">PSE / PPSE содержит два EMV-приложения</text>

<!-- App 1: Mir -->
<rect x="35" y="80" width="170" height="80" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="120" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Mir Credit</text>
<text x="45" y="115" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">AID:</text>
<text x="195" y="115" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">A000000658 1010</text>
<text x="45" y="130" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">RID (5 байт):</text>
<text x="195" y="130" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">A0 00 00 06 58</text>
<text x="45" y="148" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#4E63D9">tag 87 = 01</text>
<text x="195" y="148" text-anchor="end" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#5C647A">высший приоритет</text>

<!-- App 2: UnionPay -->
<rect x="215" y="80" width="170" height="80" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="300" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">UnionPay Credit</text>
<text x="225" y="115" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">AID:</text>
<text x="375" y="115" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">A000000333 010102</text>
<text x="225" y="130" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">RID (5 байт):</text>
<text x="375" y="130" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">A0 00 00 03 33</text>
<text x="225" y="148" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#4E63D9">tag 87 = 02</text>
<text x="375" y="148" text-anchor="end" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#5C647A">второй приоритет</text>

<!-- TERMINAL AID list (right side, 3 scenarios) -->
<rect x="420" y="35" width="380" height="135" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="610" y="55" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Терминал · Terminal AID list (RID)</text>
<text x="610" y="69" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">три типичные конфигурации приёма</text>

<rect x="435" y="80" width="115" height="80" rx="6" fill="#ffffff" stroke="#2F8B67" stroke-width="1.5"/>
<text x="492" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">Российский POS</text>
<text x="492" y="118" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">A0 00 00 06 58</text>
<text x="492" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">MIR Kernel</text>
<text x="492" y="151" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">UICS обычно нет</text>

<rect x="555" y="80" width="115" height="80" rx="6" fill="#ffffff" stroke="#2F8B67" stroke-width="1.5"/>
<text x="612" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">Зарубежный POS</text>
<text x="612" y="118" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">A0 00 00 03 33</text>
<text x="612" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">UICS</text>
<text x="612" y="151" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">MIR Kernel нет</text>

<rect x="675" y="80" width="115" height="80" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="732" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">POS без двух</text>
<text x="732" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">нет MIR Kernel</text>
<text x="732" y="132" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">нет UICS</text>
<text x="732" y="151" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">редко</text>

<!-- Arrows from card/terminal into Combination Selection -->
<line x1="210" y1="170" x2="370" y2="225" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)"/>
<line x1="610" y1="170" x2="450" y2="225" stroke="#5C647A" stroke-width="1.5" marker-end="url(#arr-Muted)"/>

<!-- COMBINATION SELECTION block -->
<rect x="240" y="195" width="340" height="105" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="410" y="215" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Combination Selection (EMV Book 1)</text>
<text x="250" y="237" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">1.</tspan> Candidate list = AID карты ∩ AID терминала (по RID)</text>
<text x="250" y="253" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">2.</tspan> Если несколько кандидатов — выбираем с наименьшим tag 87</text>
<text x="250" y="269" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">3.</tspan> Дополнительно: поддержанное ядро, валюта операции, MCC</text>
<text x="250" y="288" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#5C647A">tag 87 (Application Priority Indicator) — байт, 01 = высший приоритет</text>

<!-- Arrows fanning out to 3 outcomes -->
<line x1="320" y1="300" x2="160" y2="345" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<line x1="410" y1="300" x2="410" y2="345" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="500" y1="300" x2="660" y2="345" stroke="#C15462" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Bad)"/>

<!-- OUTCOME 1: Mir route -->
<rect x="20" y="345" width="265" height="140" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="152" y="365" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">A · Mir выбран</text>
<text x="35" y="385" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Условие: AID карты Mir есть в Terminal AID list,</text>
<text x="35" y="398" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">tag 87 = 01 → выигрывает по приоритету</text>
<text x="35" y="418" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Маршрут</text>
<text x="35" y="431" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ОПКЦ НСПК · правила ПС Мир</text>
<text x="35" y="444" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">расчёт между российскими участниками —</text>
<text x="35" y="457" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">через Банк России</text>
<text x="35" y="476" text-anchor="start" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">типичный сценарий: операция в РФ</text>

<!-- OUTCOME 2: UnionPay route -->
<rect x="295" y="345" width="230" height="140" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="410" y="365" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">B · UnionPay выбран</text>
<text x="310" y="385" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Условие: AID Mir отсутствует</text>
<text x="310" y="398" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">в Terminal AID list, UICS есть</text>
<text x="310" y="418" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Маршрут</text>
<text x="310" y="431" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">сеть UnionPay International (UPI)</text>
<text x="310" y="444" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">правила и тарифы UnionPay,</text>
<text x="310" y="457" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">расчёт через UPI-инфраструктуру</text>
<text x="310" y="476" text-anchor="start" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">типичный сценарий: операция за рубежом</text>

<!-- OUTCOME 3: Empty candidate list -->
<rect x="535" y="345" width="265" height="140" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="667" y="365" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">C · Empty candidate list</text>
<text x="550" y="385" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Условие: ни MIR Kernel, ни UICS</text>
<text x="550" y="398" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">в Terminal AID list (или оба BIN заблокированы)</text>
<text x="550" y="418" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Исход</text>
<text x="550" y="431" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">отказ до GPO, либо</text>
<text x="550" y="444" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">mag-stripe fallback (по конфигурации</text>
<text x="550" y="457" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">терминала и правилам сети)</text>
<text x="550" y="476" text-anchor="start" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">в строгом EMV-режиме — decline</text>

<!-- STATUS NOTE -->
<rect x="20" y="500" width="780" height="55" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="32" y="518" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Статус кобейджей на 2025–2026</text>
<text x="32" y="534" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">Mir–JCB:</tspan> приём прекращён 14.03.2022, новые карты не выпускаются. <tspan font-weight="bold">Mir–UnionPay:</tspan> после внесения НСПК в SDN-список OFAC</text>
<text x="32" y="548" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">(23.02.2024) международная функциональность сильно ограничена; на 2025 эмиссия осталась у Россельхозбанка и АТБ, BIN-ы других эмитентов часто блокируются за рубежом.</text>

</svg>
