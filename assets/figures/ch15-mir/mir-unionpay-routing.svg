<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 270" width="820" height="270">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-Bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C15462"/></marker>
</defs>

<!-- COBADGE CARD (compact) -->
<rect x="280" y="25" width="260" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="410" y="44" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Кобейджинговая карта</text>
<text x="410" y="59" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">Mir Credit · A0 00 00 06 58 10 10  ·  tag 87 = 01</text>
<text x="410" y="71" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">UnionPay Credit · A0 00 00 03 33 01 01 02  ·  tag 87 = 02</text>

<!-- Branching arrows -->
<line x1="340" y1="75" x2="155" y2="110" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<line x1="410" y1="75" x2="410" y2="110" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="480" y1="75" x2="665" y2="110" stroke="#C15462" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Bad)"/>

<!-- OUTCOME A: Mir → ОПКЦ -->
<rect x="20" y="110" width="265" height="115" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="152" y="130" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">A · Mir выбран</text>
<text x="32" y="158" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Маршрут</text>
<text x="32" y="171" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ОПКЦ НСПК</text>
<text x="32" y="195" text-anchor="start" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">типичный сценарий — операция в РФ</text>

<!-- OUTCOME B: UnionPay → UPI -->
<rect x="295" y="110" width="230" height="115" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="410" y="130" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">B · UnionPay выбран</text>
<text x="307" y="158" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Маршрут</text>
<text x="307" y="171" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">UnionPay International</text>
<text x="307" y="195" text-anchor="start" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">типичный сценарий — операция за рубежом</text>

<!-- OUTCOME C: Empty candidate list -->
<rect x="535" y="110" width="265" height="115" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="667" y="130" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">C · Empty candidate list</text>
<text x="547" y="158" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Исход</text>
<text x="547" y="171" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">decline / fallback</text>

</svg>
