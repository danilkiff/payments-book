<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 320" width="240" height="320">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
  </defs>

  <!-- Кобейджинговая карта (core) -->
  <rect x="55" y="10" width="130" height="40" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="120" y="28" text-anchor="middle" font-size="11" fill="#1e1e1e">Кобейджинговая</text>
  <text x="120" y="42" text-anchor="middle" font-size="11" fill="#1e1e1e">карта</text>

  <!-- Arrow to decision -->
  <line x1="120" y1="50" x2="120" y2="78" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Decision diamond -->
  <polygon points="120,80 175,115 120,150 65,115" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="110" text-anchor="middle" font-size="10" fill="#1e1e1e">Терминал</text>
  <text x="120" y="123" text-anchor="middle" font-size="10" fill="#1e1e1e">в России?</text>

  <!-- Yes arrow → Mir route -->
  <line x1="120" y1="150" x2="120" y2="178" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="96" y="167" font-size="9" fill="#4a9eed">Да</text>

  <!-- Mir route -->
  <rect x="30" y="180" width="180" height="56" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="198" text-anchor="middle" font-size="10" fill="#1e1e1e">Да: ОПКЦ</text>
  <text x="120" y="212" text-anchor="middle" font-size="10" fill="#1e1e1e">правила Мир</text>
  <text x="120" y="226" text-anchor="middle" font-size="10" fill="#1e1e1e">расчёт Банк России</text>

  <!-- No arrow → UPI route -->
  <line x1="120" y1="236" x2="120" y2="258" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="128" y="250" font-size="9" fill="#8b5cf6">Нет</text>

  <!-- UPI route -->
  <rect x="30" y="260" width="180" height="56" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="278" text-anchor="middle" font-size="10" fill="#1e1e1e">Нет: UPI</text>
  <text x="120" y="292" text-anchor="middle" font-size="10" fill="#1e1e1e">правила UnionPay</text>
  <text x="120" y="306" text-anchor="middle" font-size="10" fill="#1e1e1e">сеть UnionPay</text>
</svg>
