<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" width="820" height="620">

<!-- TITLE -->
<text x="410" y="22" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Контур Мир: гибридная криптография HSM (ГОСТ + 3DES)</text>
<text x="410" y="38" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">что отличается от международного контура — слой за слоем</text>

<!-- TABLE HEADER -->
<text x="22" y="78" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Слой / операция</text>

<rect x="155" y="55" width="180" height="40" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="245" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Международная схема</text>
<text x="245" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#5C647A">Visa · Mastercard · Amex</text>

<rect x="345" y="55" width="195" height="40" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="442" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Контур Мир</text>
<text x="442" y="86" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#5C647A">НСПК · банки-эмитенты</text>

<!-- ROW 1: Норматив -->
<text x="22" y="113" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Норматив</text>
<text x="165" y="113" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">PCI SSC, scheme rules</text>
<text x="355" y="113" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ЦБ 719-П, 851-П, ФСБ №378</text>

<!-- ROW 2: Сертификация HSM -->
<rect x="15" y="120" width="525" height="26" fill="#F5F7FD"/>
<text x="22" y="138" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Сертификация HSM</text>
<text x="165" y="138" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">FIPS 140-3 L3–L4, PCI PTS HSM</text>
<text x="355" y="138" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ФСБ КВ2 + реестр Минпромторга</text>

<!-- ROW 3: LMK -->
<text x="22" y="163" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">LMK (корневой)</text>
<text x="165" y="163" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">AES / 3DES</text>
<text x="355" y="163" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">AES / 3DES, опц. Кузнечик</text>

<!-- ROW 4: Зональный ключ -->
<rect x="15" y="170" width="525" height="26" fill="#F5F7FD"/>
<text x="22" y="188" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Зональный ключ к ПС</text>
<text x="165" y="188" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ZMK Visa/MC (3DES / AES)</text>
<text x="355" y="188" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ZAK НСПК (ГОСТ 34.12/34.13)</text>

<!-- ROW 5: PIN-блок -->
<text x="22" y="213" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">PIN-блок (ZPK)</text>
<text x="165" y="213" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ISO 9564 F0, 3DES / AES</text>
<text x="355" y="213" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">F0 (3DES), F4 опц., Кузнечик опц.</text>

<!-- ROW 6: ARQC -->
<rect x="15" y="220" width="525" height="26" fill="#F5F7FD"/>
<text x="22" y="238" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Online ARQC / ARPC</text>
<text x="165" y="238" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">EMV CSK на 3DES / AES</text>
<text x="355" y="238" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">EMV CSK на 3DES (ГОСТ не активирован)</text>

<!-- ROW 7: MAC ISO 8583 -->
<text x="22" y="263" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">MAC канала с ПС</text>
<text x="165" y="263" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">3DES-MAC, ISO 9797-1 alg. 3</text>
<text x="355" y="263" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ГОСТ-MAC по ГОСТ 34.13</text>

<!-- ROW 8: ЭП и хеш -->
<rect x="15" y="270" width="525" height="26" fill="#F5F7FD"/>
<text x="22" y="288" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">ЭП клир. файлов и хеш</text>
<text x="165" y="288" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">RSA / ECDSA + SHA-2</text>
<text x="355" y="288" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ГОСТ 34.10-2012 + Стрибог</text>

<!-- ROW 9: Хост-API -->
<text x="22" y="313" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Хост-API HSM</text>
<text x="165" y="313" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Thales A0 / JA / KQ ...</text>
<text x="355" y="313" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Thales-эмуляция + PKCS#11 GOST</text>

<!-- ROW 10: Offline auth -->
<rect x="15" y="320" width="525" height="26" fill="#F5F7FD"/>
<text x="22" y="338" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Offline auth (SDA/DDA/CDA)</text>
<text x="165" y="338" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">RSA, сертификат CA схемы</text>
<text x="355" y="338" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">RSA, сертификат CA НСПК</text>

<!-- HYBRID INSIGHT BANNER -->
<rect x="15" y="360" width="525" height="100" rx="6" fill="#B8821C" fill-opacity="0.10" stroke="#B8821C" stroke-width="1.5"/>
<text x="25" y="378" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Гибрид MPA: ГОСТ не вытесняет 3DES, а добавляется поверх</text>

<text x="25" y="397" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold" fill="#5C647A">3DES (EMV CSK)</tspan> — онлайн-криптограммы ARQC/ARPC карты Мир: массово оставлен,</text>
<text x="25" y="409" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">потому что POS/ATM-инфраструктура и алгоритм EMV CSK обкатаны на 3DES.</text>
<text x="25" y="427" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold" fill="#5C647A">ГОСТ 34.12/34.13 (Магма/Кузнечик)</tspan> — MAC канала с НСПК (ZAK), опционально</text>
<text x="25" y="439" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">PIN-блок и LMK.</text>
<text x="25" y="453" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold" fill="#5C647A">ГОСТ 34.10-2012 + Стрибог</tspan> — подпись клиринговых файлов с НСПК, УЦ ПС Мир.</text>

<!-- NORMATIVE REFERENCE -->
<rect x="15" y="475" width="525" height="55" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="25" y="493" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Где зафиксирован профиль криптографии</text>
<text x="25" y="510" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Положение ЦБ 719-П (защита информации при переводах), Положение ЦБ 851-П</text>
<text x="25" y="522" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">(с 29.03.2025 заменило 683-П), ФТТ ЦБ №ФТ-56-3/35 (HSM), Приказ ФСБ №378.</text>

<!-- RIGHT PANEL: Russian HSM vendors -->
<text x="675" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Российские платёжные HSM</text>
<text x="675" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" fill="#5C647A">три вендора в эмиссионном контуре Мир</text>

<!-- Vendor 1: КриптоПро HSM -->
<rect x="555" y="100" width="245" height="135" rx="6" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="565" y="118" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">КриптоПро HSM 2.0 R3</text>
<text x="565" y="131" text-anchor="start" font-family="Inter, sans-serif" font-size="8" fill="#5C647A">с Платёжным модулем</text>
<text x="565" y="151" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">Сертификация:</tspan> ФСБ КВ2</text>
<text x="565" y="165" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Программа испытаний v.1.15</text>
<text x="565" y="177" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">согласована с НСПК и ЦБ</text>
<text x="565" y="197" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">Интеграция:</tspan></text>
<text x="565" y="211" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">СмартВиста, TranzWare,</text>
<text x="565" y="223" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">OpenWay, Pronit</text>

<!-- Vendor 2: ViPNet HSM PS -->
<rect x="555" y="245" width="245" height="135" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="565" y="263" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">ViPNet HSM PS</text>
<text x="565" y="276" text-anchor="start" font-family="Inter, sans-serif" font-size="8" fill="#5C647A">АО «ИнфоТеКС»</text>
<text x="565" y="296" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">Сертификация:</tspan> ФСБ КВ2</text>
<text x="565" y="310" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">(СКЗИ и средство ЭП)</text>
<text x="565" y="330" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">Производительность:</tspan></text>
<text x="565" y="344" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">до 4000 tps на верификации</text>
<text x="565" y="356" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">PVV/CVV</text>

<!-- Vendor 3: SPB HSM PS -->
<rect x="555" y="390" width="245" height="140" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="565" y="408" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">SPB HSM PS / Plus / base</text>
<text x="565" y="421" text-anchor="start" font-family="Inter, sans-serif" font-size="8" fill="#5C647A">ООО «Системы Практической Безопасности»</text>
<text x="565" y="441" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">Сертификация:</tspan> ФСБ КВ2,</text>
<text x="565" y="455" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">реестр Минпромторга 43259/11</text>
<text x="565" y="475" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">Производительность:</tspan></text>
<text x="565" y="489" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">1000–25000 tps (три модели)</text>
<text x="565" y="509" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030"><tspan font-weight="bold">Соответствие:</tspan></text>
<text x="565" y="523" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">382-П, PCI PTS HSM 3.0</text>

<!-- BOTTOM caveat -->
<rect x="15" y="545" width="790" height="60" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="25" y="563" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Что закрыто за пределами публичных источников</text>
<text x="25" y="578" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Точный список рекомендованных НСПК моделей HSM, конкретные KEK-конструкции мостов с международной</text>
<text x="25" y="590" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">инфраструктурой при кобейдже, ГОСТ-профиль MPA для онлайн-криптограмм — в Правилах ПС Мир для участников,</text>
<text x="25" y="602" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">не в открытой публикации.</text>

</svg>
