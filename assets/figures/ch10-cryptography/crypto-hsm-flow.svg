<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" width="820" height="540">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- TITLE -->
<text x="410" y="20" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">HSM в авторизационном потоке: ключи, операции, команды payShield</text>

<!-- CENTRAL FLOW -->
<rect x="300" y="40" width="200" height="40" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="400" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Терминал</text>

<line x1="400" y1="80" x2="400" y2="120" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="408" y="100" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">1. ARQC + PIN-блок (TPK)</text>

<rect x="300" y="120" width="200" height="40" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="400" y="144" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Эквайер</text>

<line x1="400" y1="160" x2="400" y2="200" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="408" y="180" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">маршрутизация · PIN под ZPK</text>

<rect x="300" y="200" width="200" height="40" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="400" y="224" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Карточная сеть</text>

<line x1="400" y1="240" x2="400" y2="280" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="408" y="260" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">маршрутизация · PIN перешифрован</text>

<rect x="300" y="280" width="200" height="40" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="400" y="304" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Хост эмитента</text>

<line x1="385" y1="320" x2="385" y2="370" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="378" y="350" text-anchor="end" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">3. данные</text>

<line x1="415" y1="370" x2="415" y2="320" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="422" y="350" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">4. ARPC</text>

<!-- HSM ЭМИТЕНТА (central bottom, expanded) -->
<rect x="270" y="370" width="260" height="115" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2" stroke-dasharray="6,3"/>
<text x="400" y="390" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">HSM эмитента</text>

<text x="282" y="408" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Ключи (под LMK)</text>
<text x="282" y="421" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">IMK-AC · IMK-SMI · IMK-SMC</text>

<text x="282" y="441" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Деривация на транзакцию</text>
<text x="282" y="453" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">MK = KDF(IMK, PAN+PSN)</text>
<text x="282" y="465" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">SK_AC = f(MK_AC, ATC)</text>

<text x="282" y="479" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#5C647A">по EMV CSK (MasterCard) или VIS (Visa)</text>

<!-- HSM ЭКВАЙЕРА (left top) -->
<rect x="15" y="40" width="265" height="170" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2" stroke-dasharray="6,3"/>
<text x="147" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">HSM эквайера</text>

<text x="27" y="80" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Ключи (под LMK)</text>
<text x="27" y="93" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">TPK (06-07) · ZPK (06-07)</text>
<text x="27" y="105" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">CVK (18-19) · PVK (14-15)</text>
<text x="27" y="117" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">ZMK / TMK (04-05) — KEK</text>

<text x="27" y="138" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Операции</text>
<text x="27" y="151" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4E63D9">JC/JD</text>
<text x="65" y="151" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">PIN: TPK → LMK (вход с терминала)</text>
<text x="27" y="164" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4E63D9">JE/JF</text>
<text x="65" y="164" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">PIN: ZPK → LMK (вход из сети)</text>
<text x="27" y="177" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4E63D9">CA/CB</text>
<text x="65" y="177" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">PIN: TPK → ZPK (для выхода в сеть)</text>
<text x="27" y="190" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4E63D9">CW/CX</text>
<text x="65" y="190" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Generate / Verify CVV под CVK</text>
<text x="27" y="203" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4E63D9">BE/BF</text>
<text x="65" y="203" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Verify Interchange PIN (ZPK)</text>

<!-- arrow from HSM эквайера to Эквайер -->
<line x1="280" y1="140" x2="300" y2="140" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>

<!-- ЗОНАЛЬНЫЙ HSM (left middle) -->
<rect x="15" y="220" width="265" height="120" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3"/>
<text x="147" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Зональный HSM (сети)</text>

<text x="27" y="258" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Ключи</text>
<text x="27" y="271" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">ZPK (зона эквайера) ↔ ZPK (зона эмитента)</text>

<text x="27" y="292" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Операция</text>
<text x="27" y="305" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Перешифрование PIN-блока между парами</text>
<text x="27" y="317" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ZPK (вход) → ZPK (выход), смена ключа без</text>
<text x="27" y="329" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">выноса clear-text PIN из HSM</text>

<line x1="280" y1="270" x2="300" y2="220" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>

<!-- HSM ЭМИТЕНТА — extended right panel (key derivation + KQ/KR) -->
<rect x="540" y="40" width="265" height="280" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2" stroke-dasharray="6,3"/>
<text x="672" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Операции HSM эмитента (детально)</text>

<text x="552" y="80" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">2. Verify ARQC</text>
<text x="552" y="93" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#7759D6">KQ</text>
<text x="585" y="93" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Verify a TC/ARQC</text>
<text x="552" y="106" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">  → деривация MK_AC из IMK-AC + PAN+PSN</text>
<text x="552" y="119" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">  → деривация SK_AC из MK_AC + ATC</text>
<text x="552" y="132" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">  → MAC(SK_AC, CDOL1) == ARQC ?</text>

<text x="552" y="155" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">3. Issuer host принимает решение</text>
<text x="552" y="168" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">  → ARC (Authorization Response Code)</text>
<text x="552" y="181" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">  → CSU (Card Status Update — флаги)</text>

<text x="552" y="204" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">4. Generate ARPC</text>
<text x="552" y="217" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#7759D6">KR</text>
<text x="585" y="217" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Generate ARPC</text>
<text x="552" y="230" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">  → ARPC = MAC(SK_AC, ARQC XOR ARC)</text>

<text x="552" y="253" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Verify Truncated AC (Mastercard CAP)</text>
<text x="552" y="266" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#7759D6">K2/K3</text>
<text x="595" y="266" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Chip Authentication Programme</text>
<text x="552" y="279" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">  → проверка усечённой криптограммы (отд. UX)</text>

<text x="552" y="302" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">PIN verification</text>
<text x="552" y="315" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#7759D6">DC/DD</text>
<text x="595" y="315" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">Verify Terminal PIN (Visa PVV)</text>

<!-- arrow Hosted Emitter to HSM extended panel -->
<line x1="500" y1="300" x2="540" y2="170" stroke="#7759D6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-AccentB)"/>

<!-- BOTTOM LEGEND: Thales payShield commands -->
<rect x="15" y="500" width="790" height="35" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="25" y="518" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">payShield host commands (General Reference, не Legacy-набор):</text>
<text x="25" y="531" text-anchor="start" font-family="Inter, sans-serif" font-size="8" fill="#5C647A">A0/A1 Gen Key · BC/BD Verify TPK-PIN · BE/BF Verify ZPK-PIN · CA/CB PIN TPK→ZPK · CW/CX CVV · DC/DD Verify Visa PVV · JC/JD PIN TPK→LMK · JE/JF PIN ZPK→LMK · KQ/KR ARQC/ARPC (EMV 3.1.1) · K2/K3 Verify Truncated AC (Mastercard CAP)</text>

</svg>
