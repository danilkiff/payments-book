<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 460" width="220" height="460">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  </defs>
  <!-- BDK (HSM) with dashed border -->
  <rect x="55" y="10" width="110" height="44" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="110" y="29" text-anchor="middle" font-size="11" fill="#1e1e1e">BDK</text>
  <text x="110" y="43" text-anchor="middle" font-size="9" fill="#555">в HSM эквайера</text>

  <!-- Arrow BDK→IPEK -->
  <line x1="110" y1="54" x2="110" y2="74" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="118" y="67" font-size="9" fill="#4a9eed">KSN</text>

  <!-- IPEK (terminal) with dashed border -->
  <rect x="60" y="76" width="100" height="44" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="110" y="95" text-anchor="middle" font-size="11" fill="#1e1e1e">IPEK</text>
  <text x="110" y="109" text-anchor="middle" font-size="9" fill="#555">в терминале</text>
  <text x="110" y="130" text-anchor="middle" font-size="8" fill="#8b5cf6">IPEK удаляют после init</text>

  <!-- Arrow IPEK→Tree -->
  <line x1="110" y1="120" x2="110" y2="148" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Tree -->
  <rect x="65" y="150" width="90" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="110" y="172" text-anchor="middle" font-size="11" fill="#1e1e1e">Дерево 21 уровня</text>

  <!-- Arrows to leaf keys -->
  <line x1="95" y1="186" x2="72" y2="214" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="125" y1="186" x2="148" y2="214" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Leaf keys row 1: Key 1, Key 2 -->
  <rect x="35" y="216" width="70" height="34" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="70" y="237" text-anchor="middle" font-size="10" fill="#1e1e1e">Key 1</text>
  <!-- X over Key 1 -->
  <line x1="38" y1="219" x2="102" y2="247" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="38" y1="247" x2="102" y2="219" stroke="#8b5cf6" stroke-width="1.5"/>

  <rect x="115" y="216" width="70" height="34" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="150" y="237" text-anchor="middle" font-size="10" fill="#1e1e1e">Key 2</text>
  <!-- X over Key 2 -->
  <line x1="118" y1="219" x2="182" y2="247" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="118" y1="247" x2="182" y2="219" stroke="#8b5cf6" stroke-width="1.5"/>

  <!-- Arrows to leaf keys row 2 -->
  <line x1="70" y1="250" x2="70" y2="276" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="150" y1="250" x2="150" y2="276" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Leaf keys row 2: Key 3, Key N -->
  <rect x="35" y="278" width="70" height="34" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="70" y="299" text-anchor="middle" font-size="10" fill="#1e1e1e">Key 3</text>
  <rect x="115" y="278" width="70" height="34" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="150" y="299" text-anchor="middle" font-size="10" fill="#1e1e1e">Key N</text>

  <!-- Group border around leaves -->
  <rect x="25" y="208" width="170" height="110" rx="5" fill="none" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Note -->
  <rect x="10" y="330" width="200" height="56" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="110" y="347" text-anchor="middle" font-size="9" fill="#555">DUKPT порождает</text>
  <text x="110" y="360" text-anchor="middle" font-size="9" fill="#555">одноразовые</text>
  <text x="110" y="373" text-anchor="middle" font-size="9" fill="#555">ключи транзакций.</text>
</svg>
