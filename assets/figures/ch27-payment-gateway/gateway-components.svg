<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
</defs>
<!-- Left: Запрос ТСП -->
<rect x="20.0" y="130.0" width="130" height="56" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="85.0" y="155.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Запрос ТСП</text>
<text x="85.0" y="172.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">HTTPS / JSON</text>
<!-- Gateway container (dashed) -->
<rect x="180.0" y="20.0" width="220" height="280" rx="8" fill="#F5F7FD" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<text x="290.0" y="38.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#5C647A">Платёжный шлюз</text>
<!-- 5 components stacked -->
<rect x="200.0" y="50.0" width="180" height="36" rx="8" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="290.0" y="73.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">API gateway</text>
<rect x="200.0" y="98.0" width="180" height="36" rx="8" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="290.0" y="121.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Risk engine</text>
<rect x="200.0" y="146.0" width="180" height="36" rx="8" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="290.0" y="169.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Routing engine</text>
<rect x="200.0" y="194.0" width="180" height="36" rx="8" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="290.0" y="217.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Token vault</text>
<rect x="200.0" y="242.0" width="180" height="36" rx="8" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="290.0" y="265.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Auth proxy</text>
<!-- Internal arrows between components -->
<line x1="290.0" y1="86.0" x2="290.0" y2="98.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="290.0" y1="134.0" x2="290.0" y2="146.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="290.0" y1="182.0" x2="290.0" y2="194.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="290.0" y1="230.0" x2="290.0" y2="242.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<!-- Right: 3 external blocks -->
<rect x="440.0" y="50.0" width="140" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="510.0" y="80.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Банк-эквайер</text>
<rect x="440.0" y="135.0" width="140" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="510.0" y="165.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Карточная сеть</text>
<rect x="440.0" y="220.0" width="140" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="510.0" y="250.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Эмитент</text>
<!-- Arrow from ТСП into gateway (to API gateway) -->
<line x1="150.0" y1="158.0" x2="198.0" y2="68.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<!-- Arrow from Auth proxy to Банк-эквайер -->
<line x1="382.0" y1="260.0" x2="438.0" y2="80.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<!-- Right column internal arrows -->
<line x1="510.0" y1="100.0" x2="510.0" y2="135.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="510.0" y1="185.0" x2="510.0" y2="220.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
</svg>
