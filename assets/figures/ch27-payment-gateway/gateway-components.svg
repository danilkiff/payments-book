<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 520" width="240" height="520">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  </defs>

  <!-- Merchant request (top) -->
  <rect x="45" y="10" width="150" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="26" text-anchor="middle" font-size="10" fill="#1e1e1e">Запрос мерчанта</text>
  <text x="120" y="39" text-anchor="middle" font-size="9" fill="#555">HTTPS / JSON</text>

  <!-- Gateway component group -->
  <rect x="32" y="58" width="176" height="188" rx="6" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Inner components -->
  <rect x="45" y="66" width="150" height="28" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="1"/>
  <text x="120" y="84" text-anchor="middle" font-size="9" fill="#1e1e1e">API gateway</text>
  <rect x="45" y="100" width="150" height="28" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="1"/>
  <text x="120" y="118" text-anchor="middle" font-size="9" fill="#1e1e1e">Risk engine</text>
  <rect x="45" y="134" width="150" height="28" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="1"/>
  <text x="120" y="152" text-anchor="middle" font-size="9" fill="#1e1e1e">Routing engine</text>
  <rect x="45" y="168" width="150" height="28" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="1"/>
  <text x="120" y="186" text-anchor="middle" font-size="9" fill="#1e1e1e">Token vault</text>
  <rect x="45" y="202" width="150" height="28" rx="4" fill="#ffffff" stroke="#adb5bd" stroke-width="1"/>
  <text x="120" y="220" text-anchor="middle" font-size="9" fill="#1e1e1e">Auth proxy</text>

  <!-- Rail nodes below -->
  <rect x="45" y="260" width="150" height="36" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="282" text-anchor="middle" font-size="10" fill="#1e1e1e">Банк-эквайер</text>

  <rect x="45" y="310" width="150" height="36" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="332" text-anchor="middle" font-size="10" fill="#1e1e1e">Карточная сеть</text>

  <rect x="45" y="360" width="150" height="36" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="382" text-anchor="middle" font-size="10" fill="#1e1e1e">Эмитент</text>

  <!-- Arrows (down) -->
  <line x1="120" y1="46" x2="120" y2="64" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <line x1="120" y1="94" x2="120" y2="98" stroke="#4a9eed" stroke-width="1.2" marker-end="url(#arr-a)"/>
  <line x1="120" y1="128" x2="120" y2="132" stroke="#4a9eed" stroke-width="1.2" marker-end="url(#arr-a)"/>
  <line x1="120" y1="162" x2="120" y2="166" stroke="#4a9eed" stroke-width="1.2" marker-end="url(#arr-a)"/>
  <line x1="120" y1="196" x2="120" y2="200" stroke="#4a9eed" stroke-width="1.2" marker-end="url(#arr-a)"/>
  <line x1="120" y1="230" x2="120" y2="258" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <line x1="120" y1="296" x2="120" y2="308" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <line x1="120" y1="346" x2="120" y2="358" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>

  <!-- Reply path (dashed, left side) -->
  <path d="M42,396 Q20,380 18,200 Q16,60 40,46" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="5" y="240" font-size="8" fill="#888" transform="rotate(-90,5,240)">reply same path</text>
</svg>
