<rect x="540" y="245" width="240" height="70" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="660" y="285" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Иные участники</text>

<!-- Down to client -->
<line x1="410" y1="330" x2="410" y2="360" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)" marker-start="url(#arr-Muted)"/>

<!-- CLIENT -->
<rect x="270" y="360" width="280" height="55" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="410" y="383" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Клиент</text>
<text x="410" y="401" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">физлицо · ТСП · ГРБС (через интерфейсы Казначейства)</text>

</svg>
