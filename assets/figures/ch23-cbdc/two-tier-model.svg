<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="820" height="600">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
</defs>

<!-- TITLE -->
<text x="410" y="18" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Двухуровневая архитектура цифрового рубля и сценарий бюджетной выплаты</text>

<!-- LAYER 1 — Bank of Russia -->
<rect x="20" y="35" width="780" height="135" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2" stroke-dasharray="6,3"/>
<text x="32" y="55" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Уровень 1 · Банк России</text>
<text x="32" y="69" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">340-ФЗ от 24.07.2023, Положение 833-П (защита информации); оператор платформы и единственный эмитент</text>

<rect x="40" y="80" width="175" height="80" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="127" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Эмиссия</text>
<text x="127" y="123" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">выпуск цифрового рубля</text>
<text x="127" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">обязательство Банка России</text>

<rect x="225" y="80" width="175" height="80" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="312" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Реестр кошельков</text>
<text x="312" y="123" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">единый реестр и</text>
<text x="312" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">журнал операций</text>

<rect x="410" y="80" width="175" height="80" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="497" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Расчётный движок</text>
<text x="497" y="123" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">централизованная СУБД,</text>
<text x="497" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">атомарный перевод (ACID)</text>

<rect x="595" y="80" width="185" height="80" rx="6" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="687" y="105" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">DLT-узлы</text>
<text x="687" y="123" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">репликация регистра</text>
<text x="687" y="138" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">между утв. участниками</text>

<!-- INTER-LAYER FLOWS -->
<line x1="300" y1="170" x2="300" y2="210" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="305" y="190" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">эмиссия / выдача в кошельки</text>

<line x1="520" y1="210" x2="520" y2="170" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="525" y="190" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">подписанные распоряжения</text>

<!-- LAYER 2 — Intermediaries -->
<rect x="20" y="215" width="780" height="135" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2" stroke-dasharray="6,3"/>
<text x="32" y="235" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Уровень 2 · Участники платформы</text>
<text x="32" y="249" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">KYC, ПОД/ФТ, антифрод, лимиты, мобильный UX; деньги клиента — на платформе ЦБ, не на балансе посредника</text>

<rect x="40" y="260" width="240" height="80" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="160" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Коммерческие банки</text>
<text x="160" y="303" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">кошельки физлиц и ТСП,</text>
<text x="160" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">мобильное приложение,</text>
<text x="160" y="333" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">~15 банков на 2025</text>

<rect x="290" y="260" width="240" height="80" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="410" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Федеральное казначейство</text>
<text x="410" y="303" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">бюджетные кошельки ГРБС,</text>
<text x="410" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">целевые выплаты,</text>
<text x="410" y="333" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">казначейское сопровождение</text>

<rect x="540" y="260" width="240" height="80" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="660" y="285" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Иные участники</text>
<text x="660" y="303" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">по решению Банка России</text>
<text x="660" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">(круг расширяется)</text>

<!-- Down to client -->
<line x1="410" y1="350" x2="410" y2="380" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)" marker-start="url(#arr-Muted)"/>

<!-- CLIENT -->
<rect x="270" y="380" width="280" height="55" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="410" y="403" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Клиент</text>
<text x="410" y="421" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">физлицо · ТСП · ГРБС (через интерфейсы Казначейства)</text>

<!-- SCENARIO PANEL -->
<rect x="15" y="460" width="790" height="130" rx="8" fill="#F5F7FD" stroke="#B8821C" stroke-width="1.5"/>
<text x="30" y="478" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Сценарий: бюджетная выплата (пилот сентябрь 2025: Татарстан, Чувашия, Ростовская обл.)</text>

<!-- Step 1 -->
<rect x="25" y="490" width="180" height="80" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="115" y="508" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">1 · ГРБС</text>
<text x="115" y="523" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">распоряжение на выплату:</text>
<text x="115" y="537" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">зарплата, стипендия,</text>
<text x="115" y="551" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">оплата госконтракта</text>
<text x="115" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">через ГИИС ЭБ</text>

<line x1="205" y1="530" x2="225" y2="530" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- Step 2 -->
<rect x="225" y="490" width="180" height="80" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="315" y="508" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">2 · Казначейство</text>
<text x="315" y="523" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">проверка лимитов,</text>
<text x="315" y="537" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">подписанное поручение</text>
<text x="315" y="551" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">→ платформа ЦБ</text>

<line x1="405" y1="530" x2="425" y2="530" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- Step 3 -->
<rect x="425" y="490" width="180" height="80" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="515" y="508" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">3 · Платформа ЦБ</text>
<text x="515" y="523" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">атомарное списание</text>
<text x="515" y="537" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">с бюджетного кошелька,</text>
<text x="515" y="551" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">зачисление получателю</text>
<text x="515" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">+ запись в DLT-журнал</text>

<line x1="605" y1="530" x2="625" y2="530" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>

<!-- Step 4 -->
<rect x="625" y="490" width="170" height="80" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="710" y="508" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">4 · Получатель</text>
<text x="710" y="523" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">кошелёк физлица:</text>
<text x="710" y="537" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">зачислено,</text>
<text x="710" y="551" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">видно в приложении банка</text>
<text x="710" y="565" text-anchor="middle" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">участие добровольное</text>

</svg>
