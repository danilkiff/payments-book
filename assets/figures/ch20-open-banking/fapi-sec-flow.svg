  <rect
     x="495.0"
     y="285.0"
     width="130"
     height="50"
     rx="8"
     fill="#2F8B67"
     fill-opacity="0.15"
     stroke="#2F8B67"
     stroke-width="2"
     id="rect28" />
  <text
     x="560.0"
     y="309.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11"
     fill="#1A2030"
     id="text29">расчёт через</text>
  <text
     x="560.0"
     y="324.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11"
     font-weight="bold"
     fill="#1A2030"
     id="text30">ОПКЦ СБП</text>
  <!-- Step 7: финальный статус клиенту -->
  <rect
     x="606.20197"
     y="30"
     width="110"
     height="44"
     rx="8"
     fill="#2F8B67"
     fill-opacity="0.15"
     stroke="#2F8B67"
     stroke-width="2"
     id="rect31" />
  <text
     x="661.20197"
     y="48"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11"
     font-weight="bold"
     fill="#1A2030"
     id="text32">7</text>
  <text
     x="661.20197"
     y="62"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
