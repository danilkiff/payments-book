     stroke-width="2"
     id="rect14" />
  <text
     x="287.5"
     y="133.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11"
     font-weight="bold"
     fill="#1A2030"
     id="text15">2</text>
  <text
     x="287.5"
     y="146.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
