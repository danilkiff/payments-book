     stroke="#4E63D9"
     stroke-width="2"
     id="rect25" />
  <text
     x="560.0"
     y="218.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11"
     font-weight="bold"
     fill="#1A2030"
     id="text26">6</text>
  <text
     x="560.0"
