  <!-- 6 → 7 финальный статус: асинхронно (webhook / polling). ASPSP → TPP (Muted, пунктир) и TPP → Клиент (Muted, пунктир) -->
  <line
     x1="625.0"
     y1="215.0"
     x2="665.0"
     y2="140.0"
     stroke="#5C647A"
     stroke-width="2"
     stroke-dasharray="6,3"
     marker-end="url(#arr-Muted)"
     id="line40a" />
  <line
     x1="661.20197"
     y1="115.0"
     x2="661.20197"
     y2="78.0"
     stroke="#5C647A"
     stroke-width="2"
     stroke-dasharray="6,3"
     marker-end="url(#arr-Muted)"
     id="line40b" />
  <text
     x="700.0"
     y="157.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="10"
     font-style="italic"
     fill="#5C647A"
     id="text-async-7a">асинхронно:</text>
  <text
     x="700.0"
     y="170.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="10"
     font-style="italic"
