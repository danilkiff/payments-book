     stroke-width="2"
     marker-end="url(#arr-AccentB)"
     id="line33" />
  <!-- 2 → 3 : TPP формирует редирект для клиента -->
  <line
     x1="310.0"
     y1="115.0"
     x2="395.0"
     y2="74.0"
     stroke="#7759D6"
     stroke-width="2"
     marker-end="url(#arr-AccentB)"
     id="line34" />
  <!-- 3 → 4 : клиент уходит на экран SCA в ASPSP -->
  <line
     x1="416.63153"
     y1="75.469475"
     x2="416.63153"
     y2="201.46948"
     stroke="#5C647A"
     stroke-width="2"
     marker-end="url(#arr-Muted)"
     id="line35" />
  <!-- 4 → 5 : ASPSP вернул code в TPP (callback) -->
  <line
     x1="475.0"
     y1="215.0"
     x2="525.0"
     y2="165.0"
     stroke="#4E63D9"
     stroke-width="2"
     marker-end="url(#arr-AccentA)"
     id="line36" />
  <!-- 5 → 6 : TPP с access_token зовёт API инициации в ASPSP -->
  <line
     x1="560.0"
     y1="165.0"
     x2="560.0"
     y2="200.0"
     stroke="#7759D6"
     stroke-width="2"
     marker-end="url(#arr-AccentB)"
     id="line37" />
  <!-- 6 → Расчёт СБП -->
  <line
     x1="560.0"
     y1="250.0"
     x2="560.0"
     y2="285.0"
     stroke="#2F8B67"
     stroke-width="2"
     marker-end="url(#arr-Good)"
     id="line38" />
  <!-- Расчёт → ASPSP подтверждение (пунктир, callback) -->
  <line
     x1="495.0"
     y1="300.0"
     x2="475.0"
     y2="250.0"
     stroke="#2F8B67"
     stroke-width="2"
     stroke-dasharray="6,3"
     marker-end="url(#arr-Good)"
