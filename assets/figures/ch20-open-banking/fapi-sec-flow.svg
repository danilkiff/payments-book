<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 476" width="760" height="476">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Swimlane headers -->
<rect x="45" y="14" width="150" height="40" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="120" y="39" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">Клиент</text>

<rect x="255" y="14" width="150" height="40" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="330" y="32" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">TPP / СПУ</text>
<text x="330" y="47" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">клиентское ПО</text>

<rect x="465" y="14" width="150" height="40" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="540" y="32" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">ASPSP / ПУ</text>
<text x="540" y="47" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">банк счёта</text>

<rect x="625" y="14" width="130" height="40" rx="8" fill="#5C647A" fill-opacity="0.15" stroke="#5C647A" stroke-width="2"/>
<text x="690" y="32" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">ОПКЦ СБП</text>
<text x="690" y="47" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">расчёт</text>

<!-- Lifelines -->
<line x1="120" y1="54" x2="120" y2="462" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="330" y1="54" x2="330" y2="462" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="540" y1="54" x2="540" y2="462" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="690" y1="54" x2="690" y2="462" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Phase 1 band -->
<rect x="40" y="66" width="700" height="20" fill="#E8ECF7"/>
<text x="48" y="80" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Авторизация плательщика (ФАПИ.СЕК)</text>

<!-- Event 1: Клиент → TPP -->
<line x1="120" y1="110" x2="330" y2="110" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="225" y="104" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">запуск оплаты</text>

<!-- Event 2: TPP → ASPSP: PAR -->
<line x1="330" y1="152" x2="540" y2="152" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="435" y="146" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">PAR: подписанный request object</text>
<text x="435" y="167" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">ответ: request_uri</text>

<!-- Event 3: TPP → Клиент: redirect -->
<line x1="330" y1="196" x2="120" y2="196" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="225" y="190" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">редирект клиента → ASPSP</text>

<!-- Event 4: Клиент → ASPSP: SCA + consent -->
<line x1="120" y1="236" x2="540" y2="236" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="330" y="230" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">аутентификация (SCA) + согласие</text>
<text x="330" y="251" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">банк проверяет подпись request object</text>

<!-- Event 5: ASPSP → TPP: authorization_code -->
<line x1="540" y1="280" x2="330" y2="280" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="435" y="274" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">authorization_code (callback)</text>

<!-- Event 6: TPP → ASPSP: token endpoint -->
<line x1="330" y1="320" x2="540" y2="320" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="435" y="314" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">token endpoint: code → access_token</text>
<text x="435" y="335" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">токен привязан к mTLS / DPoP</text>

<!-- Event 7: TPP → ASPSP: API initiation -->
<line x1="330" y1="360" x2="540" y2="360" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="435" y="354" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">API инициации платежа (access_token)</text>

<!-- Phase 2 band -->
<rect x="40" y="376" width="700" height="20" fill="#E8ECF7"/>
<text x="48" y="390" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Расчёт и подтверждение</text>

<!-- Event 8: ASPSP → ОПКЦ СБП: settlement -->
<line x1="540" y1="420" x2="690" y2="420" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="615" y="414" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">расчёт через СБП</text>

<!-- Event 9: ОПКЦ СБП → Клиент: final status (async) -->
<line x1="690" y1="450" x2="120" y2="450" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="405" y="444" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-style="italic" fill="#5C647A">финальный статус — асинхронно (webhook / polling)</text>
</svg>
