  <text
     x="415.0"
     y="48.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
     font-size="11"
     font-weight="bold"
     fill="#1A2030"
     id="text18">3</text>
  <text
     x="415.0"
     y="62.0"
     text-anchor="middle"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
