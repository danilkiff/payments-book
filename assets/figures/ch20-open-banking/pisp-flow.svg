<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Swimlane headers -->
<rect x="40" y="14" width="160" height="40" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="120" y="38" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">Клиент</text>

<rect x="280" y="14" width="160" height="40" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="360" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">ТСП / PISP</text>
<text x="360" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">TPP</text>

<rect x="520" y="14" width="160" height="40" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="600" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">ASPSP</text>
<text x="600" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">банк плательщика</text>

<!-- Lifelines -->
<line x1="120" y1="56" x2="120" y2="470" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="360" y1="56" x2="360" y2="470" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="600" y1="56" x2="600" y2="470" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Phase 1 label: consent setup -->
<rect x="20" y="68" width="680" height="20" fill="#E8ECF7"/>
<text x="30" y="82" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Создание согласия на платёж с SCA (PSD2 Art. 97)</text>

<!-- Event 1: Клиент → ТСП -->
<line x1="120" y1="106" x2="360" y2="106" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="240" y="100" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">выбор PISP-оплаты</text>

<!-- Event 2: PISP → ASPSP: POST consent -->
<line x1="360" y1="138" x2="600" y2="138" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="480" y="132" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">POST /domestic-payment-consents</text>
<text x="480" y="152" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">client_credentials → ConsentId</text>

<!-- Event 3: PISP → Клиент: redirect -->
<line x1="360" y1="176" x2="120" y2="176" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="240" y="170" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">redirect → ASPSP</text>

<!-- Event 4: Клиент ↔ ASPSP: SCA -->
<line x1="120" y1="210" x2="600" y2="210" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="360" y="204" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">SCA: два фактора</text>
<text x="360" y="224" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">consent → Authorised</text>

<!-- Event 5: ASPSP → PISP: redirect c authorization_code -->
<line x1="600" y1="248" x2="360" y2="248" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="480" y="242" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">authorization_code</text>

<!-- Event 6: PISP → ASPSP: token exchange -->
<line x1="360" y1="280" x2="600" y2="280" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="480" y="274" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">POST /token</text>
<text x="480" y="294" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">code → access_token</text>

<!-- Phase 2 label: payment initiation -->
<rect x="20" y="312" width="680" height="20" fill="#E8ECF7"/>
<text x="30" y="326" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Инициация платежа: POST /domestic-payments и опрос статуса</text>

<!-- Event 7: PISP → ASPSP: create payment -->
<line x1="360" y1="350" x2="600" y2="350" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="480" y="344" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">POST /domestic-payments</text>
<text x="480" y="364" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">access_token → PaymentId</text>

<!-- Event 8: ASPSP → PISP: polling status -->
<line x1="600" y1="392" x2="360" y2="392" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="480" y="386" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">опрос статуса (асинхронно)</text>
<text x="480" y="406" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">Pending → AcceptedSettlement → Completed</text>

<!-- Event 9: PISP → ТСП → Клиент: confirmation -->
<line x1="360" y1="440" x2="120" y2="440" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="240" y="434" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">подтверждение заказа</text>

</svg>
