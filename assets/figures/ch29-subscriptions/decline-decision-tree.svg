<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 462" width="820" height="462">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-AccentB-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Good-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Warn-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C15462"/></marker>
  <marker id="arr-Bad-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#C15462"/></marker>
</defs>

<!-- ============ Корень: отказ по MIT ============ -->
<rect x="295" y="16" width="230" height="46" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="410" y="37" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Отказ по MIT</text>
<text x="410" y="52" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">регулярное списание</text>

<!-- корень -> дискриминатор 1 -->
<line x1="410" y1="62" x2="410" y2="86" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- ============ Дискриминатор 1: код отказа ============ -->
<polygon points="410,90 510,134 410,178 310,134" fill="#5C647A" fill-opacity="0.15" stroke="#5C647A" stroke-width="2"/>
<text x="410" y="138" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Код отказа?</text>

<!-- ребро влево: код требует аутентификации -> лист 3DS/SCA (AccentA, нейтральный редирект) -->
<path d="M 350 152 C 250 200, 175 210, 155 246" fill="none" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<rect x="60" y="186" width="222" height="28" rx="4" fill="#ffffff"/>
<text x="171" y="199" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">код требует</text>
<text x="171" y="211" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">аутентификации</text>

<!-- ребро вправо-вниз: код допускает повтор -> классификатор MAC (AccentB, второй нейтральный путь) -->
<path d="M 470 152 C 540 196, 530 200, 525 244" fill="none" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<rect x="498" y="184" width="210" height="20" rx="4" fill="#ffffff"/>
<text x="503" y="198" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">код допускает повтор</text>

<!-- ============ Лист 3DS/SCA (нейтральный, AccentA) ============ -->
<rect x="40" y="252" width="232" height="50" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="156" y="276" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Вернуть клиента в 3DS / SCA</text>
<text x="156" y="292" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">ту же MIT не повторять</text>

<!-- ============ Дискриминатор 2: классификатор MAC ============ -->
<polygon points="525,248 660,304 525,360 390,304" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="525" y="298" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Классификатор MAC</text>
<text x="525" y="313" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">DE 48</text>

<!-- ребро MAC 03 / незнакомый -> STOP (Bad) -->
<path d="M 430 322 C 300 360, 200 360, 162 396" fill="none" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad)"/>
<rect x="78" y="334" width="192" height="20" rx="4" fill="#ffffff"/>
<text x="174" y="348" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">MAC 03 / незнакомый</text>

<!-- ребро MAC 01 -> UPDATE (Warn) -->
<path d="M 525 360 C 480 378, 450 380, 430 396" fill="none" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>
<rect x="380" y="366" width="70" height="20" rx="4" fill="#ffffff"/>
<text x="415" y="380" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">MAC 01</text>

<!-- ребро MAC 24-30 -> WAIT (Good, ok-путь) -->
<path d="M 620 322 C 680 350, 685 360, 685 396" fill="none" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<rect x="628" y="338" width="120" height="26" rx="4" fill="#ffffff"/>
<text x="688" y="356" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">MAC 24–30</text>

<!-- ============ Лист STOP (Bad) ============ -->
<rect x="40" y="398" width="246" height="50" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="1.5"/>
<text x="163" y="421" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">STOP</text>
<text x="163" y="438" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">повторы прекратить</text>

<!-- ============ Лист UPDATE (Warn) ============ -->
<rect x="312" y="398" width="206" height="50" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="415" y="421" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">UPDATE</text>
<text x="415" y="438" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">реквизиты через ABU / VAU</text>

<!-- ============ Лист WAIT (Good) ============ -->
<rect x="558" y="398" width="252" height="50" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="684" y="421" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">WAIT</text>
<text x="684" y="438" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">повтор через интервал</text>

</svg>
