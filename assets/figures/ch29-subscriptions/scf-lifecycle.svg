<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
<defs>
  <marker id="arr-Bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C15462"/></marker>
</defs>

<!-- 3DS/SCA marker (only at T0) -->
<rect x="60" y="42" width="120" height="22" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1"/>
<text x="120" y="57" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">3DS / SCA (EEA, UK)</text>

<!-- Event cards above timeline -->
<!-- CIT @ T=0 -->
<rect x="60" y="78" width="130" height="56" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="125" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">CIT</text>
<text x="125" y="113" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">initial transaction</text>
<text x="125" y="127" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">согласие + выдача NTID</text>

<!-- MIT_1 @ T+30 -->
<rect x="230" y="78" width="130" height="56" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="295" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">MIT₁</text>
<text x="295" y="113" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">subsequent · recurring</text>
<text x="295" y="127" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">NTID ref → CIT</text>

<!-- MIT_2 @ T+60 -->
<rect x="400" y="78" width="130" height="56" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="465" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">MIT₂</text>
<text x="465" y="113" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">subsequent · recurring</text>
<text x="465" y="127" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">NTID ref → CIT</text>

<!-- MIT_3 @ T+90 -->
<rect x="570" y="78" width="130" height="56" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="635" y="98" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">MIT₃</text>
<text x="635" y="113" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">subsequent · recurring</text>
<text x="635" y="127" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">NTID ref → CIT</text>

<!-- Timeline axis -->
<line x1="40" y1="160" x2="700" y2="160" stroke="#5C647A" stroke-width="1.5"/>
<polygon points="700,160 692,156 692,164" fill="#5C647A"/>

<!-- Time ticks + labels -->
<line x1="125" y1="156" x2="125" y2="164" stroke="#5C647A" stroke-width="1.5"/>
<text x="125" y="178" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">T₀</text>

<line x1="295" y1="156" x2="295" y2="164" stroke="#5C647A" stroke-width="1.5"/>
<text x="295" y="178" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">T + 30 дн</text>

<line x1="465" y1="156" x2="465" y2="164" stroke="#5C647A" stroke-width="1.5"/>
<text x="465" y="178" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">T + 60 дн</text>

<line x1="635" y1="156" x2="635" y2="164" stroke="#5C647A" stroke-width="1.5"/>
<text x="635" y="178" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">T + 90 дн</text>

<!-- Axis caption -->
<text x="700" y="195" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">время</text>

<!-- Side fork: decline if NTID missing -->
<text x="40" y="220" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">если MIT без NTID ref или с неверным типом:</text>

<line x1="295" y1="200" x2="295" y2="234" stroke="#C15462" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Bad)"/>

<rect x="220" y="238" width="240" height="32" rx="6" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="1"/>
<text x="340" y="258" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">decline или soft decline</text>

</svg>
