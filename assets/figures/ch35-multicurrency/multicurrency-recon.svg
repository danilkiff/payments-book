<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380" width="540" height="380">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Root: Транзакция #1042 (centered vertically on the whole stack) -->
<rect x="20.0" y="155.0" width="150" height="60" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="2"/>
<text x="95.0" y="190.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Транзакция #1042</text>

<!-- Muted arrow to spine -->
<line x1="170.0" y1="185.0" x2="220.0" y2="185.0" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- Dashed vertical spine spanning all stages -->
<line x1="220.0" y1="28.0" x2="220.0" y2="358.0" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- 1. Страница оплаты: 100 EUR (transaction currency) -->
<rect x="230.0" y="20.0" width="290" height="36" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="375.0" y="39.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Страница оплаты: 100 EUR (transaction)</text>

<!-- 2. Авторизация: 100 EUR -->
<rect x="230.0" y="64.0" width="290" height="36" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="375.0" y="83.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Авторизация: 100 EUR</text>

<!-- 3. Расчёт: 108 USD (settlement) -->
<rect x="230.0" y="108.0" width="290" height="36" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="375.0" y="127.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Расчёт: 108 USD (settlement, EUR→USD @ 1,08)</text>

<!-- 4. Раздельные удержания — промежуточная плашка -->
<rect x="230.0" y="158.0" width="290" height="110" rx="8" fill="#F5F7FD" stroke="#5C647A" stroke-width="1.5"/>
<text x="244.0" y="178.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">interchange (1,5%)</text>
<text x="506.0" y="178.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">−1,62 USD</text>
<text x="244.0" y="195.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">assessment / scheme fee</text>
<text x="506.0" y="195.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">входит в эквайера</text>
<text x="244.0" y="212.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">эквайер (2,5%)</text>
<text x="506.0" y="212.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">−2,70 USD</text>
<text x="244.0" y="229.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">комиссия платформы (3%)</text>
<text x="506.0" y="229.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">−3,24 USD</text>
<line x1="244.0" y1="240.0" x2="506.0" y2="240.0" stroke="#5C647A" stroke-width="1"/>
<text x="244.0" y="258.0" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">итого удержаний</text>
<text x="506.0" y="258.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">−7,56 USD</text>

<!-- 5. Нетто-выплата: 100,44 USD -->
<rect x="230.0" y="278.0" width="290" height="36" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="375.0" y="297.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Нетто-выплата: 100,44 USD</text>

<!-- 6. Счёт продавца: 79,35 GBP -->
<rect x="230.0" y="322.0" width="290" height="36" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="375.0" y="341.6" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Счёт продавца: 79,35 GBP (USD→GBP @ 0,79)</text>
</svg>
