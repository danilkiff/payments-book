<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
  </defs>

  <!-- Domain backgrounds -->
  <rect x="10" y="10" width="200" height="240" rx="8" fill="#dbe4ff" fill-opacity="0.4" stroke="#adb5bd" stroke-width="1"/>
  <rect x="240" y="10" width="200" height="240" rx="8" fill="#f0f4f8" fill-opacity="0.6" stroke="#adb5bd" stroke-width="1"/>
  <rect x="470" y="10" width="200" height="240" rx="8" fill="#e5dbff" fill-opacity="0.4" stroke="#adb5bd" stroke-width="1"/>

  <!-- Domain titles -->
  <text x="110" y="28" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a9eed">Acquirer Domain</text>
  <text x="340" y="28" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">Interoperability Domain</text>
  <text x="570" y="28" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b5cf6">Issuer Domain</text>

  <!-- Acquirer domain nodes -->
  <rect x="35" y="40" width="150" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="110" y="62" text-anchor="middle" font-size="11" fill="#1e1e1e">Мерчант</text>
  <rect x="35" y="110" width="150" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="110" y="132" text-anchor="middle" font-size="11" fill="#1e1e1e">3DS Server</text>

  <!-- Interoperability domain -->
  <rect x="265" y="80" width="150" height="36" rx="5" fill="#f0f4f8" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="340" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">DS</text>

  <!-- Issuer domain nodes -->
  <rect x="495" y="40" width="150" height="36" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="570" y="62" text-anchor="middle" font-size="11" fill="#1e1e1e">ACS</text>
  <rect x="495" y="110" width="150" height="36" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="570" y="132" text-anchor="middle" font-size="11" fill="#1e1e1e">Эмитент</text>
  <rect x="500" y="185" width="140" height="36" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="570" y="205" text-anchor="middle" font-size="10" fill="#1e1e1e">Браузер / SDK держателя</text>

  <!-- Arrows: Merchant → 3DS Server -->
  <line x1="110" y1="76" x2="110" y2="108" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- AReq: 3DS Server → DS -->
  <line x1="185" y1="120" x2="263" y2="100" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="224" y="115" text-anchor="middle" font-size="9" fill="#4a9eed">AReq</text>

  <!-- AReq: DS → ACS -->
  <line x1="415" y1="92" x2="493" y2="62" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="455" y="80" text-anchor="middle" font-size="9" fill="#4a9eed">AReq</text>

  <!-- ARes: ACS → DS -->
  <line x1="493" y1="74" x2="415" y2="104" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="455" y="96" text-anchor="middle" font-size="9" fill="#8b5cf6">ARes</text>

  <!-- ARes: DS → 3DS Server -->
  <line x1="263" y1="108" x2="185" y2="128" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="224" y="125" text-anchor="middle" font-size="9" fill="#8b5cf6">ARes</text>

  <!-- risk/decision: ACS → Issuer -->
  <line x1="570" y1="76" x2="570" y2="108" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="600" y="96" font-size="9" fill="#888">risk/decision</text>

  <!-- CReq/CRes: ACS ↔ Browser -->
  <line x1="570" y1="146" x2="570" y2="183" stroke="#555" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="600" y="168" font-size="9" fill="#888">CReq/CRes</text>

  <!-- Note -->
  <rect x="10" y="262" width="660" height="50" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="340" y="279" text-anchor="middle" font-size="10" fill="#555">DS маршрутизирует запросы между доменами, а ACS на стороне эмитента принимает решение по аутентификации.</text>
  <text x="340" y="294" text-anchor="middle" font-size="10" fill="#555">При challenge дополнительно включается браузер или SDK держателя.</text>
</svg>
