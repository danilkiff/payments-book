<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360">
  <defs>
    <marker id="arr-gray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#888"/></marker>
    <marker id="arr-a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#4a9eed"/></marker>
    <marker id="arr-b" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#8b5cf6"/></marker>
  </defs>

  <!-- Section labels -->
  <text x="180" y="14" text-anchor="middle" font-size="12" font-weight="bold" fill="#888">3DS v1</text>
  <text x="540" y="14" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a9eed">3DS v2</text>
  <line x1="355" y1="10" x2="355" y2="330" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- v1 participants -->
  <rect x="20" y="22" width="70" height="24" rx="3" fill="#f0f4f8" stroke="#adb5bd" stroke-width="1"/>
  <text x="55" y="38" text-anchor="middle" font-size="9" fill="#555">Держатель</text>
  <rect x="105" y="22" width="70" height="24" rx="3" fill="#f0f4f8" stroke="#adb5bd" stroke-width="1"/>
  <text x="140" y="38" text-anchor="middle" font-size="9" fill="#555">Мерчант</text>
  <rect x="192" y="22" width="56" height="24" rx="3" fill="#f0f4f8" stroke="#adb5bd" stroke-width="1"/>
  <text x="220" y="38" text-anchor="middle" font-size="9" fill="#555">DS</text>
  <rect x="263" y="22" width="56" height="24" rx="3" fill="#f0f4f8" stroke="#adb5bd" stroke-width="1"/>
  <text x="291" y="38" text-anchor="middle" font-size="9" fill="#555">ACS</text>

  <!-- v1 lifelines -->
  <line x1="55" y1="46" x2="55" y2="310" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="140" y1="46" x2="140" y2="310" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="220" y1="46" x2="220" y2="310" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="291" y1="46" x2="291" y2="310" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- v1 messages -->
  <line x1="55" y1="65" x2="138" y2="65" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray)"/>
  <text x="97" y="62" text-anchor="middle" font-size="8" fill="#888">старт оплаты</text>
  <line x1="140" y1="90" x2="218" y2="90" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray)"/>
  <text x="180" y="87" text-anchor="middle" font-size="8" fill="#888">3DS req</text>
  <line x1="220" y1="115" x2="289" y2="115" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray)"/>
  <text x="254" y="112" text-anchor="middle" font-size="8" fill="#888">PAReq</text>
  <line x1="289" y1="140" x2="57" y2="140" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray)"/>
  <text x="172" y="137" text-anchor="middle" font-size="8" fill="#888">redirect/pop-up</text>
  <line x1="55" y1="165" x2="289" y2="165" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray)"/>
  <text x="172" y="162" text-anchor="middle" font-size="8" fill="#888">пароль</text>
  <line x1="289" y1="190" x2="222" y2="190" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray)"/>
  <text x="254" y="187" text-anchor="middle" font-size="8" fill="#888">PARes</text>
  <line x1="220" y1="215" x2="142" y2="215" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray)"/>
  <text x="180" y="212" text-anchor="middle" font-size="8" fill="#888">результат</text>
  <line x1="140" y1="240" x2="289" y2="240" stroke="#888" stroke-width="1.2" marker-end="url(#arr-gray)"/>
  <text x="214" y="237" text-anchor="middle" font-size="8" fill="#888">авторизация</text>

  <!-- v2 participants -->
  <rect x="375" y="22" width="70" height="24" rx="3" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="410" y="38" text-anchor="middle" font-size="9" fill="#555">Держатель</text>
  <rect x="460" y="22" width="76" height="24" rx="3" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="498" y="38" text-anchor="middle" font-size="9" fill="#555">3DS Server</text>
  <rect x="551" y="22" width="56" height="24" rx="3" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="579" y="38" text-anchor="middle" font-size="9" fill="#555">DS</text>
  <rect x="622" y="22" width="56" height="24" rx="3" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="650" y="38" text-anchor="middle" font-size="9" fill="#555">ACS</text>

  <!-- v2 lifelines -->
  <line x1="410" y1="46" x2="410" y2="310" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="498" y1="46" x2="498" y2="310" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="579" y1="46" x2="579" y2="310" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="650" y1="46" x2="650" y2="310" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- v2 frictionless messages -->
  <line x1="410" y1="65" x2="496" y2="65" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="453" y="62" text-anchor="middle" font-size="8" fill="#4a9eed">старт оплаты</text>
  <line x1="498" y1="90" x2="577" y2="90" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="537" y="87" text-anchor="middle" font-size="8" fill="#4a9eed">AReq</text>
  <line x1="579" y1="115" x2="648" y2="115" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="613" y="112" text-anchor="middle" font-size="8" fill="#4a9eed">AReq</text>
  <line x1="648" y1="140" x2="500" y2="140" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="573" y="137" text-anchor="middle" font-size="8" fill="#4a9eed">frictionless ARes</text>
  <line x1="498" y1="165" x2="648" y2="165" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="573" y="162" text-anchor="middle" font-size="8" fill="#4a9eed">авторизация</text>

  <!-- v2 challenge messages -->
  <line x1="648" y1="195" x2="412" y2="195" stroke="#8b5cf6" stroke-width="1.3" marker-end="url(#arr-b)"/>
  <text x="530" y="192" text-anchor="middle" font-size="8" fill="#8b5cf6">challenge</text>
  <line x1="410" y1="220" x2="648" y2="220" stroke="#8b5cf6" stroke-width="1.3" marker-end="url(#arr-b)"/>
  <text x="529" y="217" text-anchor="middle" font-size="8" fill="#8b5cf6">OTP / biometrics</text>
  <line x1="648" y1="245" x2="500" y2="245" stroke="#8b5cf6" stroke-width="1.3" marker-end="url(#arr-b)"/>
  <text x="573" y="242" text-anchor="middle" font-size="8" fill="#8b5cf6">ARes</text>
  <line x1="498" y1="270" x2="648" y2="270" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="573" y="267" text-anchor="middle" font-size="8" fill="#4a9eed">авторизация</text>

  <!-- Notes -->
  <rect x="10" y="318" width="330" height="30" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="175" y="337" text-anchor="middle" font-size="9" fill="#555">v1 почти всегда опирается на redirect и пароль.</text>
  <rect x="365" y="318" width="325" height="30" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="527" y="332" text-anchor="middle" font-size="9" fill="#555">v2 поддерживает frictionless-путь и challenge</text>
  <text x="527" y="344" text-anchor="middle" font-size="9" fill="#555">через современные каналы.</text>
</svg>
