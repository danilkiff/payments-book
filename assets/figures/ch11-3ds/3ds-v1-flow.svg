<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 320" width="620" height="320">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-AccentB-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Warn-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Good-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#2F8B67"/></marker>
</defs>

<!-- ===== 3DS v1 sequence: 5 lifelines: Держатель, Браузер, ТСП(MPI), DS, ACS ===== -->
<!-- Lifeline columns: x = 60, 180, 320, 450, 570 (согласовано с 3ds-v2-flow по масштабу) -->

<!-- Lifelines -->
<line x1="60" y1="50" x2="60" y2="305" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="180" y1="50" x2="180" y2="305" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="320" y1="50" x2="320" y2="305" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="450" y1="50" x2="450" y2="305" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="570" y1="50" x2="570" y2="305" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Lifeline headers -->
<rect x="25" y="20" width="70" height="24" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="60" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">Держатель</text>

<rect x="150" y="20" width="60" height="24" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="180" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">Браузер</text>

<rect x="287" y="20" width="66" height="24" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="320" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">ТСП / MPI</text>

<rect x="420" y="20" width="60" height="24" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="450" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">DS</text>

<rect x="540" y="20" width="60" height="24" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="570" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">ACS</text>

<!-- 1: Держатель -> ТСП (через браузер) -->
<line x1="60" y1="70" x2="318" y2="70" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="189" y="65" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">старт оплаты (через браузер)</text>

<!-- 2: ТСП(MPI) -> DS: VEReq -->
<line x1="320" y1="95" x2="448" y2="95" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="384" y="90" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">VEReq</text>

<!-- 3: DS -> ТСП(MPI): VERes -->
<line x1="450" y1="115" x2="322" y2="115" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="386" y="128" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">VERes</text>

<!-- 4: ТСП(MPI) -> ACS: PAReq (через браузер) -->
<line x1="320" y1="148" x2="568" y2="148" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="444" y="143" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">PAReq (через браузер)</text>

<!-- 5: ACS -> Браузер: redirect/pop-up -->
<line x1="570" y1="175" x2="182" y2="175" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="376" y="170" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">редирект / всплывающее окно</text>

<!-- 6: Держатель -> Браузер -> ACS: пароль/OTP -->
<line x1="60" y1="200" x2="178" y2="200" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<line x1="182" y1="200" x2="568" y2="200" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="316" y="195" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">пароль / OTP (через браузер)</text>

<!-- 7: ACS -> ТСП(MPI): PARes -->
<line x1="570" y1="225" x2="322" y2="225" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="446" y="220" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">PARes</text>

<!-- 8: ТСП(MPI) -> Держатель: результат -->
<line x1="320" y1="252" x2="62" y2="252" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="191" y="247" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">результат аутентификации</text>

<!-- 9: ТСП -> ACS-сторона: авторизация -->
<line x1="320" y1="285" x2="568" y2="285" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="444" y="280" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">авторизация</text>

</svg>
