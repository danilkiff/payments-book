<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 500" width="620" height="500">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-AccentB-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Warn-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Good-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#2F8B67"/></marker>
</defs>

<!-- ===== 3DS v2 sequence: 5 lifelines ===== -->
<!-- Lifeline columns: x = 60, 180, 320, 450, 570 -->

<!-- Lifelines (extend from top header to bottom) -->
<line x1="60" y1="50" x2="60" y2="485" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="180" y1="50" x2="180" y2="485" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="320" y1="50" x2="320" y2="485" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="450" y1="50" x2="450" y2="485" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="570" y1="50" x2="570" y2="485" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Lifeline headers (AccentA-плашки) -->
<rect x="25" y="20" width="70" height="24" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="60" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">Держатель</text>

<rect x="138" y="20" width="84" height="24" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="180" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">3DS Requestor</text>

<rect x="282" y="20" width="76" height="24" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="320" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">3DS Server</text>

<rect x="420" y="20" width="60" height="24" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="450" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">DS</text>

<rect x="540" y="20" width="60" height="24" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="570" y="36" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">ACS</text>

<!-- ===== frictionless zone ===== -->
<text x="20" y="68" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#2F8B67">frictionless</text>

<!-- 1. Держатель -> 3DS Requestor: старт оплаты -->
<line x1="60" y1="85" x2="178" y2="85" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="119" y="80" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">старт оплаты</text>

<!-- 2. ACS -> Держатель: 3DS Method URL (fingerprint, до AReq) -->
<line x1="570" y1="110" x2="62" y2="110" stroke="#B8821C" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Warn)"/>
<text x="316" y="105" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">3DS Method URL (fingerprint, до AReq)</text>

<!-- 3. 3DS Requestor -> 3DS Server: authReq -->
<line x1="180" y1="138" x2="318" y2="138" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="249" y="133" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">authReq</text>

<!-- 4. 3DS Server -> DS: AReq -->
<line x1="320" y1="162" x2="448" y2="162" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="384" y="157" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">AReq</text>

<!-- 5. DS -> ACS: AReq -->
<line x1="450" y1="184" x2="568" y2="184" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="509" y="179" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">AReq</text>

<!-- 6. ACS -> DS -> 3DS Server: ARes (transStatus=Y/N/A) -->
<line x1="570" y1="215" x2="322" y2="215" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="446" y="210" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">ARes (transStatus=Y/N/A)</text>

<!-- 7. 3DS Server -> 3DS Requestor: ARes -->
<line x1="320" y1="238" x2="182" y2="238" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="251" y="233" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">ARes</text>

<!-- 8. авторизация -->
<line x1="180" y1="262" x2="318" y2="262" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="249" y="257" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">авторизация</text>

<!-- Separator frictionless / challenge -->
<line x1="20" y1="282" x2="600" y2="282" stroke="#7759D6" stroke-opacity="0.50" stroke-width="1" stroke-dasharray="4,3"/>

<!-- ===== challenge zone ===== -->
<text x="20" y="300" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#7759D6">challenge</text>

<!-- 9. ACS -> DS -> 3DS Server -> Requestor: ARes (transStatus=C) -->
<line x1="570" y1="320" x2="182" y2="320" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="376" y="315" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">ARes (transStatus=C, Challenge Required)</text>

<!-- 10. CReq: ACS -> устройство держателя -->
<line x1="570" y1="350" x2="62" y2="350" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="316" y="345" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">CReq (ACS &#8594; устройство)</text>

<!-- UX side-note -->
<text x="20" y="370" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">UX: OTP / биометрия</text>

<!-- 11. CRes: устройство держателя -> ACS -->
<line x1="60" y1="390" x2="568" y2="390" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="316" y="385" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">CRes (устройство &#8594; ACS)</text>

<!-- 12. RReq: ACS -> DS -> 3DS Server -->
<line x1="570" y1="418" x2="322" y2="418" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="446" y="413" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">RReq (results через DS)</text>

<!-- 13. RRes: 3DS Server -> DS -> ACS -->
<line x1="320" y1="442" x2="568" y2="442" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="446" y="437" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">RRes</text>

<!-- 14. авторизация -->
<line x1="180" y1="470" x2="318" y2="470" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="249" y="465" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">авторизация</text>

</svg>
