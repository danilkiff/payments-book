<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 410" width="780" height="410">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- ============ Swimlane headers ============ -->
<rect x="20" y="14" width="170" height="42" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="105" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Отправитель</text>
<text x="105" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">мобильный банк</text>

<rect x="210" y="14" width="170" height="42" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="295" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Банк отправителя</text>
<text x="295" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">исходящий перевод</text>

<rect x="400" y="14" width="170" height="42" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="485" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">ОПКЦ СБП</text>
<text x="485" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">маршрутизация НСПК · ПС БР</text>

<rect x="590" y="14" width="170" height="42" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="675" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Банк получателя</text>
<text x="675" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">приём и зачисление</text>

<!-- ============ Lifelines ============ -->
<line x1="105" y1="58" x2="105" y2="400" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="295" y1="58" x2="295" y2="400" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="485" y1="58" x2="485" y2="400" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="675" y1="58" x2="675" y2="400" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- ============ Events ============ -->

<!-- 1: Отправитель -> Банк отправителя: номер -->
<line x1="105" y1="88" x2="295" y2="88" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="200" y="82" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">номер телефона</text>

<!-- 2: Банк отправителя -> ОПКЦ: запрос банка по умолчанию -->
<line x1="295" y1="120" x2="485" y2="120" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="390" y="114" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">запрос: банк по умолчанию?</text>

<!-- 3: ОПКЦ -> Банк отправителя: ответ -->
<line x1="485" y1="152" x2="295" y2="152" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="390" y="146" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">банк по умолчанию (если задан)</text>

<!-- 4: Отправитель -> Банк отправителя: ВЫБОР банка (ключевой шаг) -->
<line x1="105" y1="190" x2="295" y2="190" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="200" y="184" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">выбор банка получателя</text>
<text x="200" y="206" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">банк выбирает отправитель</text>

<!-- 5: Банк отправителя -> ОПКЦ: поручение -->
<line x1="295" y1="236" x2="485" y2="236" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="390" y="230" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">поручение на перевод</text>

<!-- 6: ОПКЦ -> Банк получателя: готов принять? -->
<line x1="485" y1="268" x2="675" y2="268" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="580" y="262" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">готов принять перевод?</text>

<!-- 7: Банк получателя -> ОПКЦ: готов -->
<line x1="675" y1="300" x2="485" y2="300" stroke="#2F8B67" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Good)"/>
<text x="580" y="294" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">готов</text>

<!-- 8: Расчёт ПС БР -->
<rect x="415" y="318" width="140" height="36" rx="6" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1" stroke-dasharray="6,3"/>
<text x="485" y="340" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">расчёт ПС БР</text>

<!-- 9: ОПКЦ -> Банк получателя: зачисление -->
<line x1="485" y1="384" x2="675" y2="384" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="580" y="378" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">зачисление средств</text>

</svg>
