<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 392" width="780" height="392">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
</defs>

<!-- ============ Swimlane headers ============ -->
<rect x="20" y="14" width="170" height="42" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="105" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Клиент</text>
<text x="105" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">одно согласие</text>

<rect x="210" y="14" width="170" height="42" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="295" y="31" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Банк-получатель</text>
<text x="295" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">инициатор стягивания</text>

<rect x="400" y="14" width="170" height="42" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="485" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">ОПКЦ СБП</text>
<text x="485" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">маршрутизация НСПК · ПС БР</text>

<rect x="590" y="14" width="170" height="42" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1.5"/>
<text x="675" y="31" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Банк-отправитель</text>
<text x="675" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">счёт списания · согласие</text>

<!-- ============ Lifelines ============ -->
<line x1="105" y1="58" x2="105" y2="382" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="295" y1="58" x2="295" y2="382" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="485" y1="58" x2="485" y2="382" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="675" y1="58" x2="675" y2="382" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- ============ Events ============ -->

<!-- 1: Клиент -> Банк-получатель: инициирует -->
<line x1="105" y1="88" x2="295" y2="88" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="200" y="82" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">запускает стягивание</text>

<!-- 2: Банк-получатель -> ОПКЦ: запрос на стягивание -->
<line x1="295" y1="120" x2="485" y2="120" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="390" y="114" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">запрос на стягивание</text>

<!-- 3: ОПКЦ -> Банк-отправитель: запрос списания -->
<line x1="485" y1="152" x2="675" y2="152" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="580" y="146" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">запрос списания</text>

<!-- 4: Банк-отправитель -> Клиент: уведомление со ссылкой (согласие на стороне источника) -->
<line x1="675" y1="192" x2="105" y2="192" stroke="#B8821C" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Warn)"/>
<text x="390" y="186" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">уведомление со ссылкой</text>

<!-- 5: Клиент -> Банк-отправитель: СОГЛАСИЕ на списание (ключевой шаг) -->
<line x1="105" y1="230" x2="675" y2="230" stroke="#B8821C" stroke-width="2" marker-end="url(#arr-Warn)"/>
<text x="390" y="224" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">согласие на списание (разовое / постоянное)</text>
<text x="390" y="246" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">даётся в банке-отправителе</text>

<!-- 6: Банк-отправитель -> ОПКЦ: средства списаны -->
<line x1="675" y1="278" x2="485" y2="278" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="580" y="272" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">средства списаны</text>

<!-- 7: Расчёт ПС БР -->
<rect x="415" y="296" width="140" height="34" rx="6" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1" stroke-dasharray="6,3"/>
<text x="485" y="317" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">расчёт ПС БР</text>

<!-- 8: ОПКЦ -> Банк-получатель: зачисление -->
<line x1="485" y1="360" x2="295" y2="360" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="390" y="354" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">зачисление на счёт</text>

</svg>
