<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 440" width="240" height="440">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#555"/></marker>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
    <marker id="arr-warn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker>
  </defs>
  <!-- Держатель телефона -->
  <rect x="55" y="10" width="130" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="32" text-anchor="middle" font-size="11" fill="#1e1e1e">Держатель телефона</text>
  <!-- Мерчант -->
  <rect x="55" y="66" width="130" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="88" text-anchor="middle" font-size="11" fill="#1e1e1e">Мерчант</text>
  <!-- Эквайер или PSP -->
  <rect x="55" y="122" width="130" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="144" text-anchor="middle" font-size="11" fill="#1e1e1e">Эквайер или PSP</text>
  <!-- Карточная сеть -->
  <rect x="55" y="178" width="130" height="36" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="120" y="200" text-anchor="middle" font-size="11" fill="#1e1e1e">Карточная сеть</text>
  <!-- Token Vault -->
  <rect x="70" y="234" width="100" height="34" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="255" text-anchor="middle" font-size="11" fill="#1e1e1e">Token Vault</text>
  <!-- Эмитент -->
  <rect x="55" y="288" width="130" height="36" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="120" y="310" text-anchor="middle" font-size="11" fill="#1e1e1e">Эмитент</text>

  <!-- Arrows -->
  <line x1="120" y1="46" x2="120" y2="64" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="120" y1="102" x2="120" y2="120" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <!-- DPAN label -->
  <text x="128" y="115" font-size="9" fill="#4a9eed">DPAN</text>
  <line x1="120" y1="158" x2="120" y2="176" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <!-- Network to vault: lookup -->
  <line x1="120" y1="214" x2="120" y2="232" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-warn)"/>
  <text x="128" y="227" font-size="9" fill="#f59e0b">DPAN→FPAN</text>
  <!-- Vault to issuer -->
  <line x1="120" y1="268" x2="120" y2="286" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="128" y="282" font-size="9" fill="#8b5cf6">FPAN+meta</text>

  <!-- Note -->
  <rect x="10" y="340" width="220" height="44" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="120" y="357" text-anchor="middle" font-size="9" fill="#555">Де-токенизация идёт в карточной сети;</text>
  <text x="120" y="370" text-anchor="middle" font-size="9" fill="#555">мерчант и эквайер видят только DPAN.</text>
</svg>
