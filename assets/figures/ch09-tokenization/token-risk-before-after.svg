<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480">
<defs>
</defs>

<!-- Title -->
<text x="410" y="22" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Что хранит каждый узел и кто остаётся в PCI CDE</text>
<text x="410" y="38" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">цвет ячейки = граница периметра обработки карточных данных</text>

<!-- COLUMN HEADERS -->
<text x="85" y="78" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Узел</text>

<rect x="180" y="55" width="200" height="42" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="280" y="74" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">До токенизации</text>
<text x="280" y="89" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">PAN-копия везде</text>

<rect x="395" y="55" width="200" height="42" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="495" y="74" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Локальная (PSP) токенизация</text>
<text x="495" y="89" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">vault у PSP, токен виден ТСП</text>

<rect x="610" y="55" width="200" height="42" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="710" y="74" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Сетевая токенизация</text>
<text x="710" y="89" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">vault в схеме (VTS / MDES / TSP НСПК)</text>

<!-- ROW 1: ТСП A -->
<text x="20" y="125" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">ТСП A</text>
<text x="20" y="140" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">e-commerce</text>

<rect x="180" y="110" width="200" height="50" rx="6" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="280" y="132" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">PAN-копия</text>
<text x="280" y="147" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">в CDE</text>

<rect x="395" y="110" width="200" height="50" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="495" y="132" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">локальный токен</text>
<text x="495" y="147" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">вне CDE</text>

<rect x="610" y="110" width="200" height="50" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="710" y="132" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">DPAN</text>
<text x="710" y="147" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">вне CDE</text>

<!-- ROW 2: ТСП B -->
<text x="20" y="190" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">ТСП B</text>
<text x="20" y="205" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">другая площадка</text>

<rect x="180" y="175" width="200" height="50" rx="6" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="280" y="197" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">PAN-копия</text>
<text x="280" y="212" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">в CDE</text>

<rect x="395" y="175" width="200" height="50" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="495" y="197" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">локальный токен</text>
<text x="495" y="212" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">отдельный от ТСП A</text>

<rect x="610" y="175" width="200" height="50" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="710" y="197" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">DPAN</text>
<text x="710" y="212" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">свой DPAN на каждый ТСП</text>

<!-- ROW 3: PSP -->
<text x="20" y="255" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">PSP / шлюз</text>
<text x="20" y="270" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">провайдер платежей</text>

<rect x="180" y="240" width="200" height="50" rx="6" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="280" y="262" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">PAN-копия</text>
<text x="280" y="277" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">в CDE</text>

<rect x="395" y="240" width="200" height="50" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="495" y="262" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">PAN + токен (vault)</text>
<text x="495" y="277" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">в CDE, расширенный периметр</text>

<rect x="610" y="240" width="200" height="50" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="710" y="262" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">DPAN</text>
<text x="710" y="277" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">вне CDE — детокенизация в схеме</text>

<!-- ROW 4: Подписка -->
<text x="20" y="320" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Подписка</text>
<text x="20" y="335" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">card-on-file / MIT</text>

<rect x="180" y="305" width="200" height="50" rx="6" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="280" y="327" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">PAN-копия</text>
<text x="280" y="342" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">в CDE</text>

<rect x="395" y="305" width="200" height="50" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="495" y="327" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">локальный токен</text>
<text x="495" y="342" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">вне CDE</text>

<rect x="610" y="305" width="200" height="50" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="710" y="327" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">DPAN + PAR</text>
<text x="710" y="342" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">card-on-file без PAN</text>

<!-- LEGEND -->
<rect x="10" y="380" width="465" height="90" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="22" y="398" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Цветовая шкала по PCI CDE</text>

<rect x="22" y="410" width="22" height="14" rx="3" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="1.5"/>
<text x="52" y="421" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">в CDE — полный контроль PCI DSS, аудит, сегментация</text>

<rect x="22" y="430" width="22" height="14" rx="3" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="52" y="441" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">расширенный CDE — узел держит vault детокенизации</text>

<rect x="22" y="450" width="22" height="14" rx="3" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="52" y="461" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">вне CDE — узел видит только токен или DPAN</text>

<!-- BOTTOM NOTE -->
<rect x="485" y="380" width="325" height="90" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="497" y="398" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Локальная vs сетевая токенизация</text>
<text x="497" y="414" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">Локальная: PSP — собственный vault, PSP остаётся в CDE.</text>
<text x="497" y="427" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">Сетевая: vault на стороне схемы (VTS, MDES, TSP НСПК),</text>
<text x="497" y="440" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">PSP отдаёт DPAN — выходит из CDE.</text>
<text x="497" y="457" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">PAR (Payment Account Reference) связывает все DPAN</text>
<text x="497" y="468" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">одного FPAN — учёт CoF без хранения PAN.</text>

</svg>
