<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" width="520" height="220">
  <!-- Column 1: VTS (Visa) -->
  <text x="90" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#4a9eed">VTS (Visa)</text>
  <rect x="15" y="25" width="150" height="38" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="90" y="48" text-anchor="middle" font-size="10" fill="#1e1e1e">Token Requestor Interface</text>
  <rect x="15" y="75" width="150" height="38" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="90" y="98" text-anchor="middle" font-size="10" fill="#1e1e1e">Token Vault</text>
  <rect x="15" y="125" width="150" height="38" rx="5" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="90" y="148" text-anchor="middle" font-size="10" fill="#1e1e1e">Issuer Interface</text>

  <!-- Column 2: MDES (Mastercard) -->
  <text x="260" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b5cf6">MDES (Mastercard)</text>
  <rect x="185" y="25" width="150" height="38" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="48" text-anchor="middle" font-size="10" fill="#1e1e1e">Token Requestor Interface</text>
  <rect x="185" y="75" width="150" height="38" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="98" text-anchor="middle" font-size="10" fill="#1e1e1e">Token Vault</text>
  <rect x="185" y="125" width="150" height="38" rx="5" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="148" text-anchor="middle" font-size="10" fill="#1e1e1e">Issuer Interface</text>

  <!-- Column 3: TSP НСПК (Мир) -->
  <text x="430" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#22c55e">TSP НСПК (Мир)</text>
  <rect x="355" y="25" width="150" height="38" rx="5" fill="#d3f9d8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="48" text-anchor="middle" font-size="10" fill="#1e1e1e">Token Requestor Interface</text>
  <rect x="355" y="75" width="150" height="38" rx="5" fill="#d3f9d8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="98" text-anchor="middle" font-size="10" fill="#1e1e1e">Token Vault</text>
  <rect x="355" y="125" width="150" height="38" rx="5" fill="#d3f9d8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="430" y="148" text-anchor="middle" font-size="10" fill="#1e1e1e">Issuer Interface</text>

  <!-- Column dividers -->
  <line x1="180" y1="25" x2="180" y2="163" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="350" y1="25" x2="350" y2="163" stroke="#adb5bd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Note -->
  <rect x="10" y="172" width="500" height="30" rx="4" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="260" y="191" text-anchor="middle" font-size="10" fill="#555">Каждая сеть управляет своим Token Vault независимо.</text>
</svg>
