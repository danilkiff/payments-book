<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 490" width="820" height="490">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C15462"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Bad-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C15462"/></marker>
</defs>

<!-- Axis labels -->
<text x="8" y="14" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">События ↓ · Балансы →</text>

<!-- STATE HEADER ROW -->
<!-- Ожидание (Pending), Warn -->
<rect x="160" y="22" width="80" height="50" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="200" y="44" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Ожидание</text>
<text x="200" y="58" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">pending</text>

<!-- Заработано (Earned), AccentA -->
<rect x="253" y="22" width="80" height="50" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="293" y="44" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Заработано</text>
<text x="293" y="58" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">earned</text>

<!-- Доступно (Available), Good -->
<rect x="346" y="22" width="80" height="50" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="386" y="44" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Доступно</text>
<text x="386" y="58" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">available</text>

<!-- Резерв (Reserve), AccentB dashed -->
<rect x="439" y="22" width="80" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2" stroke-dasharray="6,3"/>
<text x="479" y="44" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Резерв</text>
<text x="479" y="58" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">reserve</text>

<!-- Аннулирован, Bad dashed -->
<rect x="532" y="22" width="80" height="50" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2" stroke-dasharray="6,3"/>
<text x="572" y="44" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Аннулирован</text>
<text x="572" y="58" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">voided / expired</text>

<!-- Возврат, Bad solid -->
<rect x="625" y="22" width="80" height="50" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="665" y="44" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Возврат</text>
<text x="665" y="58" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">refunded</text>

<!-- Чарджбэк, Bad solid -->
<rect x="718" y="22" width="80" height="50" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="758" y="44" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Чарджбэк</text>
<text x="758" y="58" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">chargeback</text>

<!-- LIFELINES (dashed verticals below each state) -->
<line x1="200" y1="77" x2="200" y2="365" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="293" y1="77" x2="293" y2="365" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="386" y1="77" x2="386" y2="365" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="479" y1="77" x2="479" y2="365" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="572" y1="77" x2="572" y2="365" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="665" y1="77" x2="665" y2="365" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="758" y1="77" x2="758" y2="365" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- ============ EVENT ROWS ============ -->
<!-- Event 1: capture, Ожидание→Заработано, y=95 -->
<circle cx="16" cy="95" r="9" fill="#4E63D9"/>
<text x="16" y="99" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">1</text>
<text x="30" y="99" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">capture</text>
<line x1="200" y1="95" x2="293" y2="95" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>

<!-- Event 2: void, Ожидание→Аннулирован, y=124 -->
<circle cx="16" cy="124" r="9" fill="#C15462"/>
<text x="16" y="128" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">2</text>
<text x="30" y="128" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">void</text>
<line x1="200" y1="124" x2="572" y2="124" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad)"/>

<!-- Event 3: auth_expired, Ожидание→Аннулирован, y=153 -->
<circle cx="16" cy="153" r="9" fill="#5C647A"/>
<text x="16" y="157" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">3</text>
<text x="30" y="157" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">auth_expired</text>
<line x1="200" y1="153" x2="572" y2="153" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>

<!-- Event 4: reversal, Заработано→Аннулирован, y=182 -->
<circle cx="16" cy="182" r="9" fill="#5C647A"/>
<text x="16" y="186" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">4</text>
<text x="30" y="186" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">reversal</text>
<line x1="293" y1="182" x2="572" y2="182" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- Event 5: расчёт, Заработано→Доступно, y=211 -->
<circle cx="16" cy="211" r="9" fill="#2F8B67"/>
<text x="16" y="215" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">5</text>
<text x="30" y="215" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">расчёт (T+N)</text>
<line x1="293" y1="211" x2="386" y2="211" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>

<!-- Event 6: hold, Доступно→Резерв, y=240 -->
<circle cx="16" cy="240" r="9" fill="#7759D6"/>
<text x="16" y="244" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">6</text>
<text x="30" y="244" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">hold</text>
<line x1="386" y1="240" x2="479" y2="240" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>

<!-- Event 7: release, Резерв→Доступно, y=269 (reversed direction) -->
<circle cx="16" cy="269" r="9" fill="#7759D6"/>
<text x="16" y="273" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">7</text>
<text x="30" y="273" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">release</text>
<line x1="479" y1="269" x2="386" y2="269" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>

<!-- Event 8: partial refund (self-loop on Доступно), y=298 -->
<circle cx="16" cy="298" r="9" fill="#C15462"/>
<text x="16" y="302" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">8</text>
<text x="30" y="302" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">partial refund</text>
<path d="M 372,298 Q 372,283 386,283 Q 400,283 400,298" fill="none" stroke="#C15462" stroke-width="1.5" marker-end="url(#arr-Bad-s)"/>

<!-- Event 9: refund, Доступно→Возврат, y=327 -->
<circle cx="16" cy="327" r="9" fill="#C15462"/>
<text x="16" y="331" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">9</text>
<text x="30" y="331" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">refund</text>
<line x1="386" y1="327" x2="665" y2="327" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad)"/>

<!-- Event 10: чарджбэк, Доступно→Чарджбэк, y=356 -->
<circle cx="16" cy="356" r="9" fill="#C15462"/>
<text x="16" y="360" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">10</text>
<text x="34" y="360" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">чарджбэк</text>
<line x1="386" y1="356" x2="758" y2="356" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad)"/>

<!-- ============ BOTTOM ANNOTATIONS ============ -->
<!-- Legend panel (full width, two columns) -->
<rect x="10" y="395" width="800" height="85" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="20" y="412" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Семантика стрелок</text>

<!-- Left column -->
<line x1="20" y1="428" x2="48" y2="428" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="56" y="432" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">подтверждение (capture)</text>

<line x1="20" y1="445" x2="48" y2="445" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="56" y="449" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">признание / release</text>

<line x1="20" y1="462" x2="48" y2="462" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="56" y="466" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">hold / release (резерв)</text>

<!-- Right column -->
<line x1="420" y1="428" x2="448" y2="428" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad)"/>
<text x="456" y="432" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">refund / chargeback</text>

<line x1="420" y1="445" x2="448" y2="445" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="456" y="449" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">void / reversal</text>

<line x1="420" y1="462" x2="448" y2="462" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="456" y="466" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">auto / по таймауту</text>

</svg>
