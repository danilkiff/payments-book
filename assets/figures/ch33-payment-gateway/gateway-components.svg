<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" width="820" height="460">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
</defs>

<!-- External: ТСП (top-left) -->
<rect x="10" y="14" width="140" height="42" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="80" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">ТСП</text>
<text x="80" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">HTTPS / JSON</text>

<!-- External: 3-D Secure -->
<rect x="660" y="84" width="150" height="42" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1.5"/>
<text x="735" y="103" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">3-D Secure / SCA</text>
<text x="735" y="118" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">DS / ACS эмитента</text>

<!-- External: HSM -->
<rect x="660" y="240" width="150" height="42" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="1.5"/>
<text x="735" y="259" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">HSM</text>
<text x="735" y="274" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">PIN, ключи карт</text>

<!-- External: Эквайер / сеть / эмитент -->
<rect x="660" y="170" width="150" height="42" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="735" y="189" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Эквайер / сеть / эмитент</text>
<text x="735" y="204" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">ISO 8583 / REST</text>

<!-- External: Webhook receiver -->
<rect x="660" y="396" width="150" height="42" rx="8" fill="#E8ECF7" stroke="#5C647A" stroke-width="1.5"/>
<text x="735" y="415" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">Клиент / мерчант</text>
<text x="735" y="430" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">HTTPS endpoint</text>

<!-- Gateway container -->
<rect x="170" y="64" width="470" height="380" rx="10" fill="#F5F7FD" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="405" y="84" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">Платёжный шлюз</text>

<!-- Layer 1: Периметр -->
<rect x="186" y="100" width="438" height="60" rx="6" fill="#ffffff" stroke="#4E63D9" stroke-width="1"/>
<text x="196" y="116" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Периметр</text>

<rect x="202" y="122" width="190" height="32" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="297" y="143" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">API gateway</text>

<rect x="404" y="122" width="200" height="32" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="504" y="143" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Auth proxy</text>

<!-- Layer 2: Domain -->
<rect x="186" y="170" width="438" height="60" rx="6" fill="#ffffff" stroke="#7759D6" stroke-width="1"/>
<text x="196" y="186" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Domain-сервисы</text>

<rect x="202" y="192" width="125" height="32" rx="6" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1"/>
<text x="264" y="213" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Risk engine</text>

<rect x="339" y="192" width="125" height="32" rx="6" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1"/>
<text x="401" y="213" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Routing</text>

<rect x="477" y="192" width="125" height="32" rx="6" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1"/>
<text x="539" y="213" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">TSP сети</text>

<!-- Layer 3: Хранилища -->
<rect x="186" y="240" width="438" height="60" rx="6" fill="#ffffff" stroke="#2F8B67" stroke-width="1"/>
<text x="196" y="256" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Хранилища</text>

<rect x="202" y="262" width="190" height="32" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1"/>
<text x="297" y="283" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Idempotency store</text>

<rect x="404" y="262" width="200" height="32" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="1"/>
<text x="504" y="283" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Token vault</text>

<!-- Layer 4: Async -->
<rect x="186" y="310" width="438" height="60" rx="6" fill="#ffffff" stroke="#B8821C" stroke-width="1"/>
<text x="196" y="326" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#5C647A">Async-канал</text>

<rect x="202" y="332" width="190" height="32" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1"/>
<text x="297" y="353" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Event bus</text>

<rect x="404" y="332" width="200" height="32" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1"/>
<text x="504" y="353" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Webhook delivery</text>

<!-- Observability footnote inside gateway -->
<text x="405" y="404" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-style="italic" fill="#5C647A">Наблюдаемость: метрики, журналы, трассировка пронизывают весь шлюз</text>
<line x1="200" y1="420" x2="610" y2="420" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Connections: external ↔ gateway -->
<!-- ТСП → API gateway -->
<path d="M150,35 L297,35 L297,122" fill="none" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- Auth proxy ↔ 3-D Secure -->
<line x1="604" y1="138" x2="660" y2="105" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3"/>

<!-- TSP сети → Эквайер -->
<line x1="602" y1="208" x2="660" y2="191" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>

<!-- Token vault → HSM -->
<line x1="604" y1="278" x2="660" y2="261" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3"/>

<!-- Webhook delivery → клиент -->
<line x1="604" y1="348" x2="660" y2="417" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

</svg>
