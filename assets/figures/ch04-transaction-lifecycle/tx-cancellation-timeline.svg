<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- Time axis with phase markers -->
<line x1="110" y1="38" x2="700" y2="38" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="215" y="26" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#5C647A">Авторизация</text>
<text x="410" y="26" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#5C647A">Клиринг</text>
<text x="615" y="26" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#5C647A">Расчёт</text>

<!-- Phase guides -->
<line x1="305" y1="48" x2="305" y2="210" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="515" y1="48" x2="515" y2="210" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Row 1: Отмена -->
<text x="102" y="72" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Отмена</text>
<rect x="115" y="58" width="180" height="22" rx="6" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="115" y="98" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">отменяет hold, мгновенно</text>

<!-- Row 2: Void -->
<text x="102" y="128" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Аннулирование</text>
<rect x="115" y="114" width="390" height="22" rx="6" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="115" y="154" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">убирает из клиринга, часы</text>

<!-- Row 3: Возврат -->
<text x="102" y="184" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Возврат</text>
<rect x="525" y="170" width="180" height="22" rx="6" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="525" y="210" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">новая транзакция, дни</text>
</svg>
