<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1e1e1e"/></marker>
  <marker id="ar-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/></marker>
</defs>
<!-- Timeline axis -->
<line x1="50" y1="38" x2="870" y2="38" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<!-- Phase dividers -->
<line x1="307" y1="18" x2="307" y2="225" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
<line x1="597" y1="18" x2="597" y2="225" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
<!-- Phase labels -->
<text x="178" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#555">Авторизация</text>
<text x="452" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#555">Клиринг</text>
<text x="728" y="18" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#555">Settlement</text>
<!-- Row labels (left of axis) -->
<text x="44" y="85" text-anchor="end" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e1e1e">Reversal</text>
<text x="44" y="135" text-anchor="end" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e1e1e">Void</text>
<text x="44" y="185" text-anchor="end" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1e1e1e">Refund</text>
<!-- Reversal: green bar, авторизация zone -->
<rect x="55" y="68" width="238" height="22" rx="5" fill="#22c55e"/>
<text x="315" y="83" font-family="sans-serif" font-size="12" fill="#555">отменяет hold, мгновенно</text>
<!-- Void: yellow bar, авторизация + клиринг -->
<rect x="55" y="118" width="528" height="22" rx="5" fill="#f59e0b"/>
<text x="605" y="133" font-family="sans-serif" font-size="12" fill="#555">убирает из клиринга, часы</text>
<!-- Refund: red bar, settlement and beyond -->
<rect x="612" y="168" width="240" height="22" rx="5" fill="#ef4444"/>
<line x1="852" y1="179" x2="875" y2="179" stroke="#ef4444" stroke-width="2" marker-end="url(#ar-r)"/>
<text x="612" y="210" font-family="sans-serif" font-size="12" fill="#555">новая транзакция, дни</text>
</svg>
