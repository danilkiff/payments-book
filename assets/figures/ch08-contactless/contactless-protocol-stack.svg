<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 500">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4a9eed"/></marker>
</defs>
<!-- Physical layer -->
<rect x="60" y="30" width="240" height="70" rx="8" fill="#f0f4f8" stroke="#4a9eed" stroke-width="1.5"/>
<text x="180" y="52" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Физический</text>
<text x="180" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">13,56 МГц · ISO 14443-1/2</text>
<text x="180" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Type A / B</text>
<!-- Link layer -->
<rect x="60" y="130" width="240" height="60" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="180" y="153" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Канальный</text>
<text x="180" y="172" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">ISO 14443-3 · антиколлизия</text>
<!-- Transport layer (core) -->
<rect x="60" y="220" width="240" height="60" rx="8" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
<text x="180" y="243" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Транспорт</text>
<text x="180" y="262" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">ISO 14443-4 · T=CL</text>
<!-- Application layer (core, accent) -->
<rect x="60" y="330" width="240" height="80" rx="8" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
<text x="180" y="353" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Приложение</text>
<text x="180" y="371" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">EMV Contactless Kernel</text>
<text x="180" y="387" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">qVSDC / M/Chip / Мир</text>
<!-- Arrows -->
<line x1="180" y1="100" x2="180" y2="130" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="180" y1="190" x2="180" y2="220" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="180" y1="280" x2="180" y2="330" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar)"/>
<!-- APDU label -->
<rect x="192" y="296" width="50" height="20" rx="4" fill="white" stroke="#8b5cf6" stroke-width="1"/>
<text x="217" y="310" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8b5cf6">APDU</text>
</svg>
