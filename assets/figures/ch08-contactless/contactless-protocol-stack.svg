<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 540" width="320" height="540">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
</defs>

<!-- 5-LAYER STACK -->
<!-- 1. Физический -->
<rect x="20" y="20" width="280" height="68" rx="8" fill="#F5F7FD" stroke="#4E63D9" stroke-width="2"/>
<text x="160" y="42" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Физический</text>
<text x="160" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1A2030">13,56 МГц · ISO 14443-1 (механика)</text>
<text x="160" y="76" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1A2030">ISO 14443-2 (РЧ-сигнал, ASK)</text>

<!-- 2. Канальный -->
<rect x="20" y="118" width="280" height="58" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="160" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Канальный</text>
<text x="160" y="158" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1A2030">ISO 14443-3 · антиколлизия</text>

<!-- 3. Транспорт -->
<rect x="20" y="206" width="280" height="58" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="160" y="228" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Транспорт</text>
<text x="160" y="246" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1A2030">ISO 14443-4 · T=CL (передача блоков)</text>

<!-- 4. APDU -->
<rect x="20" y="294" width="280" height="68" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="160" y="316" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">APDU</text>
<text x="160" y="334" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1A2030">ISO/IEC 7816-4</text>
<text x="160" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1A2030">SELECT / GPO / READ RECORD / GENERATE AC</text>

<!-- 5. Приложение -->
<rect x="20" y="392" width="280" height="74" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="160" y="414" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Приложение</text>
<text x="160" y="432" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1A2030">EMV Contactless Kernel</text>
<text x="160" y="448" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#1A2030">qVSDC / M/Chip / Мир</text>

<!-- Inter-layer arrows -->
<line x1="160" y1="88" x2="160" y2="118" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="160" y1="176" x2="160" y2="206" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="160" y1="264" x2="160" y2="294" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="160" y1="362" x2="160" y2="392" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>

</svg>
