<!-- Connector from APDU layer to right panel -->
<line x1="300" y1="353" x2="330" y2="353" stroke="#5C647A" stroke-width="1" stroke-dasharray="3,3"/>

<!-- RIGHT: APDU ANATOMY -->
<text x="565" y="20" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Анатомия APDU: SELECT PPSE (стартовая команда бесконтактного флоу)</text>

<!-- BYTE ROW - SELECT PPSE: 00 A4 04 00 0E 32 50 41 59 2E 53 59 53 2E 44 44 46 30 31 00 (20 bytes) -->
<!-- Wait, count: 00 A4 04 00 0E [14 bytes data] 00 = 5 + 14 + 1 = 20 -->
<!-- Hmm spec says Lc=0E so 14 bytes of data. Plus CLA INS P1 P2 = 4 bytes header. Plus Lc 1 byte. Plus Data 14. Plus Le 1. Total 21? Let me recount: 00 A4 04 00 0E 32 50 41 59 2E 53 59 53 2E 44 44 46 30 31 00 — that's 4+1+14+1 = 20 bytes. Counting in literal: 00,A4,04,00,0E,32,50,41,59,2E,53,59,53,2E,44,44,46,30,31,00 = 20 bytes total. OK 20 bytes. -->

<!-- Header bytes (CLA INS P1 P2 Lc) y=35..65, x=330..830 -->
<text x="338" y="44" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Header</text>
<text x="450" y="44" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#B8821C">Lc</text>
<text x="490" y="44" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#4E63D9">Data — DF Name `2PAY.SYS.DDF01` (14 байт)</text>

<!-- 4 header bytes -->
<rect x="335" y="55" width="22" height="22" fill="#5C647A" fill-opacity="0.18" stroke="#5C647A" stroke-width="1"/>
<text x="346" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">00</text>
<rect x="357" y="55" width="22" height="22" fill="#5C647A" fill-opacity="0.18" stroke="#5C647A" stroke-width="1"/>
<text x="368" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">A4</text>
<rect x="379" y="55" width="22" height="22" fill="#5C647A" fill-opacity="0.18" stroke="#5C647A" stroke-width="1"/>
<text x="390" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">04</text>
<rect x="401" y="55" width="22" height="22" fill="#5C647A" fill-opacity="0.18" stroke="#5C647A" stroke-width="1"/>
<text x="412" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">00</text>

<!-- Lc byte -->
<rect x="445" y="55" width="22" height="22" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="1"/>
<text x="456" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">0E</text>

<!-- Data 14 bytes (2PAY.SYS.DDF01 in hex) -->
<rect x="490" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="501" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">32</text>
<rect x="512" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="523" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">50</text>
<rect x="534" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="545" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">41</text>
<rect x="556" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="567" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">59</text>
<rect x="578" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="589" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">2E</text>
<rect x="600" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="611" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">53</text>
<rect x="622" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="633" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">59</text>
<rect x="644" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="655" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">53</text>
<rect x="666" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="677" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">2E</text>
<rect x="688" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="699" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">44</text>
<rect x="710" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="721" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">44</text>
<rect x="732" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="743" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">46</text>
<rect x="754" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="765" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">30</text>

<!-- byte 14 of data would overflow. Let me recalc: 14 bytes × 22 = 308 px. Starting x=490, ends at x=798. So last byte 31 needs to fit. Let me make smaller cells. -->
<!-- Actually I have 14 cells from x=490..798 each 22 wide = 308. Last cell ends at 490+14*22=490+308=798. -->
<!-- Recount which bytes I placed: 32 50 41 59 2E 53 59 53 2E 44 44 46 30 ... that's 13 bytes shown. Need 14th: 31 -->

<!-- 14th byte must go at x=776..798 -->
<!-- But I had Le starting at x=775 which overlaps. Let me re-plan. -->

<text x="500" y="92" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-style="italic" fill="#5C647A">↑ ASCII: 2 P A Y . S Y S . D D F 0 1</text>

<!-- Verdict on byte placement: I exceeded width with 14 data bytes. Let me reduce to show only first 13 + ellipsis -->

<!-- 14th byte is missing. Add it: -->
<!-- Actually I placed 13 bytes: 32 50 41 59 2E 53 59 53 2E 44 44 46 30. Missing: 31 -->
<!-- Final byte 31 should be at x=776, but Le 00 also placed there. Conflict. -->
<!-- Resolution: shift Le further right, and add byte 31 at x=776 -->

<rect x="776" y="55" width="22" height="22" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="787" y="71" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">31</text>

<!-- Le byte - separate line with explicit label -->
<text x="335" y="118" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">Le</text>
<rect x="355" y="106" width="22" height="22" fill="#5C647A" fill-opacity="0.18" stroke="#5C647A" stroke-width="1"/>
<text x="366" y="122" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" fill="#1A2030">00</text>
<text x="385" y="121" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">— терминал просит до 256 байт ответа (FCI Template `6F`)</text>

<!-- PARSED FIELDS TABLE (y=150..270) -->
<rect x="330" y="145" width="475" height="135" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="340" y="162" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Разбор полей</text>

<text x="340" y="180" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">CLA</text>
<text x="400" y="180" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">00</text>
<text x="450" y="180" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ISO interindustry команда</text>

<text x="340" y="195" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">INS</text>
<text x="400" y="195" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">A4</text>
<text x="450" y="195" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">SELECT</text>

<text x="340" y="210" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">P1</text>
<text x="400" y="210" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">04</text>
<text x="450" y="210" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">select by DF Name</text>

<text x="340" y="225" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">P2</text>
<text x="400" y="225" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">00</text>
<text x="450" y="225" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">first or only occurrence</text>

<text x="340" y="240" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">Lc</text>
<text x="400" y="240" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">0E</text>
<text x="450" y="240" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">длина Data = 14 байт</text>

<text x="340" y="255" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">Data</text>
<text x="400" y="255" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">32 50 41 59 2E 53 59 53 2E 44 44 46 30 31</text>

<text x="340" y="270" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#5C647A">ASCII</text>
<text x="400" y="270" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">"2PAY.SYS.DDF01" (PPSE)</text>

<!-- OTHER COMMANDS reference (y=295..435) -->
<rect x="330" y="290" width="475" height="180" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="340" y="307" text-anchor="start" font-family="Inter, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Остальные команды флоу</text>

<text x="340" y="326" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">SELECT AID</text>
<text x="340" y="340" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">00 A4 04 00 Lc &lt;AID&gt; 00</text>
<text x="340" y="352" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">AID = RID(5 байт) + PIX(до 11 байт), ISO/IEC 7816-5</text>

<text x="340" y="372" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">GET PROCESSING OPTIONS</text>
<text x="340" y="386" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">80 A8 00 00 Lc 83 &lt;PDOL-data&gt; 00</text>
<text x="340" y="398" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">Data всегда в шаблоне 83; ответ — AIP (82) + AFL (94)</text>

<text x="340" y="418" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">READ RECORD</text>
<text x="340" y="432" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">00 B2 &lt;rec&gt; &lt;(SFI&lt;&lt;3)|0x04&gt; 00</text>
<text x="340" y="444" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#5C647A">SFI и список записей — из AFL; здесь читается PAN (5A / 57)</text>

<text x="340" y="462" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#5C647A">GENERATE AC</text>
<text x="600" y="462" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#1A2030">80 AE P1 00 Lc &lt;CDOL&gt; 00</text>

<!-- GENERATE AC P1 table (y=475..540) -->
<rect x="330" y="475" width="475" height="80" rx="6" fill="#ffffff" stroke="#5C647A" stroke-width="1"/>
<text x="340" y="492" text-anchor="start" font-family="Inter, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">P1 у GENERATE AC — тип запрашиваемой криптограммы (старшие 2 бита)</text>

<text x="340" y="510" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#C15462">0x00</text>
<text x="380" y="510" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">AAC — Application Authentication Cryptogram (отказ)</text>

<text x="340" y="525" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#2F8B67">0x40</text>
<text x="380" y="525" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">TC — Transaction Certificate (офлайн-аппрув)</text>

<text x="340" y="540" text-anchor="start" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4E63D9">0x80</text>
<text x="380" y="540" text-anchor="start" font-family="Inter, sans-serif" font-size="9" fill="#1A2030">ARQC — Authorization Request Cryptogram (онлайн)</text>

<text x="600" y="540" text-anchor="start" font-family="Inter, sans-serif" font-size="8" font-style="italic" fill="#5C647A">+0x01 — запрос CDA-подписи</text>

</svg>
