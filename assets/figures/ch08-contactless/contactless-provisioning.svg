<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 530">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1e1e1e"/></marker>
  <marker id="ar-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4a9eed"/></marker>
  <marker id="ar-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8b5cf6"/></marker>
</defs>
<!-- Actor headers -->
<text x="100" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Держатель</text>
<text x="330" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Кошелёк</text>
<text x="330" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">(телефон)</text>
<text x="590" y="22" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">TSP</text>
<text x="590" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">(карточная сеть)</text>
<text x="820" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1e1e1e">Эмитент</text>
<!-- Lifelines -->
<line x1="100" y1="48" x2="100" y2="510" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
<line x1="330" y1="48" x2="330" y2="510" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
<line x1="590" y1="48" x2="590" y2="510" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
<line x1="820" y1="48" x2="820" y2="510" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,3"/>
<!-- Message 1: PAN Держатель → Кошелёк -->
<line x1="100" y1="80" x2="330" y2="80" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="215" y="74" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">PAN</text>
<!-- Message 2: PAN + device data Кошелёк → TSP -->
<line x1="330" y1="140" x2="590" y2="140" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar-b)"/>
<text x="460" y="134" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a9eed">PAN + device data</text>
<!-- Message 3: ID&V request TSP → Эмитент -->
<line x1="590" y1="200" x2="820" y2="200" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="705" y="194" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">ID&amp;V request</text>
<!-- Message 4: approve Эмитент → TSP -->
<line x1="820" y1="260" x2="590" y2="260" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="705" y="254" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">approve / extra verification</text>
<!-- Message 5: DPAN + keys TSP → Кошелёк -->
<line x1="590" y1="320" x2="330" y2="320" stroke="#4a9eed" stroke-width="1.5" marker-end="url(#ar-b)"/>
<text x="460" y="314" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4a9eed">DPAN + keys</text>
<!-- Message 6: SE / HCE load Кошелёк internal -->
<line x1="330" y1="380" x2="330" y2="420" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<text x="345" y="403" font-family="sans-serif" font-size="12" fill="#555">SE / HCE load</text>
<!-- Message 7: Карта добавлена Кошелёк → Держатель -->
<line x1="330" y1="460" x2="100" y2="460" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ar-p)"/>
<text x="215" y="454" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#8b5cf6">«Карта добавлена»</text>
</svg>
