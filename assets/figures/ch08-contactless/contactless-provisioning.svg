<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 490" width="760" height="490">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-AccentB-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Good-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Warn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Warn-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#B8821C"/></marker>
  <marker id="arr-Bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C15462"/></marker>
  <marker id="arr-Bad-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#C15462"/></marker>
</defs>

<!-- Lifeline headers -->
<rect x="0" y="0" width="130" height="40" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="65" y="25" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Держатель</text>

<rect x="155" y="0" width="160" height="40" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="235" y="25" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Кошелёк (SE/HCE)</text>

<rect x="395" y="0" width="180" height="40" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="485" y="25" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">TSP (сеть)</text>

<rect x="635" y="0" width="120" height="40" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="695" y="25" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Эмитент</text>

<!-- Token Vault inside TSP -->
<rect x="410" y="46" width="150" height="22" rx="4" fill="#F5F7FD" stroke="#7759D6" stroke-width="1.5"/>
<text x="485" y="61" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="bold" fill="#1A2030">Хранилище токенов (внутри TSP)</text>

<!-- Lifelines -->
<line x1="65" y1="72" x2="65" y2="475" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="235" y1="72" x2="235" y2="475" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="485" y1="72" x2="485" y2="475" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="695" y1="72" x2="695" y2="475" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Step 1: PAN -->
<line x1="65" y1="100" x2="233" y2="100" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="149" y="92" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">PAN</text>

<!-- Step 2: PAN + device data + Token Requestor ID -->
<line x1="235" y1="135" x2="483" y2="135" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="360" y="120" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">PAN + данные устройства</text>
<text x="360" y="132" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">+ Token Requestor ID</text>

<!-- Step 3: ID&V request -->
<line x1="485" y1="170" x2="693" y2="170" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>
<text x="589" y="162" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">запрос ID&amp;V</text>

<!-- Step 4: ID&V → решение эмитента (три ветви без пояснений) -->
<line x1="695" y1="200" x2="487" y2="200" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<line x1="695" y1="225" x2="487" y2="225" stroke="#B8821C" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Warn)"/>
<line x1="695" y1="250" x2="487" y2="250" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad)"/>
<text x="591" y="192" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">ID&amp;V → решение эмитента</text>

<!-- Step 5: DPAN + keys как два отдельных артефакта -->
<rect x="262" y="290" width="200" height="32" rx="6" fill="#F5F7FD" stroke="#4E63D9" stroke-width="1.5"/>
<line x1="362" y1="290" x2="362" y2="322" stroke="#4E63D9" stroke-width="1"/>
<text x="312" y="310" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">DPAN</text>
<text x="412" y="310" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Ключи</text>
<line x1="483" y1="306" x2="464" y2="306" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="260" y1="306" x2="237" y2="306" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="362" y="282" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">DPAN + ключи</text>

<!-- Step 6a: SE -->
<rect x="155" y="360" width="160" height="32" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="235" y="380" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">SE</text>

<!-- Step 6b: HCE -->
<rect x="155" y="400" width="160" height="32" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="235" y="420" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">HCE</text>

<!-- Step 7: «Карта добавлена» -->
<line x1="233" y1="460" x2="67" y2="460" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="150" y="452" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">«Карта добавлена»</text>
</svg>
