<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 530" width="660" height="530">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Good" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-Good-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#2F8B67"/></marker>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-AccentB-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-Bad" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#C15462"/></marker>
  <marker id="arr-Bad-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#C15462"/></marker>
</defs>

<!-- 1. SELECT PPSE -->
<rect x="220" y="20" width="180" height="56" rx="8" fill="#F5F7FD" stroke="#5C647A" stroke-width="1.5"/>
<text x="310" y="40" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">SELECT PPSE</text>
<text x="310" y="56" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">2PAY.SYS.DDF01</text>
<text x="310" y="70" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">EMV Book 1 · Combination Selection</text>

<line x1="310" y1="76" x2="310" y2="100" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- 2. Candidate list -->
<rect x="220" y="104" width="180" height="46" rx="8" fill="#F5F7FD" stroke="#5C647A" stroke-width="1.5"/>
<text x="310" y="124" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Candidate list</text>
<text x="310" y="140" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">список AID, поддерживаемых картой</text>

<line x1="310" y1="150" x2="310" y2="174" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- 3. Выбор приоритетного AID -->
<rect x="220" y="178" width="180" height="46" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="310" y="198" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Выбор приоритетного AID</text>
<text x="310" y="214" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">пересечение со списком терминала</text>

<line x1="310" y1="224" x2="310" y2="250" stroke="#5C647A" stroke-width="2" marker-end="url(#arr-Muted)"/>

<!-- 4. Маршрутизация ядра -->
<polygon points="310,250 420,310 310,370 200,310" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="310" y="307" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Маршрутизация ядра</text>
<text x="310" y="322" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">AID → kernel</text>

<!-- 5. Три ветви -->
<line x1="255" y1="355" x2="115" y2="410" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<line x1="310" y1="370" x2="310" y2="410" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<line x1="365" y1="355" x2="505" y2="410" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>

<rect x="40" y="414" width="150" height="50" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="115" y="442" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">qVSDC (Visa)</text>

<rect x="235" y="414" width="150" height="50" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="310" y="442" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">M/Chip (MC)</text>

<rect x="430" y="414" width="150" height="50" rx="8" fill="#2F8B67" fill-opacity="0.15" stroke="#2F8B67" stroke-width="2"/>
<text x="505" y="442" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">Мир Kernel</text>

<!-- 6. Fallback: no matching kernel -->
<line x1="420" y1="310" x2="540" y2="310" stroke="#C15462" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Bad)"/>
<text x="480" y="302" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#C15462">нет совпадения</text>
<rect x="490" y="320" width="120" height="50" rx="8" fill="#C15462" fill-opacity="0.15" stroke="#C15462" stroke-width="2"/>
<text x="550" y="340" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">no matching</text>
<text x="550" y="356" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">kernel</text>
<text x="550" y="368" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">отказ терминала</text>

<!-- Caption -->
<text x="330" y="500" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">PPSE → candidate list → выбор приоритетного AID → kernel</text>
</svg>
