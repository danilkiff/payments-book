    Source placeholder:
    Блок-схема принятия решения о типе криптограммы.
    Вход: TVR (результаты проверок). Шаг 1: TVR AND IAC Denial / TAC Denial
    -> если ненулевой результат, карта генерирует AAC («Отклонение»).
