<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 540">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1e1e1e"/></marker>
  <marker id="ar-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8b5cf6"/></marker>
  <marker id="ar-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
</defs>
<rect x="40" y="20" width="190" height="375" rx="10" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="6,3"/>
<rect x="75" y="40" width="120" height="50" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="135" y="70" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1e1e1e">Мерчант</text>
<rect x="75" y="138" width="120" height="50" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="135" y="168" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1e1e1e">Эквайер</text>
<rect x="75" y="236" width="120" height="50" rx="8" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
<text x="135" y="258" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">Карточная</text>
<text x="135" y="274" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1e1e1e">сеть</text>
<rect x="75" y="334" width="120" height="50" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="135" y="364" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1e1e1e">Эмитент</text>
<!-- Arrows down -->
<line x1="135" y1="90" x2="135" y2="138" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<line x1="135" y1="188" x2="135" y2="236" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#ar-p)"/>
<line x1="135" y1="286" x2="135" y2="334" stroke="#1e1e1e" stroke-width="1.5" marker-end="url(#ar)"/>
<!-- Labels -->
<text x="215" y="118" font-family="sans-serif" font-size="11" fill="#8b5cf6">MSC</text>
<text x="215" y="214" font-family="sans-serif" font-size="11" fill="#8b5cf6">комиссия</text>
<text x="215" y="227" font-family="sans-serif" font-size="11" fill="#8b5cf6">сети</text>
<!-- Interchange curved arrow -->
<path d="M 75 163 C 20 220 20 335 75 359" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#ar-a)"/>
<text x="10" y="269" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f59e0b" transform="rotate(-90 10 269)">interchange</text>
<!-- Note -->
<rect x="10" y="420" width="340" height="60" rx="6" fill="#fff9db" stroke="#f59e0b" stroke-width="1"/>
<text x="180" y="444" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Маржа эквайера остаётся после</text>
<text x="180" y="461" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">выплаты interchange и комиссии сети.</text>
