<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1e1e1e"/></marker>
  <marker id="ar-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#1e1e1e"/></marker>
  <marker id="ar-p" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#8b5cf6"/></marker>
  <marker id="ar-ps" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#8b5cf6"/></marker>
</defs>
<rect x="20" y="40" width="780" height="450" rx="14" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1" stroke-dasharray="6,3"/>
<rect x="60" y="80" width="190" height="60" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="155" y="115" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1e1e1e">Держатель карты</text>
<rect x="570" y="80" width="190" height="60" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="665" y="115" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1e1e1e">Мерчант</text>
<rect x="60" y="390" width="190" height="60" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="155" y="425" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1e1e1e">Эмитент</text>
<rect x="315" y="390" width="190" height="60" rx="8" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2"/>
<text x="410" y="416" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">Карточная</text>
<text x="410" y="434" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1e1e1e">сеть</text>
<rect x="570" y="390" width="190" height="60" rx="8" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
<text x="665" y="425" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1e1e1e">Эквайер</text>
<!-- Держатель ↔ Мерчант -->
<line x1="250" y1="110" x2="570" y2="110" stroke="#1e1e1e" stroke-width="1.5" marker-start="url(#ar-s)" marker-end="url(#ar)"/>
<text x="410" y="104" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">покупка</text>
<!-- Держатель ↔ Эмитент -->
<line x1="155" y1="140" x2="155" y2="390" stroke="#1e1e1e" stroke-width="1.5" marker-start="url(#ar-s)" marker-end="url(#ar)"/>
<text x="93" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">карта,</text>
<text x="93" y="276" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">счёт</text>
<!-- Мерчант ↔ Эквайер -->
<line x1="665" y1="140" x2="665" y2="390" stroke="#1e1e1e" stroke-width="1.5" marker-start="url(#ar-s)" marker-end="url(#ar)"/>
<text x="730" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">терминал,</text>
<text x="730" y="276" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">договор</text>
<!-- Эмитент ↔ Карт.сеть -->
<line x1="250" y1="425" x2="315" y2="425" stroke="#8b5cf6" stroke-width="1.5" marker-start="url(#ar-ps)" marker-end="url(#ar-p)"/>
<text x="282" y="452" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8b5cf6">правила,</text>
<text x="282" y="465" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8b5cf6">клиринг</text>
<!-- Карт.сеть ↔ Эквайер -->
<line x1="505" y1="425" x2="570" y2="425" stroke="#8b5cf6" stroke-width="1.5" marker-start="url(#ar-ps)" marker-end="url(#ar-p)"/>
<text x="537" y="452" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8b5cf6">правила,</text>
<text x="537" y="465" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8b5cf6">клиринг</text>
</svg>
