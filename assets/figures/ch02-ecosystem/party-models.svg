<text x="212" y="494" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Распределён по ролям</text>
<text x="517" y="494" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Полный, в одной компании</text>

<rect x="15" y="510" width="790" height="26" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="28" y="528" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">Когда выигрывает</text>
<text x="212" y="528" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">масштаб приёма и специализация ролей</text>
