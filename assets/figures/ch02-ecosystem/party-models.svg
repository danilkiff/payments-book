<text x="517" y="416" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Прямой договор Amex с каждым ТСП</text>

<rect x="15" y="425" width="790" height="26" fill="#F5F7FD"/>
