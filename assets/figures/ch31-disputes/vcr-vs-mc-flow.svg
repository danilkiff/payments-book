<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 254" width="760" height="254">

<!-- Header row -->
<rect x="10" y="10" width="200" height="36" rx="6" fill="#E8ECF7" stroke="#5C647A" stroke-width="1"/>
<text x="110" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Стадия процесса</text>

<rect x="215" y="10" width="265" height="36" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="347" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Visa (VCR)</text>

<rect x="485" y="10" width="265" height="36" rx="6" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="617" y="33" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Mastercard</text>

<!-- Row 1: Раннее снятие -->
<rect x="10" y="50" width="200" height="36" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="20" y="73" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Раннее снятие</text>

<rect x="215" y="50" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#4E63D9" stroke-width="1"/>
<text x="225" y="73" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Order Insight, CDRN, RDR (Verifi)</text>

<rect x="485" y="50" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#7759D6" stroke-width="1"/>
<text x="495" y="73" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Ethoca Consumer Clarity, Alerts</text>

<!-- Row 2: Чарджбэк -->
<rect x="10" y="90" width="200" height="36" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="20" y="113" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Чарджбэк</text>

<rect x="215" y="90" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#4E63D9" stroke-width="1"/>
<text x="225" y="113" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Visa Resolve Online (VROL)</text>

<rect x="485" y="90" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#7759D6" stroke-width="1"/>
<text x="495" y="113" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">MasterCom (IPM 1442)</text>

<!-- Row 3: Повторное представление эквайером -->
<rect x="10" y="130" width="200" height="36" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="20" y="148" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Ответ эквайера</text>
<text x="20" y="161" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">срок ответа</text>

<rect x="215" y="130" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#4E63D9" stroke-width="1"/>
<text x="225" y="148" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">representment</text>
<text x="225" y="161" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">9 дн (US/CA), 18 дн (мир)</text>

<rect x="485" y="130" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#7759D6" stroke-width="1"/>
<text x="495" y="148" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">second presentment (IPM 1240, FC 205/282)</text>
<text x="495" y="161" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">45 дн</text>

<!-- Row 4: Пре-арбитраж -->
<rect x="10" y="170" width="200" height="36" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="20" y="193" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Пре-арбитраж</text>

<rect x="215" y="170" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#4E63D9" stroke-width="1"/>
<text x="225" y="193" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">pre-arbitration (через VROL)</text>

<rect x="485" y="170" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#7759D6" stroke-width="1"/>
<text x="495" y="193" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">arbitration chargeback (IPM 1442, FC 451/454)</text>

<!-- Row 5: Арбитраж -->
<rect x="10" y="210" width="200" height="36" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1"/>
<text x="20" y="233" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">Арбитраж</text>

<rect x="215" y="210" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#4E63D9" stroke-width="1"/>
<text x="225" y="233" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Visa Arbitration Committee</text>

<rect x="485" y="210" width="265" height="36" rx="6" fill="#F5F7FD" stroke="#7759D6" stroke-width="1"/>
<text x="495" y="233" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1A2030">Mastercard Arbitration Committee</text>

</svg>
