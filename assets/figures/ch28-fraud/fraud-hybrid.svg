<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
<defs>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
</defs>

<!-- ====== ROC plot: x=80..820 (w=740), y=40..400 (h=360) ====== -->

<!-- Highlighted MRC zone: FPR 2..10% -->
<rect x="228" y="40" width="592" height="360" fill="#B8821C" fill-opacity="0.18"/>

<!-- Grid lines -->
<line x1="80" y1="40" x2="80" y2="400" stroke="#1A2030" stroke-width="1.2"/>
<line x1="80" y1="400" x2="820" y2="400" stroke="#1A2030" stroke-width="1.2"/>
<line x1="228" y1="40" x2="228" y2="400" stroke="#E8ECF7" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="450" y1="40" x2="450" y2="400" stroke="#E8ECF7" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="80" y1="310" x2="820" y2="310" stroke="#E8ECF7" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="80" y1="220" x2="820" y2="220" stroke="#E8ECF7" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="80" y1="130" x2="820" y2="130" stroke="#E8ECF7" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="80" y1="40" x2="820" y2="40" stroke="#E8ECF7" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Y-axis ticks/labels -->
<text x="74" y="404" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">0%</text>
<text x="74" y="314" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">25%</text>
<text x="74" y="224" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">50%</text>
<text x="74" y="134" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">75%</text>
<text x="74" y="44" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">100%</text>

<!-- X-axis ticks/labels: scale 1% = 74 px -->
<text x="80" y="418" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">0%</text>
<text x="228" y="418" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">2%</text>
<text x="450" y="418" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">5%</text>
<text x="820" y="418" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">10%</text>

<!-- Axis titles -->
<text x="450" y="438" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">FPR</text>
<text x="22" y="220" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030" transform="rotate(-90 22 220)">TPR</text>

<!-- Random classifier diagonal: TPR=FPR; at FPR=10%, TPR=10% → y=400-0.10*360=364 -->
<line x1="80" y1="400" x2="820" y2="364" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<text x="780" y="358" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">случайный</text>

<!-- ROC curve: 0,0; (0.5%,70%); (2%,88%); (10%,98%) -->
<!-- Point @75 (block): FPR=0.5%, TPR=70% → x=80+0.5*7.4·percent...wait -->
<!-- X scale: 1% = 74 px. FPR=0.5% → x = 80 + 0.5*74 = 117; FPR=2% → x=228; FPR=10% → x=820 -->
<!-- Y scale: 1 unit = 360. TPR=0.70 → y=400-0.70*360=148; TPR=0.88 → y=400-0.88*360=83.2; TPR=0.98 → y=400-0.98*360=47 -->
<path d="M 80,400 C 90,360 100,220 117,148 C 140,108 195,90 228,84 C 400,72 600,55 820,47" fill="none" stroke="#4E63D9" stroke-width="2.5"/>

<!-- Working point @75 (Block) -->
<circle cx="117" cy="148" r="7" fill="#C15462" stroke="#FFFFFF" stroke-width="2"/>
<text x="130" y="138" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">порог 75</text>
<text x="130" y="154" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">TPR 70%, FPR 0,5%</text>

<!-- Working point @65 (3DS step-up) -->
<circle cx="228" cy="84" r="7" fill="#B8821C" stroke="#FFFFFF" stroke-width="2"/>
<text x="240" y="74" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="bold" fill="#1A2030">порог 65</text>
<text x="240" y="90" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">TPR 88%, FPR 2%</text>

<!-- Arrow connecting two points -->
<line x1="125" y1="140" x2="222" y2="92" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- ====== Three action plates below the plot: y=460..520 ====== -->

<rect x="80" y="460" width="240" height="60" rx="8" fill="#C15462" fill-opacity="0.18" stroke="#C15462" stroke-width="2"/>
<text x="200" y="486" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">Block</text>
<text x="200" y="504" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">score ≥ 75</text>

<rect x="330" y="460" width="240" height="60" rx="8" fill="#B8821C" fill-opacity="0.18" stroke="#B8821C" stroke-width="2"/>
<text x="450" y="486" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">3DS step-up</text>
<text x="450" y="504" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">65 ≤ score &lt; 75</text>

<rect x="580" y="460" width="240" height="60" rx="8" fill="#2F8B67" fill-opacity="0.18" stroke="#2F8B67" stroke-width="2"/>
<text x="700" y="486" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A2030">Pass</text>
<text x="700" y="504" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#5C647A">score &lt; 65</text>
</svg>
