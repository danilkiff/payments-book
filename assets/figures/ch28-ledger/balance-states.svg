<text x="240.0" y="180.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">rolling reserve</text>
<text x="240.0" y="193.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-style="italic" fill="#5C647A">из каждой capture</text>

<!-- Race annotation: already_refunded -->
<rect x="560.0" y="105.0" width="200" height="40" rx="6" fill="#F5F7FD" stroke="#C15462" stroke-width="1"/>
<text x="660.0" y="121.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="bold" fill="#C15462">Bad: гонка refund ↔ chargeback</text>
<text x="660.0" y="135.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">статус already_refunded</text>

