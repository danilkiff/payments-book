<text x="225.0" y="374.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">мин. остаток под споры и сборы</text>

<rect x="215.0" y="384.0" width="270" height="34" rx="6" fill="#ffffff" stroke="#7759D6" stroke-width="1"/>
