<!-- Available -> Refunded -->
<line x1="500.0" y1="55.0" x2="560.0" y2="55.0" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad)"/>
<text x="530.0" y="48.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">refund</text>

