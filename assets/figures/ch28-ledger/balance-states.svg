<text x="55.0" y="128.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">void</text>

<!-- Pending -> Voided/Expired: auth_expired timeout -->
<line x1="100.0" y1="90.0" x2="100.0" y2="160.0" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="105.0" y="118.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5C647A">auth_expired</text>
