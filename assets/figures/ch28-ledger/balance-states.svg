<path d="M 500.0,75.0 L 530.0,75.0 L 530.0,185.0 L 560.0,185.0" fill="none" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad)"/>
<text x="540.0" y="135.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">chargeback</text>

<!-- Partial refund self-loop on Available -->
<path d="M 410.0,40.0 Q 410.0,10.0 440.0,10.0 Q 470.0,10.0 470.0,40.0" fill="none" stroke="#C15462" stroke-width="1.5" marker-end="url(#arr-Bad-s)"/>
<text x="440.0" y="9.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">частичный refund / chargeback (сумма уменьшается)</text>

<!-- Available -> Reserve: hold -->
<line x1="430.0" y1="90.0" x2="380.0" y2="270.0" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="395.0" y="180.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">hold</text>

<!-- Reserve -> Available: release -->
<line x1="340.0" y1="270.0" x2="395.0" y2="90.0" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
<text x="335.0" y="180.0" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">release</text>

<!-- Earned -> Reserve: rolling reserve from capture (dashed muted, the "из каждой capture") -->
