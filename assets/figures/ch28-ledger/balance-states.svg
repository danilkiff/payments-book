<text x="60.0" y="319.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">подтверждение</text>
<line x1="30.0" y1="332.0" x2="55.0" y2="332.0" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="60.0" y="336.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">hold (резерв)</text>
<line x1="30.0" y1="349.0" x2="55.0" y2="349.0" stroke="#C15462" stroke-width="2" marker-end="url(#arr-Bad-s)"/>
<text x="60.0" y="353.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">refund / chargeback</text>
<line x1="30.0" y1="366.0" x2="55.0" y2="366.0" stroke="#5C647A" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-Muted-s)"/>
