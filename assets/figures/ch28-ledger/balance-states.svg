<text x="225.0" y="412.0" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">фиксированный резерв (% оборота)</text>

<!-- Pending -> Earned: подтверждение -->
<line x1="140.0" y1="65.0" x2="200.0" y2="65.0" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="170.0" y="58.0" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">подтверждение</text>

<!-- Earned -> Available: расчёт -->
<line x1="320.0" y1="65.0" x2="380.0" y2="65.0" stroke="#2F8B67" stroke-width="2" marker-end="url(#arr-Good)"/>
