<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260">
  <defs>
    <marker id="arr-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a9eed"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b5cf6"/></marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#888"/></marker>
  </defs>

  <!-- Participants -->
  <rect x="20" y="10" width="90" height="30" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="65" y="29" text-anchor="middle" font-size="10" fill="#1e1e1e">Отправитель</text>
  <rect x="165" y="10" width="110" height="30" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="220" y="22" text-anchor="middle" font-size="10" fill="#1e1e1e">Банк-эквайер</text>
  <text x="220" y="34" text-anchor="middle" font-size="10" fill="#1e1e1e">отправителя</text>
  <rect x="335" y="10" width="100" height="30" rx="4" fill="#e5dbff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="385" y="22" text-anchor="middle" font-size="10" fill="#1e1e1e">VisaNet</text>
  <text x="385" y="34" text-anchor="middle" font-size="10" fill="#1e1e1e">(BASE I)</text>
  <rect x="495" y="10" width="110" height="30" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="550" y="22" text-anchor="middle" font-size="10" fill="#1e1e1e">Банк-эмитент</text>
  <text x="550" y="34" text-anchor="middle" font-size="10" fill="#1e1e1e">получателя</text>
  <rect x="620" y="10" width="50" height="30" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1.5"/>
  <text x="645" y="29" text-anchor="middle" font-size="10" fill="#1e1e1e">Получат.</text>

  <!-- Lifelines -->
  <line x1="65" y1="40" x2="65" y2="230" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="220" y1="40" x2="220" y2="230" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="385" y1="40" x2="385" y2="230" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="550" y1="40" x2="550" y2="230" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="645" y1="40" x2="645" y2="230" stroke="#adb5bd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Messages -->
  <!-- AFT: отправитель → эквайер -->
  <line x1="65" y1="65" x2="218" y2="65" stroke="#8b5cf6" stroke-width="1.3" marker-end="url(#arr-b)"/>
  <text x="142" y="61" text-anchor="middle" font-size="9" fill="#8b5cf6">AFT (снять деньги)</text>

  <!-- AFT авторизация 0100: эквайер → VisaNet -->
  <line x1="220" y1="95" x2="383" y2="95" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="301" y="91" text-anchor="middle" font-size="9" fill="#4a9eed">AFT авторизация 0100</text>

  <!-- OCT 0200: VisaNet → эмитент -->
  <line x1="385" y1="125" x2="548" y2="125" stroke="#8b5cf6" stroke-width="1.3" marker-end="url(#arr-b)"/>
  <text x="466" y="121" text-anchor="middle" font-size="9" fill="#8b5cf6">OCT 0200 (кредит)</text>

  <!-- Ответ 0210: эмитент → эквайер (dashed back) -->
  <line x1="548" y1="155" x2="222" y2="155" stroke="#888" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-gray)"/>
  <text x="385" y="151" text-anchor="middle" font-size="9" fill="#888">Ответ 0210</text>

  <!-- Уведомление: эмитент → получатель -->
  <line x1="550" y1="185" x2="643" y2="185" stroke="#4a9eed" stroke-width="1.3" marker-end="url(#arr-a)"/>
  <text x="596" y="181" text-anchor="middle" font-size="8" fill="#4a9eed">Уведомление,</text>
  <text x="596" y="193" text-anchor="middle" font-size="8" fill="#4a9eed">средства доступны</text>

  <!-- T+минуты tag -->
  <rect x="345" y="210" width="80" height="20" rx="3" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="385" y="224" text-anchor="middle" font-size="9" fill="#4a9eed">T+минуты</text>
</svg>
