<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 275" width="560" height="275">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-AccentB-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#7759D6"/></marker>
</defs>

<!-- Lifeline (4 вертикали: Отправитель/Эквайер, VisaNet, Эмитент, Получатель) -->
<line x1="65" y1="60" x2="65" y2="255" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="280" y1="60" x2="280" y2="255" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<line x1="490" y1="60" x2="490" y2="255" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>

<!-- Lifeline-заголовки -->
<rect x="10" y="20" width="110" height="40" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="65" y="38" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">Банк-эквайер</text>
<text x="65" y="52" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">отправителя</text>

<rect x="215" y="15" width="130" height="45" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="1.5"/>
<text x="280" y="32" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">VisaNet</text>
<text x="280" y="48" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="normal" fill="#5C647A">V.I.P. System / BASE I</text>

<rect x="435" y="20" width="110" height="40" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1.5"/>
<text x="490" y="38" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">Банк-эмитент</text>
<text x="490" y="52" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">получателя</text>

<!-- AFT (снять деньги) — эквайер -> VisaNet — теперь начало потока с эквайера -->
<line x1="67" y1="90" x2="278" y2="90" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="172" y="83" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">AFT 0100 (снять у отправителя)</text>

<!-- Ответ AFT 0110 -->
<line x1="278" y1="120" x2="67" y2="120" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="172" y="113" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Ответ AFT 0110</text>

<!-- OCT VisaNet -> Эмитент -->
<line x1="282" y1="160" x2="488" y2="160" stroke="#7759D6" stroke-width="2" marker-end="url(#arr-AccentB)"/>
<text x="385" y="153" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">OCT 0200 (кредит получателю)</text>

<!-- Ответ OCT 0210 -->
<line x1="488" y1="190" x2="282" y2="190" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="385" y="183" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">Ответ OCT 0210</text>

<!-- Уведомление эмитента получателю -->
<line x1="490" y1="225" x2="490" y2="248" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)"/>
<text x="490" y="220" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">T+минуты</text>
<rect x="438" y="248" width="105" height="22" rx="6" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="1"/>
<text x="490" y="263" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#1A2030">уведомление получателю</text>

<!-- Поясняющая плашка по MTI -->
<rect x="10" y="225" width="370" height="36" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-opacity="0.50" stroke-width="1" stroke-dasharray="4,3"/>
<text x="20" y="241" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">MTI зависит от процессора и контракта эквайера / эмитента:</text>
<text x="20" y="254" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">AFT 0100/0110, OCT 0200/0210 (возможна пара 0100/0110).</text>

</svg>
