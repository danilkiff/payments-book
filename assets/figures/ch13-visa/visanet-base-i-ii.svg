<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270" width="640" height="270">
<defs>
  <marker id="arr-AccentA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-AccentA-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#4E63D9"/></marker>
  <marker id="arr-Muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-Muted-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#5C647A"/></marker>
  <marker id="arr-AccentB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#7759D6"/></marker>
  <marker id="arr-AccentB-s" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#7759D6"/></marker>
</defs>

<!-- Банк-эквайер -->
<rect x="20" y="50" width="130" height="60" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="85" y="84" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">Банк-эквайер</text>

<!-- VisaNet (центральный контейнер) -->
<rect x="180" y="20" width="280" height="180" rx="8" fill="#7759D6" fill-opacity="0.15" stroke="#7759D6" stroke-width="2"/>
<text x="320" y="40" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="bold" fill="#1A2030">VisaNet</text>

<!-- BASE I (авторизация) -->
<text x="320" y="58" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">V.I.P. System: BASE I (авторизация)</text>

<!-- VIC -->
<rect x="200" y="66" width="80" height="32" rx="6" fill="#FFFFFF" stroke="#4E63D9" stroke-width="1.5"/>
<text x="240" y="80" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">VIC</text>
<text x="240" y="92" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">мульти-ЦОД коммутатор</text>

<!-- STIP -->
<rect x="290" y="66" width="75" height="32" rx="6" fill="#FFFFFF" stroke="#B8821C" stroke-width="1.5"/>
<text x="327" y="80" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">STIP</text>
<text x="327" y="92" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">stand-in</text>

<!-- VAA -->
<rect x="375" y="66" width="75" height="32" rx="6" fill="#FFFFFF" stroke="#5C647A" stroke-width="1.5"/>
<text x="412" y="80" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">VAA</text>
<text x="412" y="92" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">скоринг рисков</text>

<!-- разделитель -->
<line x1="200" y1="115" x2="440" y2="115" stroke="#5C647A" stroke-width="1"/>

<!-- BASE II (клиринг) -->
<text x="320" y="132" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="normal" fill="#1A2030">BASE II (клиринг)</text>

<!-- VSS -->
<rect x="200" y="142" width="240" height="42" rx="6" fill="#FFFFFF" stroke="#7759D6" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="320" y="158" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="bold" fill="#1A2030">VSS — VisaNet Settlement Service</text>
<text x="320" y="173" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">расчёт нетто-позиций по итогам BASE II / SMS</text>

<!-- Банк-эмитент -->
<rect x="490" y="50" width="130" height="60" rx="8" fill="#4E63D9" fill-opacity="0.15" stroke="#4E63D9" stroke-width="2"/>
<text x="555" y="84" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="normal" fill="#1A2030">Банк-эмитент</text>

<!-- Авторизация: эквайер <-> VisaNet -->
<line x1="150" y1="70" x2="200" y2="70" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)" marker-start="url(#arr-AccentA-s)"/>
<text x="175" y="62" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">0100↔0110</text>
<text x="175" y="84" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">через VIC</text>

<!-- Авторизация: VisaNet <-> эмитент -->
<line x1="450" y1="70" x2="490" y2="70" stroke="#4E63D9" stroke-width="2" marker-end="url(#arr-AccentA)" marker-start="url(#arr-AccentA-s)"/>
<text x="470" y="62" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">0100↔0110</text>

<!-- Клиринг: эквайер -> BASE II -->
<line x1="150" y1="160" x2="200" y2="160" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="175" y="178" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">TC 33.A, T+0/T+1</text>

<!-- Клиринг: BASE II -> эмитент -->
<line x1="440" y1="160" x2="490" y2="160" stroke="#5C647A" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-Muted)"/>
<text x="465" y="178" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">TC 33.A, T+0/T+1</text>

<!-- VSS settlement track: acquirer ↓ → VSS, VSS → ↑ issuer -->
<line x1="85" y1="110" x2="85" y2="220" stroke="#7759D6" stroke-width="1.5" stroke-dasharray="6,3"/>
<line x1="85" y1="220" x2="200" y2="220" stroke="#7759D6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-AccentB)"/>
<line x1="440" y1="220" x2="555" y2="220" stroke="#7759D6" stroke-width="1.5" stroke-dasharray="6,3"/>
<line x1="555" y1="220" x2="555" y2="113" stroke="#7759D6" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-AccentB)"/>
<text x="320" y="216" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#1A2030">расчёт через VSS — отдельный трек</text>

<!-- Поясняющая плашка -->
<rect x="20" y="236" width="600" height="28" rx="6" fill="#F5F7FD" stroke="#5C647A" stroke-width="1" stroke-dasharray="6,3"/>
<text x="30" y="252" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">VIC — VisaNet Integrated Payments node (мульти-ЦОД); STIP — стэнд-ин обработка при недоступности эмитента;</text>
<text x="30" y="262" text-anchor="start" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#5C647A">VAA — Visa Advanced Authorization (риск-скоринг); VSS — VisaNet Settlement Service.</text>

</svg>
