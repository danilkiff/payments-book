name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            cm-super \
            latexmk \
            biber \
            texlive-lang-cyrillic \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-fonts-extra-links \
            texlive-pictures \
            texlive-fonts-extra

      - name: Build PDF
        run: make

      - name: Show LaTeX log on failure
        if: failure()
        run: |
          test -f build/payments-book.log && tail -n 200 build/payments-book.log || true
