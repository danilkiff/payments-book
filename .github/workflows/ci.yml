name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: docker://ghcr.io/xu-cheng/texlive-alpine:20260101
        with:
          entrypoint: sh
          args: -lc "mkdir -p build && latexmk -xelatex -outdir=build payments-book.tex"
