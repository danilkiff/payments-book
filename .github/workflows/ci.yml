name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Docker-шаг (texlive-full) запускается от root и создаёт build/ с owner=root.
      # Если каталог уже существует и принадлежит runner, root пишет файлы внутрь,
      # но владелец каталога остаётся runner — последующие шаги могут в него писать.
      - name: Prepare build dir
        run: mkdir -p build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate CITATION.cff
        run: |
          pip install --quiet cffconvert
          cffconvert --validate -i CITATION.cff

      - name: Install Inkscape for SVG→PDF
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q inkscape

      - name: SVG → figure PDFs
        run: make svg

      # src/gitversion.tex в .gitignore — checkout его не приносит. Без
      # этого шага latexmk запустится без файла, сработают \providecommand-
      # фолбэки в payments-book.tex, и на развороте релиза вместо хэша
      # окажется литерал «dev», а вместо даты сборки — \today.
      - name: Generate src/gitversion.tex
        run: scripts/gen-gitversion.sh

      - name: Build PDF (LaTeX)
        uses: docker://ghcr.io/xu-cheng/texlive-full:20260101
        with:
          entrypoint: latexmk
          args: payments-book.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf
          path: build/payments-book.pdf
          retention-days: 30
