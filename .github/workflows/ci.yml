name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Docker-шаг (texlive-full) запускается от root и создаёт build/ с owner=root.
      # Если каталог уже существует и принадлежит runner, root пишет файлы внутрь,
      # но владелец каталога остаётся runner — последующие шаги могут в него писать.
      - name: Prepare build dir
        run: mkdir -p build

      - name: Install system deps for cairosvg
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 libffi-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: excalidraw → SVG → figure PDFs
        run: make excalidraw svg

      - name: Build PDF (LaTeX)
        uses: docker://ghcr.io/xu-cheng/texlive-full:20260101
        with:
          entrypoint: latexmk
          args: payments-book.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf
          path: build/payments-book.pdf
          retention-days: 30
