name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        uses: docker://ghcr.io/xu-cheng/texlive-full:20260101
        with:
          entrypoint: latexmk
          args: payments-book.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v3
        with:
          name: payments-book-pdf
          path: build/payments-book.pdf
          if-no-files-found: error
          retention-days: 30
