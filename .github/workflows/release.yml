name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # создание GitHub Release
  actions: read     # чтение артефактов из CI (gh run download)

jobs:
  download-pdf:
    name: Download PDF from CI
    runs-on: ubuntu-latest
    outputs:
      cached: ${{ steps.download.outputs.cached }}

    steps:
      # Пуш тега и пуш коммита в master — два разных GitHub-события.
      # Если они отправлены одновременно (git push origin master v1.0),
      # CI может ещё не закончиться. Поллим до 15 мин, потом фолбэк.
      - name: Wait for CI & download PDF
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p build
          for attempt in $(seq 1 30); do
            run_json=$(gh run list \
              --workflow=ci.yml \
              --commit="${GITHUB_SHA}" \
              --limit=1 \
              --json databaseId,status,conclusion \
              --jq '.[0] // empty')

            if [ -z "$run_json" ]; then
              echo "No CI run found yet, waiting 30s… ($attempt/30)"
              sleep 30
              continue
            fi

            status=$(echo "$run_json" | jq -r '.status')
            if [ "$status" != "completed" ]; then
              echo "CI still running, waiting 30s… ($attempt/30)"
              sleep 30
              continue
            fi

            conclusion=$(echo "$run_json" | jq -r '.conclusion')
            if [ "$conclusion" = "success" ]; then
              run_id=$(echo "$run_json" | jq -r '.databaseId')
              gh run download "$run_id" --name book-pdf --dir build/
              echo "cached=true" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "::warning::CI finished with conclusion=$conclusion, falling back to local build"
              break
            fi
          done

          echo "cached=false" >> "$GITHUB_OUTPUT"

      - name: Upload PDF for release job
        if: steps.download.outputs.cached == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-pdf
          path: build/payments-book.pdf
          retention-days: 1

  # ── Fallback: full build если артефакт CI недоступен ──
  # Выделен в отдельный джоб, чтобы docker pull texlive (~5 GB)
  # не происходил при наличии готового артефакта.
  build-pdf-fallback:
    name: Build PDF (fallback)
    runs-on: ubuntu-latest
    needs: download-pdf
    if: needs.download-pdf.outputs.cached != 'true'

    steps:
      - uses: actions/checkout@v4

      # См. комментарий к аналогичному шагу в ci.yml — без этого Docker
      # создаст build/ от root и cp в «Create GitHub Release» упадёт с Permission denied.
      - name: Prepare build dir
        run: mkdir -p build

      - name: Install librsvg (rsvg-convert) for SVG→PDF
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q librsvg2-bin

      - name: excalidraw → SVG → figure PDFs
        run: make excalidraw svg

      - name: Build PDF (LaTeX)
        uses: docker://ghcr.io/xu-cheng/texlive-full:20260101
        with:
          entrypoint: latexmk
          args: payments-book.tex

      - name: Upload PDF for release job
        uses: actions/upload-artifact@v4
        with:
          name: release-pdf
          path: build/payments-book.pdf
          retention-days: 1

  # ── Create release ──
  release:
    name: Release PDF
    runs-on: ubuntu-latest
    needs: [download-pdf, build-pdf-fallback]
    if: |
      always() &&
      needs.download-pdf.result == 'success' &&
      (needs.build-pdf-fallback.result == 'success' ||
       needs.build-pdf-fallback.result == 'skipped')

    steps:
      - uses: actions/checkout@v4

      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: release-pdf
          path: build/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          cp build/payments-book.pdf "build/payments-book-${tag}.pdf"
          gh release create "$tag" \
            "build/payments-book-${tag}.pdf" \
            --title "$tag" \
            --generate-notes
